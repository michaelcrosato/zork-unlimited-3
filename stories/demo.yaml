  passenger_answered_check:
    routeImportance: optional
    text: >
      You check the roll call against faces before your hand finds the release.
      The child who kept saying present is gripping the rail with both hands.
      The newspaper woman has folded Warden Street small enough to fit in her
      coat pocket. The old conductor waits until you meet his eye, then calls
      the aisle clear without touching his punch. Every answer has a body
      behind it now, and none of them are waiting for Mara to say the names
      again.
    choices:
      - id: read_checked_answers_into_newspaper_roll_call
        label: Read the checked answers into the newspaper woman's transfer roll call
        to: passenger_newspaper_roll_call
