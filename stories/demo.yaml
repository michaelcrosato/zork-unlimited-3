  passenger_manifest_count:
    routeImportance: optional
    text: >
      Mara checks the opened manifest before anyone moves. The doors are no
      longer stamped shut, but the page still remembers what each person
      carried into the line: newspaper, lunch tin, child's mitten, conductor's
      punch. She does not point to the marks as proof that the passengers
      belong to the train. She points from one kept thing to the next until
      the people holding them begin to notice each other. "They need more than
      clearance," Mara says. "They need a count that checks whether everyone
      made it through."
    choices:
      - id: check_for_unanswered_manifest_row
        label: Check which opened row still has no answer
        to: passenger_missing_count
