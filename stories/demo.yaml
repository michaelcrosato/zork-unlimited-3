            reviewed_open_manifest_count: true
            passengers_finished_reviewed_count: true
            shared_count_release_ready: true
      - id: return_from_unanswered_row
        label: Return to the reviewed manifest count
        to: passenger_manifest_count

  mara_manifest_handoff:
    routeImportance: optional
    text: >
      Mara does not leave the booth at once. She reads the first opened door,
      waits for its answer, then touches the next line as if steadiness can be
      handed from name to name. By the time she reaches her own row, the
      torn thumbprint beside it has darkened like a route marker, and the
      speaker is full of people breathing with her instead of waiting for her.
      The third car answers with crowded shuffles, asking for room as plainly
      as it asks for the release. Near the nearest manifest door, a hand waits
      where you can count it before you pull.
    choices:
      - id: listen_to_manifest_handoff_from_handoff
