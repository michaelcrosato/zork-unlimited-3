id: demo
title: Lantern in the Underpass
start: entrance
scenes:
  entrance:
    text: >
      Rain ticks against Warden Street. At the mouth of the underpass, a brass
      lantern hangs from a bent nail beside a transit notice stamped SERVICE
      SUSPENDED SINCE 1983.
    choices:
      - id: read_notice
        label: Read the old transit notice
        to: notice
        effects:
          set:
            knows_shutdown: true
      - id: take_lantern
        label: Take the brass lantern
        to: tunnel
        effects:
          addItem: lantern
          set:
            has_light: true
      - id: enter_dark
        label: Enter the underpass without touching it
        to: dark_tunnel

  notice:
    text: >
      The notice warns that Platform 13 was sealed after a signal fire. Someone
      has scratched a newer message into the glass: IF THE TRAIN ARRIVES EMPTY,
      DO NOT BOARD WITHOUT THE MAP. A second, smaller line reads: CLEAR THE
      DISPATCHER'S NAME BEFORE YOU PULL THE RELEASE.
    choices:
      - id: inspect_notice_back
        label: Check the back of the notice
        to: notice_back
        effects:
          set:
            knows_badge_proof: true
      - id: take_lantern_after_notice
        label: Take the brass lantern
        to: tunnel
        effects:
          addItem: lantern
          set:
            has_light: true
      - id: ignore_warning
        label: Ignore the warning and step into the dark
        to: dark_tunnel

  notice_back:
    text: >
      The notice backing is covered in transfer stamps that never reached the
      city archive. One blank line is labeled DISPATCHER CLEARANCE: BADGE
      PROOF REQUIRED. Beside it, someone wrote M. VALE and pressed so hard the
      paper nearly split.
    choices:
      - id: take_lantern_after_notice_back
        label: Take the brass lantern
        to: tunnel
        effects:
          addItem: lantern
          set:
            has_light: true
      - id: ignore_back_warning
        label: Ignore the warning and step into the dark
        to: dark_tunnel

  tunnel:
    text: >
      Lantern light reveals chalk arrows on the concrete wall. One points
      toward a service door. Another points deeper into the tunnel, where a
      station clock hangs, frozen at 1:13.
    choices:
      - id: open_service_door
        label: Open the service door
        to: service_room
      - id: follow_arrows
        label: Follow the arrows deeper
        to: platform
        requires:
          all:
            - notFlag: platform_lit
            - any:
                - notFlag: promised_mara
                - item: map
            - any:
                - notFlag: returned_from_safe_escape
                - item: fuse
        effects:
          set:
            knows_platform: true
      - id: follow_arrows_to_lit_platform
        label: Follow the arrows back to the lit platform
        to: lit_platform
        requires:
          all:
            - flag: platform_lit
            - any:
                - item: token
                - notFlag: knows_token_location
        effects:
          set:
            knows_platform: true
      - id: inspect_clock
        label: Inspect the stopped station clock
        to: clock
        requires:
          notItem: token

  clock:
    text: >
      The clock hands are wired in place at 1:13. A maintenance token has been
      wedged behind the minute hand, warm as a coin left in sunlight. Its edge
      is stamped SIGNAL BOOTH ACCESS.
    choices:
      - id: take_token
        label: Take the maintenance token
        to: tunnel
        requires:
          notItem: token
        effects:
          addItem: token
          set:
            found_token: true
      - id: leave_clock
        label: Leave the clock alone
        to: tunnel
        requires:
          notFlag: knows_token_location

  dark_tunnel:
    text: >
      The tunnel swallows the last streetlight. Your hand finds cold concrete,
      then a chain hanging from the ceiling. Far ahead, a woman speaks through
      a dead public-address speaker.
    choices:
      - id: pull_chain
        label: Pull the chain
        to: service_room
        effects:
          set:
            lights_on: true
      - id: answer_voice
        label: Answer the voice in the speaker
        to: dispatcher
      - id: retreat
        label: Retreat to the entrance
        to: entrance

  dispatcher:
    text: >
      "This is Mara Vale, night dispatcher," the speaker says. "If you can hear
      me, the line has chosen you. Find the map. Do not trust the blank sign."
    choices:
      - id: ask_mara_about_train
        label: Ask Mara what happened to the train
        to: mara_warning
        effects:
          set:
            met_mara: true
      - id: promise_to_help
        label: Promise Mara you will find the map
        to: service_room
        effects:
          set:
            met_mara: true
            promised_mara: true
            lights_on: true

  mara_warning:
    text: >
      Mara says the last train kept returning without its driver. The city
      sealed the platform, then forgot the people still listed as "in transit."
      Static chews through her final word: "Remember... the token in the tunnel clock..."
    choices:
      - id: continue_to_service_room
        label: Follow Mara's directions to the service room
        to: service_room
        effects:
          set:
            lights_on: true
            knows_token_location: true

  service_room:
    text: >
      A breaker panel hums beside a desk covered with old transit maps. A
      cracked radio repeats a number station. Someone circled Platform 13 in
      red pencil.
    choices:
      - id: take_map
        label: Take the marked Platform 13 map Mara asked for
        to: service_room
        requires:
          notItem: map
        effects:
          addItem: map
          set:
            knows_platform: true
      - id: tune_radio
        label: Tune the cracked radio
        to: radio
        requires:
          all:
            - notFlag: knows_release
            - any:
                - notItem: map
                - notItem: token
                - notItem: fuse
                - notItem: badge
      - id: search_locker
        label: Search the maintenance locker
        to: locker
        requires:
          any:
            - notItem: fuse
            - notItem: badge
      - id: read_personnel_file
        label: Read the personnel file on the desk
        to: personnel_file
        requires:
          all:
            - notFlag: read_mara_file
            - any:
                - notItem: map
                - notItem: token
                - notItem: fuse
                - notItem: badge
        effects:
          set:
            read_mara_file: true
            met_mara: true
            knows_token_location: true
      - id: try_gate_ritual_without_map
        label: Try the gate ritual with the fuse and token before taking the map
        to: signal_map_warning
        requires:
          all:
            - item: fuse
            - item: token
            - notItem: map
            - notFlag: platform_lit
            - notFlag: read_mara_file
        effects:
          set:
            knows_platform: true
            platform_lit: true
      - id: go_to_stopped_clock
        label: Go straight to the stopped clock for the signal token
        to: clock
        requires:
          all:
            - flag: knows_token_location
            - notItem: token
      - id: return_to_tunnel
        label: Return to the tunnel
        to: tunnel
        requires:
          all:
            - notItem: token
            - notFlag: knows_token_location
      - id: go_to_platform
        label: Go to Platform 13
        to: platform
        requires:
          all:
            - any:
                - flag: has_light
                - flag: lights_on
            - any:
                - all:
                    - notFlag: left_unprepared_platform
                    - notFlag: promised_mara
                    - notFlag: read_mara_file
                    - notFlag: knows_release
                - item: map
            - any:
                - notFlag: returned_from_safe_escape
                - item: fuse
            - notFlag: platform_lit
        effects:
          set:
            knows_platform: true
      - id: return_to_lit_platform
        label: Return to the lit Platform 13
        to: lit_platform
        requires:
          all:
            - flag: platform_lit
            - any:
                - item: token
                - notFlag: knows_token_location
        effects:
          set:
            knows_platform: true

  radio:
    text: >
      Beneath the numbers, Mara whispers a route: "Third car. Emergency release
      under the first seat. If the sign says HOME, look away."
    choices:
      - id: note_radio_route
        label: Write down Mara's route
        to: service_room
        effects:
          set:
            knows_release: true
      - id: shut_radio_off
        label: Shut the radio off
        to: service_room

  personnel_file:
    text: >
      The file belongs to Mara Vale, night dispatcher, missing since the signal
      fire. Her last note says: "Badge clears the ledger. Token opens the booth.
      Check the stopped clock in the tunnel—the signal access key is hidden behind
      the hands. Do not let them call my route complete while my name is still in
      transit."
    choices:
      - id: keep_mara_file
        label: Keep Mara's note with the map
        to: service_room

  locker:
    text: >
      The locker contains a wet uniform coat, a fuse stamped PLATFORM LIGHTS,
      and an employee badge for Mara Vale. The badge number matches a blank
      line printed on the back of the old transit notice.
    choices:
      - id: take_fuse
        label: Take the platform fuse
        to: locker
        requires:
          notItem: fuse
        effects:
          addItem: fuse
      - id: take_badge
        label: Take Mara's badge
        to: locker
        requires:
          notItem: badge
        effects:
          addItem: badge
          set:
            has_mara_badge: true
      - id: inspect_badge_back
        label: Read the back of Mara's badge
        to: badge_memory
        requires:
          all:
            - item: badge
            - notFlag: inspected_badge_back
        effects:
          set:
            inspected_badge_back: true
            knows_badge_proof: true
            knows_release: true
      - id: close_locker
        label: Close the locker
        to: service_room
        requires:
          all:
            - item: fuse
            - item: badge

  badge_memory:
    text: >
      The badge is heavier than it should be. On the back, under Mara Vale's
      number, someone scratched a route in tiny block letters: LAST TRAIN,
      THIRD CAR, FIRST SEAT RELEASE. A second hand added one more line later:
      BADGE PROOF OPENS THE LEDGER. DO NOT CLEAR ME BEFORE THE OTHERS. The
      metal is worn smooth where a thumb worried the edge for years.
    choices:
      - id: return_from_badge_memory
        label: Put the badge with the other supplies
        to: locker

  platform:
    text: >
      Platform 13 waits behind a rusted gate. A driverless train rests on the
      track, doors open, destination sign blank. The gate control has an empty
      fuse socket and a token slot stamped SIGNAL ACCESS.
    choices:
      - id: inspect_gate_control
        label: Inspect the gate control
        to: gate_control
        requires:
          notFlag: inspected_gate_control
        effects:
          set:
            inspected_gate_control: true
            knows_token_location: true
      - id: install_fuse
        label: Install the platform fuse
        to: lit_platform
        requires:
          item: fuse
        effects:
          set:
            platform_lit: true
      - id: board_train
        label: Board the train with the map
        to: train_car
        requires:
          all:
            - item: map
            - notItem: fuse
      - id: return_to_service_room
        label: Return to the service room and prepare
        to: service_room
        requires:
          any:
            - notItem: map
            - notItem: token
            - notItem: fuse
            - notItem: badge
        effects:
          set:
            left_unprepared_platform: true
      - id: force_gate
        label: Force the rusted gate without the fuse
        to: gate_warning
        requires:
          all:
            - notItem: fuse
            - notFlag: backed_away_from_gate
        effects:
          set:
            knows_token_location: true

  gate_control:
    text: >
      The gate control is less a lock than a ritual. A burned diagram inside
      the access plate shows three steps: restore PLATFORM LIGHTS, insert the
      SIGNAL BOOTH token, then clear the ledger before boarding. Someone has
      scratched CLOCK = TOKEN into the soot.
    choices:
      - id: install_fuse_and_insert_token
        label: Install the fuse, then insert the signal token
        to: signal_booth
        requires:
          all:
            - item: fuse
            - item: token
            - item: map
        effects:
          set:
            platform_lit: true
      - id: install_fuse_and_try_token_without_map
        label: Install the fuse, then try the signal token before recovering the map
        to: signal_map_warning
        requires:
          all:
            - item: fuse
            - item: token
            - notItem: map
        effects:
          set:
            platform_lit: true
            knows_platform: true
      - id: install_fuse_from_gate_control
        label: Install the platform fuse while the access plate is open
        to: lit_platform
        requires:
          all:
            - item: fuse
            - notItem: token
        effects:
          set:
            platform_lit: true
      - id: return_to_service_room_for_parts
        label: Return to the service room for parts
        to: service_room

  lit_platform:
    text: >
      The platform lights buzz awake. Every advertisement shows the same face:
      Mara Vale, smiling from a missing-person poster dated forty-three years
      ago. The train sign flickers between HOME and WARDEN STREET, but the
      gate control keeps tapping its token slot like a telegraph key.
    choices:
      - id: use_token_slot
        label: Open the signal booth with the map ready
        to: signal_booth
        requires:
          all:
            - item: token
            - item: map
      - id: try_token_without_map
        label: Try the signal token before recovering the map
        to: signal_map_warning
        requires:
          all:
            - item: token
            - notItem: map
        effects:
          set:
            knows_platform: true
      - id: inspect_mara_posters
        label: Inspect Mara's missing-person posters
        to: mara_posters
        requires:
          all:
            - notFlag: inspected_mara_posters
            - notFlag: inspected_badge_back
            - any:
                - notItem: map
                - notItem: token
                - notItem: badge
        effects:
          set:
            inspected_mara_posters: true
            met_mara: true
      - id: board_before_clearing_ledger
        label: Board before checking the signal booth
        to: ledger_warning
        requires:
          all:
            - item: map
            - notFlag: freed_mara
            - notItem: token
      - id: return_from_lit_platform
        label: Return to the service room before boarding
        to: service_room
        requires:
          any:
            - notItem: map
            - notItem: token
            - notItem: badge
      - id: flee_platform
        label: Run for the stairs before the train chooses you
        to: escape_warning
        requires:
          notItem: token

  mara_posters:
    text: >
      Up close, every poster has been altered by the same careful hand. The
      printed word MISSING is crossed out and replaced with IN TRANSIT. Mara's
      badge number is penciled under each photograph, followed by a note:
      "The ledger will not release a dispatcher without her proof of service."
    choices:
      - id: return_to_lit_platform_after_posters
        label: Return to the gate control
        to: lit_platform

  signal_map_warning:
    text: >
      The token turns, but the signal booth unlocks only halfway. Behind the
      glass, the ledger bell rings in time with the blank destination sign.
      The old notice comes back to you: no one boards the empty train safely
      without the marked map.
    choices:
      - id: return_for_map_from_signal_warning
        label: Recover the marked map and return to the half-open booth
        to: signal_map_recovered
        effects:
          addItem: map
          set:
            knows_platform: true
      - id: continue_to_signal_booth_unprepared
        label: Continue into the booth without the map
        to: signal_booth

  signal_map_recovered:
    text: >
      The marked map feels heavier when you bring it back to the half-open
      booth. Its pencil route ends at Platform 13, then hooks upward to the
      signal window as if the mapmaker knew the ledger would ask for proof
      before the train could ask for passengers.
    choices:
      - id: enter_signal_booth_after_map
        label: Open the booth fully and read the ledger
        to: signal_booth

  escape_warning:
    text: >
      The stairwell back to Warden Street is still open, but the lit platform
      makes the empty train look less like a ghost story and more like unfinished
      work. Mara's posters flutter in the tunnel wind, and the token slot keeps
      tapping for a signal key you have not found.
    choices:
      - id: listen_at_stairwell
        label: Listen before you leave Mara behind
        to: mara_stairwell_call
        requires:
          notFlag: heard_escape_call
        effects:
          set:
            heard_escape_call: true
            met_mara: true
            knows_token_location: true
      - id: return_to_lit_platform_from_escape_warning
        label: Return to the gate control and keep searching
        to: lit_platform
      - id: confirm_flee_platform
        label: Leave Mara calling and run back to the street
        to: escape_ending

  mara_stairwell_call:
    text: >
      Halfway up the stairs, the public-address speaker finds one clear breath.
      "If you walk out now, I will understand," Mara says. "But the signal key
      is still behind the stopped clock, and the line will keep asking someone
      else to finish what I could not."
    choices:
      - id: return_from_stairwell_call
        label: Return to the stopped clock for the signal key
        to: clock
      - id: leave_after_stairwell_call
        label: Leave Mara calling and run back to the street
        to: escape_ending

  ledger_warning:
    text: >
      One foot crosses the train threshold, and the public-address speaker
      coughs up Mara's badge number. The blank destination sign waits, but the
      signal booth above the track is still lit, its ledger bell ringing for an
      uncleared name.
    choices:
      - id: check_signal_booth
        label: Check the signal booth before boarding
        to: signal_booth
        requires:
          item: token
      - id: return_for_signal_token
        label: Return to the stopped clock for the signal token
        to: clock
        requires:
          notItem: token
        effects:
          set:
            knows_token_location: true
      - id: board_without_clearing_mara
        label: Board with only the map to guide you
        to: train_car
        requires:
          item: map

  signal_booth:
    text: >
      The token unlocks a signal booth above the track. Inside, a ledger lists
      every passenger the line has kept. Mara's name is the last one not crossed
      out, and her badge number is printed in the margin beside it.
    choices:
      - id: inspect_signal_ledger
        label: Read Mara's uncrossed ledger entry
        to: signal_ledger
        requires:
          notFlag: inspected_signal_ledger
        effects:
          set:
            inspected_signal_ledger: true
      - id: read_passenger_manifest
        label: Read the kept-passenger manifest
        to: passenger_manifest
        requires:
          notFlag: read_passenger_manifest
        effects:
          set:
            read_passenger_manifest: true
      - id: listen_to_manifest_doors
        label: Listen to the marked passenger doors
        to: passenger_echoes
        requires:
          all:
            - flag: read_passenger_manifest
            - notFlag: heard_passenger_echoes
        effects:
          set:
            heard_passenger_echoes: true
      - id: reopen_signal_ledger
        label: Reopen Mara's ledger row
        to: signal_ledger
        requires:
          flag: inspected_signal_ledger

  passenger_manifest:
    text: >
      The earlier pages are not a passenger list so much as a weather report:
      umbrellas left dripping by the stairs, lunch tins still warm, a child's
      mitten pinned beside a transfer. Each name has a tiny door stamped beside
      it, every one still shut. Mara's dispatcher row is set apart at the end,
      its door barred by the same badge proof that can open the rest.
    choices:
      - id: listen_to_manifest_doors_from_manifest
        label: Listen to the marked passenger doors
        to: passenger_echoes
        requires:
          notFlag: heard_passenger_echoes
        effects:
          set:
            heard_passenger_echoes: true
      - id: return_to_signal_ledger_from_manifest
        label: Turn from the manifest to Mara's ledger row
        to: signal_ledger
        effects:
          set:
            inspected_signal_ledger: true

  passenger_echoes:
    text: >
      Behind the stamped doors, the kept passengers are not wailing. They are
      waiting in the small noises people make when they expect a train to be
      late: a thermos cup unscrewed, newspaper pages folded twice, a child
      asking whether the next stop has rain. When Mara's page rustles, every
      door falls silent for her answer.
    choices:
      - id: return_from_passenger_echoes
        label: Return to Mara's ledger row
        to: signal_ledger
        effects:
          set:
            inspected_signal_ledger: true

  signal_ledger:
    text: >
      Mara's row is written in a steadier hand than the others: DISPATCHER
      REMAINING ON DUTY UNTIL ALL PASSENGERS CLEAR. Beside the badge number,
      someone has pressed a thumbprint into the ink so hard it tore the page.
      The earlier manifest pages rustle under your hand, still full of doors
      with passenger names stamped shut. The booth speaker clicks once, waiting
      for proof that she is more than another name the line can keep.
    choices:
      - id: inspect_mara_thumbprint
        label: Touch the torn thumbprint beside Mara's name
        to: mara_thumbprint
        requires:
          all:
            - item: badge
            - notFlag: read_mara_thumbprint
            - notFlag: read_passenger_manifest
        effects:
          set:
            read_mara_thumbprint: true
      - id: read_manifest_from_ledger
        label: Check the kept-passenger manifest before clearing only Mara
        to: passenger_manifest
        requires:
          all:
            - item: badge
            - notFlag: read_mara_thumbprint
            - notFlag: read_passenger_manifest
        effects:
          set:
            read_passenger_manifest: true
      - id: mark_mara_clear_from_ledger
        label: Enter Mara's badge number and clear only her name
        to: mara_released
        requires:
          all:
            - item: badge
            - item: map
            - notFlag: read_passenger_manifest
        effects:
          set:
            freed_mara: true
      - id: clear_manifest_and_mara_from_ledger
        label: Enter Mara's badge number and open every manifest door
        to: passengers_released
        requires:
          all:
            - item: badge
            - item: map
            - flag: read_passenger_manifest
        effects:
          set:
            freed_mara: true
      - id: return_for_marked_map
        label: Recover the marked map and return to Mara's ledger row
        to: signal_ledger
        requires:
          notItem: map
        effects:
          addItem: map
          set:
            knows_platform: true
      - id: return_for_mara_badge
        label: Return to the service room for Mara's badge
        to: service_room
        requires:
          notItem: badge

  mara_thumbprint:
    text: >
      The torn paper warms under your thumb. For a moment, the booth is full of
      raincoats and tired voices. Mara stands at the dispatch panel, pressing
      her print beside the final open line while the last train waits below.
      "No one clears until everyone clears," she says, not to the line, but to
      herself.
    choices:
      - id: return_from_mara_thumbprint
        label: Return to Mara's ledger row
        to: signal_ledger

  mara_released:
    text: >
      The ledger ink lifts from Mara's name like smoke. Far below, the train
      doors open with a softer sound, and the booth speaker carries her first
      full breath in forty-three years. "Third car," Mara says. "I can hold
      the line steady long enough for you to pull the release."
    choices:
      - id: watch_mara_leave_booth
        label: Watch the signal booth go dark behind her
        to: mara_handoff
        requires:
          notFlag: saw_mara_handoff
        effects:
          set:
            saw_mara_handoff: true
      - id: board_after_clearing_mara
        label: Board the third car while Mara holds the line
        to: train_car

  mara_handoff:
    text: >
      The signal booth windows clear one by one. For the first time, Mara is
      not a voice in the walls but a woman stepping away from a desk she kept
      warm for everyone else. "I am done being the last line," she says, and
      the platform lights steady as if they believe her.
    choices:
      - id: return_from_mara_handoff
        label: Cross the platform with Mara beside the line
        to: mara_handoff_boarding

  mara_handoff_boarding:
    text: >
      Mara does not vanish back into the speaker. She walks the platform edge
      with one hand brushing each open door, counting by touch instead of by
      ledger. At the third car, she stops beside the first seat and nods toward
      the release. "I can hold it from here," she says, and this time here
      means beside you.
    choices:
      - id: board_after_mara_handoff
        label: Reach the emergency release while Mara holds the doors
        to: train_car

  passengers_released:
    text: >
      When Mara's badge number touches the ledger, every tiny stamped door in
      the manifest clicks open at once. The booth fills with ordinary sounds:
      a lunch tin latch, a child's laugh, umbrellas shaking rain from their
      ribs. Mara breathes through the speaker and says, "Third car. I can hold
      the line steady while they find the morning."
    choices:
      - id: review_open_manifest_count
        label: Review the opened manifest count with Mara
        to: passenger_manifest_count
        requires:
          notFlag: reviewed_open_manifest_count
        effects:
          set:
            reviewed_open_manifest_count: true
      - id: watch_mara_open_manifest
        label: Watch Mara call the opened doors
        to: mara_manifest_handoff
        requires:
          notFlag: saw_mara_manifest_handoff
        effects:
          set:
            saw_mara_manifest_handoff: true
      - id: listen_to_passenger_answers
        label: Listen as the passengers answer their names
        to: passenger_answers
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
      - id: board_after_releasing_passengers
        label: Cross the platform as the passengers gather
        to: passenger_platform

  passenger_manifest_count:
    text: >
      Mara checks the opened manifest before anyone moves. The doors are no
      longer stamped shut, but the page still remembers what each person
      carried into the line: newspaper, lunch tin, child's mitten, conductor's
      punch. "They need more than clearance," Mara says. "They need one another
      to answer when the train tries to count them again."
    choices:
      - id: listen_after_manifest_count
        label: Listen as the counted passengers answer their names
        to: passenger_answers
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
      - id: ask_conductor_after_manifest_count
        label: Ask the conductor to carry Mara's opened count clear
        to: passenger_conductor_signal
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_answers: true
            helped_passengers_gather: true
            conductor_cleared_platform: true
      - id: cross_after_manifest_count
        label: Cross through the counted crowd as they gather
        to: passenger_platform
      - id: board_after_manifest_count
        label: Board the third car while Mara holds the count
        to: train_car

  mara_manifest_handoff:
    text: >
      Mara does not leave the booth at once. She reads the first opened door,
      waits for its answer, then touches the next line as if steadiness can be
      handed from name to name. By the time she reaches her own row, the
      speaker is full of people breathing with her instead of waiting for her.
    choices:
      - id: board_after_mara_manifest_handoff
        label: Board the third car while Mara keeps calling names
        to: train_car
      - id: continue_manifest_handoff_roll_call
        label: Keep listening as the opened passengers answer Mara
        to: passenger_answers
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
      - id: return_from_mara_manifest_handoff
        label: Return to the opened manifest doors
        to: passengers_released

  passenger_answers:
    text: >
      The opened manifest does not cheer. It answers roll call in small,
      stubborn proofs of life: a man clearing his throat before saying "here,"
      a child asking if the rain is still outside, someone laughing once because
      the word present finally means something again, and the woman with the
      folded newspaper answering "Warden Street" like a stop can become a door.
      Mara waits for every answer before she tells you the third car is ready.
    choices:
      - id: follow_newspaper_answer
        label: Follow the newspaper woman's Warden Street answer
        to: passenger_newspaper_memory
        requires:
          notFlag: heard_newspaper_memory
        effects:
          set:
            heard_newspaper_memory: true
      - id: gather_answered_passengers
        label: Help the answered passengers gather for the third car
        to: passenger_farewell
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
      - id: let_lunch_tin_worker_keep_count
        label: Let the lunch-tin worker count the answered passengers aboard
        to: passenger_lunch_tin_boarding
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            steadied_lunch_tin_worker: true
      - id: ask_conductor_from_answers
        label: Ask the old conductor to call the answered passengers clear
        to: passenger_conductor_signal
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            conductor_cleared_platform: true
      - id: return_from_passenger_answers
        label: Cross through the answered crowd as they gather
        to: passenger_platform
      - id: board_after_passenger_answers
        label: Board the third car while the roll call holds
        to: passenger_answered_handoff_roll_call
        requires:
          flag: saw_mara_manifest_handoff
        effects:
          set:
            heard_answered_passengers: true
      - id: board_after_answered_passengers
        label: Board the third car while the roll call holds
        to: passenger_answered_boarding
        requires:
          notFlag: saw_mara_manifest_handoff

  passenger_answered_boarding:
    text: >
      The answered passengers board by repeating themselves softly enough that
      the train cannot turn the words into a command. The child says present at
      each doorway, the newspaper woman keeps Warden Street folded under one
      thumb, and the old conductor checks the aisle without asking for tickets.
      By the first seat, Mara's speaker has gone quiet. The people she called
      are carrying their own names now, and the emergency release waits beneath
      their feet.
    choices:
      - id: listen_to_answered_passengers_from_boarding
        label: Listen once more as the answered passengers settle
        to: passenger_answered_intercom
        effects:
          set:
            heard_answered_passengers: true
      - id: pull_release_after_answered_boarding
        label: Pull the release while the answered names hold
        to: passenger_true_ending

  passenger_platform:
    text: >
      The platform is no longer empty. People step out of the manifest doors
      carrying ordinary burdens: a folded newspaper, a paper sack darkened by
      rain, the mitten you saw pinned beside a name. None of them look at the
      destination sign. They look to Mara's speaker, then to you, waiting for
      the last door to open.
    choices:
      - id: ask_newspaper_woman_about_stop
        label: Ask the newspaper woman which stop she was trying to reach
        to: passenger_newspaper_memory
        requires:
          notFlag: heard_newspaper_memory
        effects:
          set:
            heard_newspaper_memory: true
      - id: ask_conductor_to_call_platform_clear
        label: Ask the old conductor to call the platform clear
        to: passenger_conductor_signal
        requires:
          all:
            - flag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            conductor_cleared_platform: true
      - id: return_lost_mitten
        label: Return the lost mitten to the child
        to: passenger_mitten_memory
        requires:
          notFlag: returned_lost_mitten
        effects:
          set:
            returned_lost_mitten: true
            helped_passengers_gather: true
      - id: match_manifest_keepsakes
        label: Match the manifest keepsakes to their owners
        to: passenger_keepsake_handoff
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            matched_manifest_keepsakes: true
            helped_passengers_gather: true
      - id: help_passengers_gather
        label: Help the kept passengers gather by the open doors
        to: passenger_farewell
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
      - id: board_with_echoed_manifest
        label: Board as the door echoes follow you
        to: passenger_echoed_boarding
        requires:
          all:
            - flag: heard_passenger_echoes
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
      - id: board_third_car_with_passengers
        label: Board the third car and reach the release
        to: train_car
        requires:
          any:
            - notFlag: heard_passenger_echoes
            - flag: heard_passenger_answers
            - flag: helped_passengers_gather

  passenger_echoed_boarding:
    text: >
      The passengers board quietly, but the sounds you heard behind the stamped
      doors come with them: thermos cap, folded paper, the soft knock of a
      mitten against the third-car frame. None of them look surprised that you
      recognize the rhythm. Mara leaves the speaker open, as if the train needs
      to hear that waiting has turned into boarding.
    choices:
      - id: reach_release_with_echoed_manifest
        label: Follow the familiar echoes to the emergency release
        to: train_car

  passenger_newspaper_memory:
    text: >
      The woman smooths the wet newspaper against her sleeve until the ink
      remembers a date. "Warden Street, then morning transfer," she says,
      pointing to a column where every arrival after 1:13 has been left blank.
      "I kept reading it because the paper was the only thing that still
      believed trains went anywhere." Behind her, the old conductor leans close
      enough to see the schedule and nods once, as if the route has started
      existing again.
    choices:
      - id: ask_conductor_after_newspaper_memory
        label: Let the old conductor call the final platform clear
        to: passenger_conductor_roll_call
        requires:
          all:
            - flag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            conductor_cleared_platform: true
            heard_conductor_clearance: true
            heard_final_roll_call: true
      - id: return_lost_mitten_after_newspaper_memory
        label: Return the lost mitten and lead the child to the third car
        to: passenger_mitten_intercom
        requires:
          notFlag: returned_lost_mitten
        effects:
          set:
            returned_lost_mitten: true
            helped_passengers_gather: true
            heard_gathered_passengers: true
      - id: match_keepsakes_after_newspaper_memory
        label: Match the manifest keepsakes on the way to the third car
        to: passenger_keepsake_intercom
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            matched_manifest_keepsakes: true
            helped_passengers_gather: true
            heard_gathered_passengers: true
      - id: help_passengers_after_newspaper_memory
        label: Use the transfer column to gather passengers into the third car
        to: passenger_newspaper_intercom
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            heard_gathered_passengers: true
      - id: board_after_newspaper_memory
        label: Board the third car by the transfer column
        to: passenger_newspaper_intercom
        effects:
          set:
            helped_passengers_gather: true
            heard_gathered_passengers: true

  passenger_conductor_signal:
    text: >
      The old conductor straightens when you ask for his signal. He does not
      have a lantern, only a punch clipped to a chain, but he raises it like
      one. "Platform clear," he calls, and the answered passengers move as if
      the words have given them rails again: child beside newspaper woman,
      umbrellas lifted away from the wheels, Mara's speaker quiet enough to
      let another worker hold the line.
    choices:
      - id: follow_conductor_signal_to_third_car
        label: Follow the conductor's clear signal into the third car
        to: passenger_conductor_intercom
        effects:
          set:
            heard_conductor_clearance: true

  passenger_mitten_memory:
    text: >
      The child accepts the mitten with both hands, then turns it inside out to
      show a transit stamp older than anyone on the platform should remember.
      "My mother told me not to lose the other one," he says, and the woman
      with the newspaper kneels before Mara can answer. "Then we will find it
      in the morning," she tells him. The crowd shifts closer, not as passengers
      waiting to be counted, but as people beginning to look after one another.
    choices:
      - id: lead_mitten_child_to_third_car
        label: Lead the child and gathered passengers to the third car
        to: passenger_mitten_intercom
        effects:
          set:
            heard_gathered_passengers: true

  passenger_keepsake_handoff:
    text: >
      The manifest's details become a way to make the crowd real again. You
      give the warm lunch tin to the man whose hands still expect its handle,
      point the newspaper woman toward the conductor who remembers her stop,
      and sort the rain-dark umbrellas by the initials etched into their
      hooks. Each small return gives Mara another answered name, until the
      platform sounds less like a ledger and more like people finding their
      places beside one another.
    choices:
      - id: lead_keepsake_passengers_to_third_car
        label: Lead the matched passengers to the third car
        to: passenger_keepsake_boarding

  passenger_keepsake_boarding:
    text: >
      The third car fills by object before it fills by name. The lunch tin
      worker sets his tin under the first seat where the release waits, the
      newspaper woman tucks her transfer column against the window, and each
      umbrella hooks over a rail with its initials facing out. Mara starts to
      read the manifest again, then stops when the ordinary things answer for
      the people holding them.
    choices:
      - id: listen_to_keepsakes_answer_from_boarding
        label: Listen as the keepsakes answer from the third car
        to: passenger_keepsake_intercom
        effects:
          set:
            heard_gathered_passengers: true
      - id: pull_release_after_keepsake_boarding
        label: Pull the release while every keepsake has its owner
        to: passenger_keepsake_true_ending

  passenger_farewell:
    text: >
      You start with the man holding the paper sack. Inside, his lunch tin is
      still warm, packed for a double shift he never reached. When he snaps the
      latch shut, the sound gives the platform a practical rhythm: the child
      with the mitten takes an old conductor's hand, the newspaper woman tucks
      her transfer under the tin's handle, and the crowd moves as if boarding
      has become ordinary work again. No one thanks you yet. They are saving
      their voices for the morning.
    choices:
      - id: return_from_passenger_farewell
        label: Let the lunch-tin worker set the pace to the third car
        to: passenger_lunch_tin_boarding
        effects:
          set:
            steadied_lunch_tin_worker: true
      - id: lead_gathered_passengers_without_lunch_tin_pace
        label: Board the gathered passengers without waiting for his count
        to: train_car

  passenger_lunch_tin_boarding:
    text: >
      The lunch-tin worker boards first and does not sit. He plants one hand on
      the rail, keeps the warm tin tucked against his hip, and clicks the latch
      each time another passenger finds the third car without looking at the
      HOME sign. The child, the newspaper woman, and the old conductor fall
      into that practical rhythm until the aisle feels less like a ledger and
      more like a shift change. Under the first seat, the emergency release
      waits for the count to become movement.
    choices:
      - id: listen_to_lunch_tin_worker_from_boarding
        label: Listen as the lunch-tin worker keeps time
        to: passenger_lunch_tin_intercom
        effects:
          set:
            heard_gathered_passengers: true
      - id: pull_release_after_lunch_tin_boarding
        label: Pull the release while the lunch-tin count holds
        to: passenger_helped_true_ending

  train_car:
    text: >
      The third car smells of rain and hot dust. Under the first seat, your
      fingers find an emergency release. The blank destination sign begins to
      spell HOME one letter at a time.
    choices:
      - id: listen_to_badge_proof_intercom
        label: Listen as Mara answers the badge-proof line
        to: mara_badge_proof_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: knows_badge_proof
            - notFlag: heard_mara_goodbye
            - notFlag: read_passenger_manifest
            - notFlag: read_mara_thumbprint
            - notFlag: saw_mara_handoff
        effects:
          set:
            heard_mara_goodbye: true
      - id: listen_to_mara_thumbprint_intercom
        label: Listen as Mara remembers the torn thumbprint
        to: mara_thumbprint_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_mara_thumbprint
            - notFlag: heard_mara_goodbye
            - notFlag: read_passenger_manifest
            - notFlag: saw_mara_handoff
        effects:
          set:
            heard_mara_goodbye: true
      - id: listen_to_mara_intercom
        label: Listen to Mara before pulling the release
        to: mara_intercom
        requires:
          all:
            - flag: freed_mara
            - notFlag: heard_mara_goodbye
            - notFlag: read_passenger_manifest
            - notFlag: read_mara_thumbprint
            - notFlag: saw_mara_handoff
            - notFlag: knows_badge_proof
        effects:
          set:
            heard_mara_goodbye: true
      - id: listen_to_mara_after_handoff
        label: Listen for Mara after she leaves the booth
        to: mara_handoff_intercom
        requires:
          all:
            - flag: freed_mara
            - notFlag: heard_mara_goodbye
            - notFlag: read_passenger_manifest
            - flag: saw_mara_handoff
            - notFlag: read_mara_thumbprint
        effects:
          set:
            heard_mara_goodbye: true
      - id: listen_to_mara_thumbprint_after_handoff
        label: Listen as Mara carries the torn thumbprint out
        to: mara_thumbprint_handoff_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_mara_thumbprint
            - notFlag: heard_mara_goodbye
            - notFlag: read_passenger_manifest
            - flag: saw_mara_handoff
        effects:
          set:
            heard_mara_goodbye: true
      - id: listen_to_mara_manifest_handoff_intercom
        label: Listen as Mara calls the passengers home
        to: mara_manifest_handoff_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - notFlag: heard_mara_goodbye
            - flag: saw_mara_manifest_handoff
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_mara_goodbye: true
      - id: listen_to_mara_manifest_intercom
        label: Listen as Mara finishes the manifest count
        to: mara_manifest_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - notFlag: heard_mara_goodbye
            - notFlag: saw_mara_manifest_handoff
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
            - notFlag: reviewed_open_manifest_count
            - notFlag: heard_passenger_echoes
        effects:
          set:
            heard_mara_goodbye: true
      - id: listen_to_echoed_manifest_intercom
        label: Listen as the opened doors answer from the car
        to: passenger_echoed_manifest_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - flag: heard_passenger_echoes
            - notFlag: heard_mara_goodbye
            - notFlag: saw_mara_manifest_handoff
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_mara_goodbye: true
      - id: listen_to_counted_manifest_intercom
        label: Listen as Mara carries the reviewed count aboard
        to: passenger_counted_manifest_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - flag: reviewed_open_manifest_count
            - notFlag: heard_mara_goodbye
            - notFlag: saw_mara_manifest_handoff
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_mara_goodbye: true
      - id: listen_to_answered_handoff_passengers
        label: Listen as Mara and the answered passengers board
        to: passenger_answered_handoff_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - flag: saw_mara_manifest_handoff
            - flag: heard_passenger_answers
            - notFlag: helped_passengers_gather
            - notFlag: heard_answered_passengers
        effects:
          set:
            heard_answered_passengers: true
            heard_mara_goodbye: true
      - id: listen_to_answered_passengers
        label: Listen as the answered passengers board
        to: passenger_answered_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - flag: heard_passenger_answers
            - notFlag: saw_mara_manifest_handoff
            - notFlag: helped_passengers_gather
            - notFlag: heard_answered_passengers
        effects:
          set:
            heard_answered_passengers: true
      - id: listen_to_gathered_passengers
        label: Listen to the gathered passengers before the release
        to: passenger_gathered_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - flag: helped_passengers_gather
            - notFlag: matched_manifest_keepsakes
            - notFlag: returned_lost_mitten
            - notFlag: steadied_lunch_tin_worker
            - notFlag: heard_gathered_passengers
        effects:
          set:
            heard_gathered_passengers: true
      - id: listen_to_lunch_tin_worker
        label: Listen as the lunch-tin worker keeps time
        to: passenger_lunch_tin_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - flag: helped_passengers_gather
            - flag: steadied_lunch_tin_worker
            - notFlag: matched_manifest_keepsakes
            - notFlag: returned_lost_mitten
            - notFlag: heard_gathered_passengers
        effects:
          set:
            heard_gathered_passengers: true
      - id: listen_to_mitten_child_intercom
        label: Listen as the mitten child answers from the doorway
        to: passenger_mitten_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - flag: helped_passengers_gather
            - flag: returned_lost_mitten
            - notFlag: heard_gathered_passengers
        effects:
          set:
            heard_gathered_passengers: true
      - id: listen_to_matched_keepsakes
        label: Listen as the matched keepsakes answer for their owners
        to: passenger_keepsake_intercom
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - flag: helped_passengers_gather
            - flag: matched_manifest_keepsakes
            - notFlag: heard_gathered_passengers
        effects:
          set:
            heard_gathered_passengers: true
      - id: pull_release_with_manifest
        label: Pull the release for every name in the manifest
        to: passenger_true_ending
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - notFlag: helped_passengers_gather
      - id: pull_release_after_gathering_passengers
        label: Pull the release once every passenger is ready
        to: passenger_helped_true_ending
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - flag: helped_passengers_gather
            - notFlag: matched_manifest_keepsakes
            - notFlag: returned_lost_mitten
      - id: pull_release_after_matching_keepsakes
        label: Pull the release after the keepsakes steady every name
        to: passenger_keepsake_true_ending
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - flag: helped_passengers_gather
            - flag: matched_manifest_keepsakes
      - id: pull_release_after_returning_mitten
        label: Pull the release after returning the lost mitten
        to: passenger_mitten_true_ending
        requires:
          all:
            - flag: freed_mara
            - flag: read_passenger_manifest
            - flag: helped_passengers_gather
            - flag: returned_lost_mitten
      - id: pull_release
        label: Pull the emergency release
        to: true_ending
        requires:
          all:
            - flag: freed_mara
            - notFlag: read_passenger_manifest
      - id: study_map_in_train
        label: Check the marked transfer map before the doors close
        to: train_map
        requires:
          all:
            - item: map
            - notFlag: freed_mara
            - notFlag: checked_train_map
        effects:
          set:
            checked_train_map: true
      - id: ride_with_map
        label: Follow the map to the morning platform without touching the release
        to: morning_transfer
        requires:
          all:
            - item: map
            - notFlag: freed_mara
      - id: look_at_sign
        label: Look directly at the destination sign
        to: sign_warning
        requires:
          notFlag: freed_mara

  train_map:
    text: >
      Under the train's flickering light, the marked map looks less like a
      route and more like a promise someone kept badly: one transfer marked
      MORNING PLATFORM, one warning circled three times, and a hand-drawn arrow
      away from the HOME sign. The emergency release waits under the seat, but
      without Mara clear in the ledger, the map is the only instruction that
      does not ask you to trust the train.
    choices:
      - id: ride_with_map_after_study
        label: Follow the map to the morning platform
        to: morning_transfer
      - id: lower_map_to_sign
        label: Lower the map and look at the destination sign
        to: sign_warning

  morning_transfer:
    text: >
      The marked map does exactly what it promised. The train skips every
      impossible station and opens on a tiled transfer platform bright with
      morning. Behind you, through the closing doors, the underpass speaker
      keeps whispering names. Mara's is still the clearest.
    choices:
      - id: study_morning_map_note
        label: Read the final note written on the morning map
        to: morning_map_note
        requires:
          notFlag: read_morning_map_note
        effects:
          set:
            read_morning_map_note: true
      - id: listen_at_morning_doors
        label: Listen at the closing doors before you decide
        to: morning_doors
        requires:
          notFlag: heard_morning_doors
        effects:
          set:
            heard_morning_doors: true
      - id: step_into_morning
        label: Step onto the morning platform and leave the line behind
        to: good_ending
      - id: turn_back_for_signal_token
        label: Hold the doors and return to the stopped clock
        to: clock
        requires:
          notItem: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_for_mara
        label: Hold the doors and return for Mara's ledger
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  morning_map_note:
    text: >
      On the back of the marked map, a conductor's pencil has left one last
      instruction: SAFE TRANSFER IS NOT CLEARANCE. Survive first, then send
      someone back with the badge, the fuse, and the signal token. The morning
      light makes the note look practical instead of cruel, but Mara's voice
      keeps reading names behind the closing doors.
    choices:
      - id: leave_after_morning_map_note
        label: Step into morning with the map's warning in mind
        to: good_ending
      - id: turn_back_from_map_note_for_token
        label: Take the map's note seriously and recover the signal token
        to: tunnel
        requires:
          notItem: token
        effects:
          addItem: token
          set:
            found_token: true
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_from_map_note_for_mara
        label: Take the map's note seriously and return for Mara's ledger
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  morning_doors:
    text: >
      At the closing doors, the underpass is only a dark reflection in the
      glass. Mara is not begging. She is reading the ledger in a steady night
      voice, leaving enough silence after each name for someone to answer.
      The morning platform is real under your shoes, but the train has not
      stopped counting.
    choices:
      - id: leave_after_morning_doors
        label: Step into morning with Mara's voice behind you
        to: good_ending
      - id: turn_back_from_morning_doors_for_token
        label: Recover the signal token and return to the tunnel
        to: tunnel
        requires:
          notItem: token
        effects:
          addItem: token
          set:
            found_token: true
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_from_morning_doors_for_mara
        label: Hold the doors and return for Mara's ledger
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  mara_intercom:
    text: >
      Mara's voice returns through the ceiling speaker, no longer buried in
      static. "When the doors open, do not count the passengers," she says.
      "Some of us have been counted for too long. Just pull the release and let
      the morning do the rest."
    choices:
      - id: pull_release_after_manifest_goodbye
        label: Pull the release for Mara and the manifest
        to: passenger_true_ending
        requires:
          flag: read_passenger_manifest
      - id: pull_release_after_mara_goodbye
        label: Pull the release and let the morning in
        to: true_ending
        requires:
          notFlag: read_passenger_manifest

  mara_badge_proof_intercom:
    text: >
      The ceiling speaker warms before Mara speaks. "You found the proof line,"
      she says. "Badge proof required. For forty-three years that sounded like
      a lock. Tonight you made it an answer." The badge in your pocket ticks
      once against the release handle, and her voice steadies around the old
      number. "Pull now. Let the proof open something instead of holding me in
      place."
    choices:
      - id: pull_release_after_badge_proof_goodbye
        label: Pull the release while the badge proof answers
        to: true_ending

  mara_thumbprint_intercom:
    text: >
      Mara's voice steadies when the train shudders around the torn thumbprint
      memory. "I left that mark because the line wanted a last dispatcher more
      than it wanted passengers home," she says. "You cleared the name it could
      hold, and the release will do what I could not finish from the booth: all
      doors, all at once."
    choices:
      - id: pull_release_after_thumbprint_goodbye
        label: Pull the release for every door Mara held open
        to: true_ending

  mara_handoff_intercom:
    text: >
      The speaker clicks after Mara has already left the booth, and for a
      moment you hear her crossing the platform instead of haunting it. "I
      thought stepping away would feel like abandoning my post," she says. "It
      feels more like opening the last door from the other side. Pull the
      release when you are ready."
    choices:
      - id: pull_release_after_handoff_goodbye
        label: Pull the release while Mara opens the far door
        to: mara_handoff_true_ending

  mara_thumbprint_handoff_intercom:
    text: >
      The speaker opens on the sound of Mara touching the far doors with the
      same hand that tore the ledger. "The line wanted my print to mean I
      stayed," she says, no longer behind glass. "Let it mean I witnessed the
      last door open instead. Pull the release while I am still on this side
      of the threshold."
    choices:
      - id: pull_release_after_thumbprint_handoff_goodbye
        label: Pull the release while Mara witnesses the last door
        to: mara_handoff_true_ending

  mara_manifest_handoff_intercom:
    text: >
      The speaker stays open after Mara has called every stamped door. You can
      hear the care in the pauses she leaves between names: long enough for
      breath, short enough that the line cannot teach anyone to wait again.
      "They are not entries anymore," she says. "They are almost through. Pull
      the release while they still sound like people."
    choices:
      - id: pull_release_after_manifest_handoff_goodbye
        label: Pull the release while Mara holds the manifest open
        to: passenger_true_ending

  mara_manifest_intercom:
    text: >
      Mara reads from the opened manifest, and each name answers with a small
      ordinary sound: a lunch tin clasp, a mitten shaken free, umbrellas
      knocking together by the doors. "They remember the way out now," she
      says. "Pull the release before the line teaches them to wait again."
    choices:
      - id: pull_release_after_manifest_goodbye
        label: Pull the release while Mara keeps the doors open
        to: passenger_true_ending

  passenger_echoed_manifest_intercom:
    text: >
      The third car answers with the same small sounds you heard behind the
      stamped doors: thermos cap, newspaper fold, mittened knock against the
      frame. They are no longer trapped behind ink, but the rhythm is familiar
      enough that Mara stops before reading the first name twice. "You heard
      them waiting," she says. "Now let the line hear them leaving."
    choices:
      - id: pull_release_after_echoed_manifest_goodbye
        label: Pull the release while the opened doors answer
        to: passenger_true_ending

  passenger_counted_manifest_intercom:
    text: >
      Mara brings the reviewed count into the third car like a folded timetable.
      She names what each opened door carried back: newspaper, lunch tin,
      mitten, conductor's punch. The passengers answer in small practical
      sounds before she reaches the end, no longer just entries cleared from a
      page but people checking that the others are still with them. "This is
      the count the line cannot keep," Mara says. "Pull the release while they
      are counting one another home."
    choices:
      - id: pull_release_after_counted_manifest_goodbye
        label: Pull the release while the reviewed count holds
        to: passenger_counted_true_ending

  passenger_answered_handoff_roll_call:
    text: >
      The third car does not board in silence. Mara calls from the speaker, but
      the opened passengers answer before her pauses can become another kind of
      waiting: the newspaper woman naming Warden Street, the lunch-tin worker
      counting the door clear, the child answering present from the threshold.
      By the time you reach the first seat, Mara's roll call has become a
      handoff instead of a duty she has to carry alone.
    choices:
      - id: listen_to_answered_handoff_after_roll_call
        label: Listen as Mara lets the answered passengers carry the count
        to: passenger_answered_handoff_intercom
        effects:
          set:
            heard_mara_goodbye: true

  passenger_answered_handoff_intercom:
    text: >
      The third car fills with the rhythm Mara began at the opened manifest:
      her voice offering each name, each passenger answering before the line
      can turn them back into entries. The child says present with both hands
      on the returned doorway, the newspaper woman answers for the stop she
      almost forgot, and Mara lets their voices outrun hers at last. Beneath
      the first seat, the emergency release waits in reach. "They can answer
      for themselves now," she says. "Pull the release while they still believe
      it."
    choices:
      - id: pull_release_after_answered_handoff_intercom
        label: Pull the release while Mara's handoff holds
        to: passenger_true_ending

  passenger_answered_intercom:
    text: >
      The passengers who answered roll call board without rushing. The child
      repeats his own name under his breath, the newspaper woman folds her
      transfer into a square she can hold, and the old conductor counts the
      open doors once without asking Mara to prove them twice. "They heard
      themselves," Mara says through the speaker. "Pull the release before the
      line teaches them to wait for permission again."
    choices:
      - id: pull_release_after_answered_intercom
        label: Pull the release while the answered names hold
        to: passenger_answered_true_ending

  passenger_conductor_intercom:
    text: >
      The conductor's borrowed signal carries into the third car before Mara
      speaks. Under the first seat, the emergency release waits in your hand.
      "Platform clear," he calls again, softer this time, and the answered
      passengers echo it down the aisle until it stops sounding like an order
      and starts sounding like a promise. Mara lets the old worker's voice hold
      the line. "He remembers the way out," she says. "Pull the release on his
      clear."
    choices:
      - id: hear_final_conductor_roll_call
        label: Hear the conductor call the final platform clear
        to: passenger_conductor_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: hear_counted_conductor_roll_call
        label: Hear the conductor call the counted manifest clear
        to: passenger_conductor_count_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - flag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_conductor_clearance
        label: Pull the release on the conductor's clear signal
        to: passenger_conductor_true_ending

  passenger_conductor_roll_call:
    text: >
      The conductor walks the aisle one last time, not punching tickets, only
      touching each open pole and calling the doors clear. The answered
      passengers repeat him in their own voices: clear for the child with both
      hands on the frame, clear for the newspaper woman with her transfer
      folded safe, clear for Mara listening from the speaker without having to
      carry the count alone. By the time he reaches the first seat, his signal
      sounds less like permission than release.
    choices:
      - id: pull_release_after_conductor_roll_call
        label: Pull the release after the conductor's final clear call
        to: passenger_conductor_true_ending

  passenger_conductor_count_roll_call:
    text: >
      The conductor walks the aisle with Mara's opened count folded against his
      punch. He does not ask for tickets. He reads what each passenger carried
      back into the morning: newspaper, lunch tin, child's mitten, conductor's
      punch, then a clear call after every answer. Mara stays on the speaker,
      but she is not carrying the manifest alone anymore. By the time the
      conductor reaches the first seat, the count has become a crowd instead of
      a claim.
    choices:
      - id: pull_release_after_conductor_count
        label: Pull the release after the counted clear call
        to: passenger_conductor_true_ending

  passenger_gathered_intercom:
    text: >
      The passengers gather themselves before Mara can call again. The child
      with the mitten counts the open doors, the old conductor answers each
      number with "clear," and the platform finds a rhythm that does not belong
      to the line anymore. Mara lets their voices carry through the speaker.
      "Now," she says. "While they remember they can move together."
    choices:
      - id: hear_final_passenger_roll_call
        label: Hear the gathered passengers answer one last roll call
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_gathered_intercom
        label: Pull the release while the passengers hold the doors
        to: passenger_helped_true_ending
        requires:
          notFlag: returned_lost_mitten
      - id: pull_release_after_mitten_intercom
        label: Pull the release while the mitten child holds the line
        to: passenger_mitten_true_ending
        requires:
          flag: returned_lost_mitten

  passenger_lunch_tin_intercom:
    text: >
      The lunch-tin worker reaches the third car last, because he keeps stopping
      to count the people who fall into step behind him. His tin latch clicks
      once for each open door, plain and steady enough that Mara stops reading
      names and lets the sound mark time. "He carried lunch for a shift that
      never ended," she says through the speaker. "Let that be the last thing
      the line counts. Pull the release while they are moving together."
    choices:
      - id: hear_final_lunch_tin_roll_call
        label: Hear the lunch-tin worker set the final roll call
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_lunch_tin_intercom
        label: Pull the release while the lunch tin keeps time
        to: passenger_helped_true_ending

  passenger_mitten_intercom:
    text: >
      The child stands in the third-car doorway with both mittens pressed
      against the frame, one found and one returned. When Mara reaches his name
      in the roll call, he answers before anyone can prompt him, then turns and
      calls for the newspaper woman to step in out of the rain. The small
      mittened knock that follows is not a signal the line taught him. It is
      his own way of saying the door is still open, while the emergency release
      waits under the first seat.
    choices:
      - id: hear_final_mitten_roll_call
        label: Hear the child finish the final roll call
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_mitten_child_intercom
        label: Pull the release while the child's door stays open
        to: passenger_mitten_true_ending

  passenger_newspaper_intercom:
    text: >
      The newspaper woman's transfer column becomes the crowd's timetable.
      She reads Warden Street, then morning transfer, and the old conductor
      answers each stop with a clear signal while the lunch-tin latch keeps
      time beside her. Mara lets the schedule carry through the speaker.
      "Good," she says. "Let the line hear them naming where they are going."
    choices:
      - id: hear_final_newspaper_roll_call
        label: Hear the transfer column become the final roll call
        to: passenger_newspaper_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_gathered_intercom
        label: Pull the release while the transfer column holds
        to: passenger_newspaper_true_ending

  passenger_newspaper_roll_call:
    text: >
      Mara begins the final roll call, but the newspaper woman has already
      turned the blank transfer column into a route everyone can answer. The
      old conductor calls clear after each stop, passengers repeat the names
      of streets they thought the line had erased, and the paper no longer
      sounds like yesterday's news. It sounds like directions.
    choices:
      - id: pull_release_after_newspaper_roll_call
        label: Pull the release after every transfer is named
        to: passenger_newspaper_true_ending

  passenger_keepsake_intercom:
    text: >
      The returned keepsakes make the platform answer before Mara has to ask.
      The lunch tin knocks twice against its owner's knee, the newspaper snaps
      open to the correct transfer column, and the umbrellas rise one by one
      like a row of small signal flags. Mara reads the names anyway, but now
      each object gives the person holding it a place to stand. "Good," she
      says through the speaker. "Hold on to what remembered you. Pull the
      release while the line is listening."
    choices:
      - id: hear_final_keepsake_roll_call
        label: Hear the matched passengers finish the roll call
        to: passenger_keepsake_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_keepsake_intercom
        label: Pull the release while the keepsakes hold the names steady
        to: passenger_keepsake_true_ending

  passenger_keepsake_roll_call:
    text: >
      Mara begins the final roll call, but the matched keepsakes answer with
      the passengers. The lunch tin clicks shut after its owner's name, the
      newspaper woman reads the old conductor's stop back to him, and the
      umbrellas lift in order until every initial has a hand beneath it. By the
      last answer, the manifest has become a platform inventory of ordinary
      proof: each person holding the small thing the line could not keep.
    choices:
      - id: pull_release_after_keepsake_roll_call
        label: Pull the release after every keepsake answers
        to: passenger_keepsake_true_ending

  passenger_roll_call_epilogue:
    text: >
      Mara starts with the names whose doors opened first, but the passengers
      finish the roll call for her. The newspaper woman says the conductor's
      name before he can forget it. The child with the mitten answers for
      himself, then for the person who found his other glove under the bench.
      By the final name, the manifest is no longer a list of claims. It is a
      crowd telling the line who belongs to the morning.
    choices:
      - id: pull_release_after_final_roll_call
        label: Pull the release after every answer
        to: passenger_helped_true_ending
        requires:
          notFlag: returned_lost_mitten
      - id: pull_release_after_mitten_roll_call
        label: Pull the release after the child's answer
        to: passenger_mitten_true_ending
        requires:
          flag: returned_lost_mitten

  gate_warning:
    text: >
      The gate bends, but the platform answers with a deep knock from beneath
      the track. The train doors begin to close without you. Whatever is below
      heard the metal scream. The empty fuse socket spits a blue spark, and a
      soot-scratched note beside the token slot flashes in your lantern light:
      CLOCK = TOKEN. The control panel clicks once, offering one last chance to
      stop making noise and gather the proper supplies.
    choices:
      - id: listen_below_gate
        label: Listen to what answered below the platform
        to: gate_echo
        requires:
          notFlag: heard_gate_echo
        effects:
          set:
            heard_gate_echo: true
      - id: back_away_from_gate
        label: Back away for the fuse, badge, map, and clock token
        to: service_room
        effects:
          set:
            backed_away_from_gate: true
      - id: force_gate_anyway
        label: Ignore the final warning and force the gate anyway
        to: gate_collapse

  gate_echo:
    text: >
      Under the bent gate, the dark repeats the sound you made: metal shriek,
      wheel scrape, breath held too long. Then it answers in Mara's borrowed
      voice, reading the first digits of her badge number like a lure. The fuse
      socket sits silent beside your hand, a simpler answer than the thing
      below is offering: fuse for light, badge for proof, map for the route,
      token for the booth.
    choices:
      - id: back_away_after_gate_echo
        label: Back away and gather the four answers
        to: service_room
        effects:
          set:
            backed_away_from_gate: true
      - id: force_gate_after_echo
        label: Ignore what answered and force the gate anyway
        to: gate_collapse

  gate_collapse:
    text: >
      The gate lifts only far enough to show the gap beneath it. The track
      exhales cold air through your sleeves, and the driverless train answers
      by closing one door at a time. The empty fuse socket spits brighter now,
      not as a clue but as a countdown. Behind you, the service-room door is
      still open. Ahead, the thing below the platform is already practicing
      Mara's badge number in your voice.
    choices:
      - id: brace_gate_and_retreat
        label: Drop the gate and retreat for the four supplies
        to: service_room
        effects:
          set:
            backed_away_from_gate: true
      - id: crawl_under_collapsing_gate
        label: Crawl under the gate before the doors finish closing
        to: bad_ending

  sign_warning:
    text: >
      The destination sign almost has you. HOME burns across the glass, bright
      enough to show a street you know and a porch light that should not still
      be on. Mara's warning crackles from the speaker: "Look away."
    choices:
      - id: look_away_from_sign
        label: Look away and trust the map
        to: morning_transfer
        requires:
          item: map
      - id: stare_at_home
        label: Keep staring at HOME
        to: home_sign_echo
        effects:
          set:
            heard_home_sign_echo: true

  home_sign_echo:
    text: >
      HOME keeps adding details it should not know: the chipped step outside
      your door, the warm square of kitchen light, a voice from another room
      saying you are late. The marked map trembles in your hand, its morning
      route suddenly plain and practical. Mara's warning thins to one last
      word: "Away."
    choices:
      - id: cover_home_sign_with_map
        label: Cover the sign with the marked map and step into morning
        to: good_ending
        requires:
          item: map
      - id: let_home_sign_finish
        label: Let HOME finish spelling itself
        to: home_sign_grip
        effects:
          set:
            felt_home_sign_grip: true

  home_sign_grip:
    text: >
      The sign finishes the word, but the map will not fall. Its pencil line to
      MORNING PLATFORM cuts across the false porch light like a transfer stamp,
      and for one breath you can feel both places pulling at your name. The
      train doors begin to close around the choice.
    choices:
      - id: wrench_map_free_from_home_sign
        label: Follow the map's morning line before the doors close
        to: good_ending
        requires:
          item: map
      - id: surrender_to_home_sign
        label: Let HOME take your name
        to: lost_ending

  true_ending:
    ending: true
    text: >
      The release opens every door at once. Names vanish from the signal ledger
      as passengers step into rain-bright morning. Mara's voice thanks you from
      the speaker, finally close enough to sound alive.
    choices: []

  mara_handoff_true_ending:
    ending: true
    text: >
      The release opens every door at once. Names vanish from the signal ledger
      as passengers step into rain-bright morning, and Mara is not only a voice
      thanking them from the speaker. She stands at the far doors with one hand
      on the rail, holding them open until the last name leaves the line behind.
    choices: []

  passenger_true_ending:
    ending: true
    text: >
      The release opens every door at once. The manifest becomes a platform
      full of ordinary miracles: a lunch tin snapping shut, a lost mitten
      pressed into a child's hand, umbrellas lifting into rain-bright morning.
      Mara's voice thanks each passenger by name, then lets the speaker go
      quiet.
    choices: []

  passenger_answered_true_ending:
    ending: true
    text: >
      The release opens every door at once, and the answered passengers do not
      wait for Mara to read them into morning. The child says present while he
      crosses the threshold, the newspaper woman names Warden Street as a place
      already behind her, and the old conductor calls each open door clear
      without touching his punch. Mara listens until their own voices carry the
      last name out of the line.
    choices: []

  passenger_counted_true_ending:
    ending: true
    text: >
      The release opens every door at once, and the reviewed count falls apart
      into people keeping track of one another: the newspaper woman checking
      the child beside her, the lunch-tin worker waiting until the old
      conductor steps clear, Mara letting the last number go unfinished because
      no one is missing anymore. Morning rain reaches the third car as a crowd,
      not a total.
    choices: []

  passenger_helped_true_ending:
    ending: true
    text: >
      The release opens every door at once, and the lunch-tin worker's latch
      becomes the first ordinary sound of morning. The child with the mitten
      walks between two adults who know his name now; the old conductor holds
      the doors until the last umbrella clears the rain. Mara thanks each
      passenger by name, then saves one quiet thank-you for you.
    choices: []

  passenger_conductor_true_ending:
    ending: true
    text: >
      The release opens every door at once on the conductor's clear signal. He
      stands in the rain-bright threshold with his punch raised, not counting
      tickets anymore, only people safely through. The answered passengers
      repeat his call down the platform until every open door sounds like work
      finished well, and Mara lets another worker's voice be the last one the
      line obeys.
    choices: []

  passenger_keepsake_true_ending:
    ending: true
    text: >
      The release opens every door at once, and the matched keepsakes cross the
      threshold with the people they remembered. The lunch tin rides against
      its owner's coat, the newspaper woman carries two transfer columns into
      daylight, and the rain-dark umbrellas open only after every initial has
      cleared the doors. Mara reads the final name, then lets the ordinary
      things answer back.
    choices: []

  passenger_newspaper_true_ending:
    ending: true
    text: >
      The release opens every door at once, and the newspaper woman's blank
      transfer column fills with destinations as the passengers cross into
      rain-bright morning. Warden Street becomes a place behind them, not a
      trap beneath their feet. The old conductor reads the final stop aloud,
      Mara lets the speaker go quiet, and the woman folds tomorrow's route into
      her coat before stepping through.
    choices: []

  passenger_mitten_true_ending:
    ending: true
    text: >
      The release opens every door at once, and the first person through is
      the child clutching both mittens in one hand. He waits at the morning
      doors until the woman with the newspaper catches up, then points out the
      far bench where the other glove should have been all along. The
      passengers laugh because the line has lost its claim on small things, and
      Mara lets that be the final sound before the speaker goes quiet.
    choices: []

  good_ending:
    ending: true
    text: >
      The marked map carries you through one impossible transfer and out to a
      morning platform where the rain smells real. Behind the closing doors,
      the underpass speaker keeps reading from the ledger. Mara's badge number
      is still the clearest name, and the safe route feels less like an ending
      than a promise you survived long enough to break.
    choices: []

  escape_ending:
    ending: true
    text: >
      You run before the train can choose you. Dawn finds you on Warden Street
      with rain in your shoes and the certainty that someone else will hear
      Mara calling tomorrow night.
    choices: []

  lost_ending:
    ending: true
    text: >
      The sign finishes spelling HOME. For one impossible second it shows your
      childhood street, your kitchen window, your own silhouette waving you in.
      The marked map falls unread beside your shoe. The doors close before you
      remember your real name.
