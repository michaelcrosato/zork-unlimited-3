  mara_manifest_thumbprint:
    routeImportance: optional
    text: >
      The torn thumbprint warms under your hand while the opened manifest keeps
      answering Mara. For a moment, her old oath changes shape: not a dispatcher
      holding the last line alone, but a witness keeping the door open until
      every passenger can answer for themselves. Mara inhales when she hears
      the page tear no further. "Then I come through with them," she says.
    choices:
      - id: carry_manifest_thumbprint_to_third_car
        label: Carry Mara's thumbprint oath to the third car
        to: mara_manifest_thumbprint_intercom
        effects:
          set:
            heard_mara_goodbye: true
      - id: board_after_manifest_thumbprint
        label: Board while Mara carries the oath forward
        to: mara_manifest_thumbprint_receipt
        effects:
          set:
            heard_mara_goodbye: true
            confirmed_manifest_thumbprint_receipt: true
      - id: return_from_manifest_thumbprint
        label: Return to the opened manifest doors
        to: passengers_released

  passenger_answers:
    routeImportance: supporting
    text: >
      The opened manifest does not cheer. It answers roll call in small,
      stubborn proofs of life: a man clearing his throat before saying "here,"
      a child asking if the rain is still outside, someone laughing once because
      the word present finally means something again, and the woman with the
      folded newspaper answering "Warden Street" like a stop can become a door.
      Mara waits for every answer before she tells you the third car is ready.
    choices:
      - id: pull_release_after_answered_count
        label: Pull the release after the answered count
        to: passenger_counted_true_ending
        requires:
          flag: passengers_finished_reviewed_count
      - id: follow_newspaper_answer
        label: Follow the newspaper woman's Warden Street answer
        to: passenger_newspaper_memory
        requires:
          notFlag: heard_newspaper_memory
        effects:
