      - id: study_map_in_train
        label: Check the marked transfer map before the doors close
        to: train_map
        requires:
          all:
            - item: map
            - notFlag: freed_mara
            - notFlag: checked_train_map
        effects:
          set:
            checked_train_map: true
      - id: ride_with_map
        label: Follow the map to the morning platform without touching the release
        to: morning_transfer
        requires:
          all:
            - item: map
            - notFlag: freed_mara
      - id: look_at_sign
        label: Look directly at the destination sign
        to: sign_warning
        requires:
          notFlag: freed_mara

  train_map:
    routeImportance: main
    text: >
      Under the train's flickering light, the marked map looks less like a
      route and more like a promise someone kept badly: one transfer marked
      MORNING PLATFORM, one warning circled three times, and a hand-drawn arrow
      away from the HOME sign. The emergency release waits under the seat, but
      without Mara clear in the ledger, the map is the only instruction that
      does not ask you to trust the train.
    choices:
      - id: ride_with_map_after_study
        label: Follow the map to the morning platform
        to: morning_transfer
      - id: lower_map_to_sign
        label: Lower the map and look at the destination sign
        to: sign_warning

  morning_transfer:
    routeImportance: optional
    text: >
      The marked map does exactly what it promised. The train skips every
      impossible station and opens on a tiled transfer platform bright with
      morning. Behind you, through the closing doors, the underpass speaker
      keeps whispering names. Mara's is still the clearest.
    choices:
      - id: study_morning_map_note
        label: Read the final note written on the morning map
        to: morning_map_note
        requires:
          notFlag: read_morning_map_note
        effects:
          set:
            read_morning_map_note: true
      - id: listen_at_morning_doors
        label: Listen at the closing doors before you decide
        to: morning_doors
        requires:
          notFlag: heard_morning_doors
        effects:
          set:
            heard_morning_doors: true
      - id: look_back_at_home_reflection
        label: Look back at the HOME reflection in the train glass
        to: home_sign_echo
        requires:
          all:
            - item: map
            - notFlag: heard_home_sign_echo
        effects:
          set:
            heard_home_sign_echo: true
      - id: mark_morning_transfer_warning
        label: Mark the map with what the next rescuer must bring
        to: morning_warning_mark
        requires:
          notFlag: left_morning_warning
        effects:
          set:
            left_morning_warning: true
      - id: listen_to_clock_from_morning_transfer
        label: Listen as the stopped clock answers the morning platform
        to: morning_clock_catch_up
        requires:
          all:
            - notFlag: heard_morning_clock_catch_up
            - any:
                - flag: found_token
                - flag: knows_token_location
        effects:
          set:
            heard_morning_clock_catch_up: true
      - id: step_into_morning
        label: Step onto the morning platform and leave the line behind
        to: good_ending
      - id: turn_back_for_signal_token
        label: Hold the doors and return to the stopped clock
        to: clock
        requires:
          notItem: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_for_mara
        label: Hold the doors and return for Mara's ledger
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  morning_map_note:
    routeImportance: optional
    text: >
      On the back of the marked map, a conductor's pencil has left one last
      instruction: SAFE TRANSFER IS NOT CLEARANCE. Survive first, then send
      someone back with the badge, the fuse, and the signal token. The morning
      light makes the note look practical instead of cruel, but Mara's voice
      keeps reading names behind the closing doors.
    choices:
      - id: leave_after_morning_map_note
        label: Step into morning with the map's warning in mind
        to: good_ending
      - id: mark_warning_for_next_rescuer
        label: Add your own warning for whoever finds the map next
        to: morning_warning_mark
        requires:
          notFlag: left_morning_warning
        effects:
          set:
            left_morning_warning: true
      - id: turn_back_from_map_note_for_token
        label: Take the map's note seriously and recover the signal token
        to: tunnel
        requires:
          notItem: token
        effects:
          addItem: token
          set:
            found_token: true
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_from_map_note_for_mara
        label: Take the map's note seriously and return for Mara's ledger
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  morning_doors:
    routeImportance: optional
    text: >
      At the closing doors, the underpass is only a dark reflection in the
      glass. Mara is not begging. She is reading the ledger in a steady night
      voice, leaving enough silence after each name for someone to answer.
      The morning platform is real under your shoes, but the train has not
      stopped counting.
    choices:
      - id: leave_after_morning_doors
        label: Step into morning with Mara's voice behind you
        to: good_ending
      - id: mark_door_warning_for_next_rescuer
        label: Mark the map before the doors close
        to: morning_warning_mark
        requires:
          notFlag: left_morning_warning
        effects:
          set:
            left_morning_warning: true
      - id: turn_back_from_morning_doors_for_token
        label: Recover the signal token and return to the tunnel
        to: tunnel
        requires:
          notItem: token
        effects:
          addItem: token
          set:
            found_token: true
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_from_morning_doors_for_mara
        label: Hold the doors and return for Mara's ledger
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  morning_warning_mark:
    routeImportance: optional
    text: >
      You press the conductor's pencil into the soft back of the map until the
      warning darkens under your hand: CLOCK TOKEN. BADGE PROOF. FUSE BEFORE
      GATE. CLEAR MARA VALE BEFORE THE RELEASE. The morning platform does not
      argue with you. It only gives the words enough light to be found by
      someone who may be braver, or only later.
    choices:
      - id: leave_after_marking_morning_warning
        label: Leave the marked warning where the morning light can find it
        to: good_ending
      - id: listen_to_morning_clock_catch_up
        label: Listen as the morning clocks catch up
        to: morning_clock_catch_up
        requires:
          notFlag: heard_morning_clock_catch_up
        effects:
          set:
            heard_morning_clock_catch_up: true
      - id: turn_back_from_warning_mark_for_token
        label: Pocket the map and go back for the signal token
        to: tunnel
        requires:
          notItem: token
        effects:
          addItem: token
          set:
            found_token: true
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_from_warning_mark_for_mara
        label: Pocket the map and return for Mara's ledger
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  morning_clock_catch_up:
    routeImportance: optional
    text: >
      The morning station clocks begin to move in order, each one ticking past
      1:13 as if the hour had only been waiting for permission. Through the
      closing train doors, the underpass clock answers with one dry click.
      Mara stops reading for exactly that long, then starts again from the
      first name on the page. The warning on the map is still wet under your
      thumb.
    choices:
      - id: leave_after_morning_clock_catch_up
        label: Let the clocks move on and step into morning
        to: good_ending
      - id: turn_back_from_morning_clock_for_token
        label: Follow the answering clock back to the signal token
        to: tunnel
        requires:
          notItem: token
        effects:
          addItem: token
          set:
            found_token: true
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_from_morning_clock_for_mara
        label: Return before Mara has to start the ledger again
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  mara_intercom:
    routeImportance: supporting
    text: >
      Mara's voice returns through the ceiling speaker, no longer buried in
      static. "When the doors open, do not count the passengers," she says.
      "Some of us have been counted for too long. Just pull the release and let
      the morning do the rest."
    choices:
      - id: pull_release_after_manifest_goodbye
        label: Pull the release for Mara and the manifest
        to: passenger_true_ending
        requires:
          flag: read_passenger_manifest
      - id: pull_release_after_mara_goodbye
        label: Pull the release and let the morning in
        to: true_ending
        requires:
          notFlag: read_passenger_manifest

  mara_badge_proof_intercom:
    routeImportance: optional
    text: >
      The ceiling speaker warms before Mara speaks. "You found the proof line,"
      she says. "Badge proof required. For forty-three years that sounded like
      a lock. Tonight you made it an answer." The badge in your pocket ticks
      once against the release handle, and her voice steadies around the old
      number. "Pull now. Let the proof open something instead of holding me in
      place."
    choices:
      - id: ask_about_thumbprint_after_badge_proof
        label: Ask Mara why the thumbprint tore the ledger
        to: mara_thumbprint_intercom
        requires:
          flag: read_mara_thumbprint
      - id: pull_release_after_badge_proof_goodbye
        label: Pull the release while the badge proof answers
        to: true_ending

  mara_last_dispatch_intercom:
    routeImportance: main
    text: >
      The speaker carries Mara's last dispatch, and the train cannot flatten it
      into another order. Route held. Doors ready. Release authorized. Between
      each phrase you hear Mara breathing beside the signal, no longer asking
      permission from the ledger she kept alive. "That is the whole message,"
      she says. "Pull once, and let it finally arrive."
    choices:
      - id: listen_to_badge_proof_after_last_dispatch
        label: Listen as Mara ties the last dispatch to her badge proof
        to: mara_badge_proof_intercom
        requires:
          flag: knows_badge_proof
        effects:
          set:
            heard_mara_goodbye: true
      - id: pull_release_after_last_dispatch_goodbye
        label: Pull the release after Mara's last dispatch
        to: true_ending

  mara_thumbprint_intercom:
    routeImportance: optional
    text: >
      Mara's voice steadies when the train shudders around the torn thumbprint
      memory. "I left that mark because the line wanted a last dispatcher more
      than it wanted passengers home," she says. "You cleared the name it could
      hold, and the release will do what I could not finish from the booth: all
      doors, all at once."
    choices:
      - id: pull_release_after_thumbprint_goodbye
        label: Pull the release for every door Mara held open
        to: true_ending

  mara_handoff_intercom:
    routeImportance: optional
    text: >
      The speaker clicks after Mara has already left the booth, and for a
      moment you hear her crossing the platform instead of haunting it. "I
      thought stepping away would feel like abandoning my post," she says. "It
      feels more like opening the last door from the other side. Pull the
      release when you are ready."
    choices:
      - id: pull_release_after_handoff_goodbye
        label: Pull the release while Mara opens the far door
        to: mara_handoff_true_ending

  mara_thumbprint_handoff_intercom:
    routeImportance: optional
    text: >
      The speaker opens on the sound of Mara touching the far doors with the
      same hand that tore the ledger. "The line wanted my print to mean I
      stayed," she says, no longer behind glass. "Let it mean I witnessed the
      last door open instead. Pull the release while I am still on this side
      of the threshold."
    choices:
      - id: pull_release_after_thumbprint_handoff_goodbye
        label: Pull the release while Mara witnesses the last door
        to: mara_handoff_true_ending

  mara_manifest_handoff_intercom:
    routeImportance: optional
    text: >
      The speaker stays open after Mara has called every stamped door. You can
      hear the care in the pauses she leaves between names: long enough for
      breath, short enough that the line cannot teach anyone to wait again.
      "They are not entries anymore," she says. "They are almost through. Pull
      the release while they still sound like people."
    choices:
      - id: pull_release_after_manifest_handoff_goodbye
        label: Pull the release while Mara holds the manifest open
        to: passenger_manifest_handoff_true_ending

  mara_manifest_thumbprint_intercom:
    routeImportance: optional
    text: >
      The third car carries Mara's voice and the soft scrape of her thumb over
      the torn ledger page. "I thought that mark meant I had to be last," she
      says. Around her, the opened passengers answer one by one, and each
      answer loosens the old ink. "Let it mean I stayed long enough to leave
      with them."
    choices:
      - id: pull_release_after_manifest_thumbprint_goodbye
        label: Pull the release while Mara leaves with the manifest
        to: passenger_manifest_thumbprint_true_ending

  mara_manifest_intercom:
    routeImportance: optional
    text: >
      Mara reads from the opened manifest, and each name answers with a small
      ordinary sound: a lunch tin clasp, a mitten shaken free, umbrellas
      knocking together by the doors. "They remember the way out now," she
      says. "Pull the release before the line teaches them to wait again."
    choices:
      - id: let_manifest_names_answer_once
        label: Let the opened names answer once before the release
        to: passenger_manifest_answers
        effects:
          set:
            manifest_names_answered_once: true
      - id: pull_release_after_manifest_goodbye
        label: Pull the release while Mara keeps the doors open
        to: passenger_manifest_true_ending

  passenger_manifest_answers:
    routeImportance: optional
    text: >
      Mara starts again, slower, and this time she does not finish any name
      alone. The lunch-tin worker clicks his clasp on the second syllable, the
      child shakes rain from the mitten on the third, and the newspaper woman
      reads the stop printed under each door. By the final row, the manifest is
      no longer a list. It is a car full of people proving they can answer for
      themselves. "Now," Mara says, almost smiling. "Before the line remembers
      how to interrupt."
    choices:
      - id: pull_release_after_manifest_answers
        label: Pull the release after the manifest answers
        to: passenger_manifest_true_ending

  passenger_echoed_manifest_intercom:
    routeImportance: optional
    text: >
      The third car answers with the same small sounds you heard behind the
      stamped doors: thermos cap, newspaper fold, mittened knock against the
      frame. They are no longer trapped behind ink, but the rhythm is familiar
      enough that Mara stops before reading the first name twice. "You heard
      them waiting," she says. "Now let the line hear them leaving."
    choices:
      - id: pause_for_echoed_boarding
        label: Pause long enough to watch the familiar echoes board
        to: passenger_echoed_boarding
        requires:
          notFlag: echoed_manifest_boarded
        effects:
          set:
            echoed_manifest_boarded: true
      - id: pull_release_after_echoed_manifest_goodbye
        label: Pull the release while the opened doors answer
        to: passenger_echoed_true_ending

  passenger_threshold_intercom:
    routeImportance: optional
    text: >
      The third-car speaker stays open on the threshold you held. Mara names
      the first passenger, then stops when the doorway answers in footsteps
      instead: newspaper, lunch tin, mitten, umbrella, breath. The line tries
      to make the pause into a count, but the passengers keep moving through
      it together. "That is enough proof," Mara says. "Pull the release before
      the threshold remembers how to close."
    choices:
      - id: pull_release_after_threshold_manifest
        label: Pull the release while the threshold stays open
        to: passenger_true_ending

  passenger_room_intercom:
    routeImportance: optional
    text: >
      The speaker carries the noise of people making room for one another:
      knees shifting, bags passed hand to hand, the lunch tin set carefully
      under the first seat beside the release. Mara does not read another name.
      "That is what the ledger never knew how to count," she says. "Enough
      space for everyone to leave together."
    choices:
      - id: pass_room_release_after_intercom
        label: Pass the release handle through the steadied car
        to: passenger_room_release
        requires:
          notFlag: shared_release_reached
        effects:
          set:
            shared_release_reached: true
      - id: pull_release_after_making_room
        label: Pull the release while the car holds everyone
        to: passenger_true_ending

  passenger_room_release:
    routeImportance: optional
    text: >
      You do not pull the release alone. The newspaper woman braces the seat,
      the lunch-tin worker clears the strap from the floor, and the mittened
      child puts both hands over yours before the handle gives. The motion
      travels through the crowded car like a decision everyone is allowed to
      share.
    choices:
      - id: pull_shared_release_after_making_room
        label: Pull together once every hand has found the release
        to: passenger_true_ending

  passenger_counted_manifest_intercom:
    routeImportance: optional
    text: >
      Mara brings the reviewed count into the third car like a folded timetable.
      She names what each opened door carried back: newspaper, lunch tin,
      mitten, conductor's punch. The passengers answer in small practical
      sounds before she reaches the end, no longer just entries cleared from a
      page but people checking that the others are still with them. "This is
      the count the line cannot keep," Mara says. "Pull the release while they
      are counting one another home."
    choices:
      - id: let_passengers_finish_reviewed_count
        label: Let the passengers finish the reviewed count together
        to: passenger_counted_chorus
        requires:
          notFlag: passengers_finished_reviewed_count
        effects:
          set:
            passengers_finished_reviewed_count: true
      - id: pull_release_before_reviewed_count_finishes
        label: Pull the release before Mara has to finish the count
        to: passenger_reviewed_count_true_ending
      - id: pull_release_after_counted_manifest_goodbye
        label: Pull the release while the reviewed count holds
        to: passenger_counted_true_ending

  passenger_counted_chorus:
    routeImportance: optional
    text: >
      Mara stops at the old blank space, but the passengers do not. The
      newspaper woman reads the transfer aloud, the lunch-tin worker answers
      with the time she should have clocked out, the mitten child says present
      twice so the old conductor can hear. By the time Mara breathes again, the
      count has become a chorus with no last name left for the line to claim.
    choices:
      - id: pull_release_after_counted_chorus
        label: Pull the release after the passengers finish the count
        to: passenger_counted_true_ending

  passenger_morning_intercom:
    routeImportance: optional
    text: >
      The third-car speaker catches the morning chorus as the passengers board.
      Someone names the kettle before it boils dry. Someone else remembers the
      time clock, the radiator, the raincoat still hanging by a back door. Mara
      does not turn those memories into proof; she lets them stay ordinary
      until the destination sign gives up spelling HOME and starts showing
      stops with real streets again.
    choices:
      - id: pull_release_after_morning_chorus_boarding
        label: Pull the release while the morning chorus points home
        to: passenger_true_ending

  passenger_answered_handoff_roll_call:
    routeImportance: optional
    text: >
      The third car does not board in silence. Mara calls from the speaker, but
      the opened passengers answer before her pauses can become another kind of
      waiting: the newspaper woman naming Warden Street, the lunch-tin worker
      counting the door clear, the child answering present from the threshold.
      By the time you reach the first seat, Mara's roll call has become a
      handoff instead of a duty she has to carry alone.
    choices:
      - id: listen_to_answered_handoff_after_roll_call
        label: Listen as Mara lets the answered passengers carry the count
        to: passenger_answered_handoff_intercom
        effects:
          set:
            heard_mara_goodbye: true

  passenger_answered_handoff_intercom:
    routeImportance: optional
    text: >
      The third car fills with the rhythm Mara began at the opened manifest:
      her voice offering each name, each passenger answering before the line
      can turn them back into entries. The child says present with both hands
      on the returned doorway, the newspaper woman answers for the stop she
      almost forgot, and Mara lets their voices outrun hers at last. Beneath
      the first seat, the emergency release waits in reach. "They can answer
      for themselves now," she says. "Pull the release while they still believe
      it."
    choices:
      - id: pull_release_after_answered_handoff_intercom
        label: Pull the release while Mara's handoff holds
        to: passenger_answered_handoff_true_ending

  passenger_answered_intercom:
    routeImportance: optional
    text: >
      The passengers who answered roll call board without rushing. The child
      repeats his own name under his breath, the newspaper woman folds her
      transfer into a square she can hold, and the old conductor counts the
      open doors once without asking Mara to prove them twice. "They heard
      themselves," Mara says through the speaker. "Pull the release before the
      line teaches them to wait for permission again."
    choices:
      - id: pull_release_after_answered_intercom
        label: Pull the release while the answered names hold
        to: passenger_answered_true_ending

  passenger_conductor_intercom:
    routeImportance: supporting
    text: >
      The conductor's borrowed signal carries into the third car before Mara
      speaks. Under the first seat, the emergency release waits in your hand.
      "Platform clear," he calls again, softer this time, and the answered
      passengers echo it down the aisle until it stops sounding like an order
      and starts sounding like a promise. Mara lets the old worker's voice hold
      the line. "He remembers the way out," she says. "Pull the release on his
      clear."
    choices:
      - id: hear_final_conductor_roll_call
        label: Hear the conductor call the final platform clear
        to: passenger_conductor_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: hear_counted_conductor_roll_call
        label: Hear the conductor call the counted manifest clear
        to: passenger_conductor_count_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - flag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: ask_conductor_to_punch_transfer
        label: Ask the conductor to punch one last transfer for morning
        to: passenger_conductor_transfer
        requires:
          notFlag: punched_conductor_transfer
        effects:
          set:
            punched_conductor_transfer: true
      - id: hold_for_conductor_roll_call_before_release
        label: Hold the release until the conductor clears every door
        to: passenger_conductor_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: hold_for_conductor_count_before_release
        label: Hold the release until the conductor clears the counted manifest
        to: passenger_conductor_count_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - flag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true

  passenger_conductor_transfer:
    routeImportance: optional
    text: >
      The old conductor takes the blank transfer from the newspaper woman's
      hand and slides it into his punch. The tool bites once, leaving a clean
      star-shaped hole where the destination should have been. "Valid for
      morning," he says, and passes it down the aisle until the child, the
      lunch-tin worker, and Mara all touch the same small proof that the line
      has to let them change trains.
    choices:
      - id: pass_punched_transfer_to_child
        label: Let the child carry the punched transfer to Mara's speaker
        to: passenger_conductor_transfer_handoff
        requires:
          all:
            - notFlag: reviewed_open_manifest_count
            - notFlag: punched_transfer_carried_forward
        effects:
          set:
            punched_transfer_carried_forward: true
      - id: press_punched_transfer_to_speaker
        label: Press the punched transfer to Mara's speaker before pulling the release
        to: passenger_conductor_transfer_proof
        requires:
          all:
            - notFlag: reviewed_open_manifest_count
            - notFlag: pressed_transfer_to_speaker
        effects:
          set:
            punched_transfer_carried_forward: true
            pressed_transfer_to_speaker: true
      - id: pull_release_with_punched_transfer
        label: Pull the release while the punched transfer is still being passed
        to: passenger_conductor_transfer_true_ending
        requires:
          notFlag: reviewed_open_manifest_count
      - id: hear_counted_transfer_conductor_roll_call
        label: Let the punched transfer carry the counted clear call
        to: passenger_conductor_count_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - flag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: hear_transfer_conductor_roll_call
        label: Let the punched transfer become the final clear call
        to: passenger_conductor_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: hold_for_transfer_conductor_roll_call
        label: Hold the release while the punched transfer becomes a clear call
        to: passenger_conductor_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: hold_for_transfer_conductor_count
        label: Hold the release while the punched transfer carries the count
        to: passenger_conductor_count_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - flag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true

  passenger_conductor_transfer_handoff:
    routeImportance: optional
    text: >
      The child takes the punched transfer in both hands and walks it to the
      ceiling speaker as if Mara can take hold from the other side. The
      conductor steadies the aisle pole. The newspaper woman reads the blank
      destination aloud as morning, and the lunch-tin worker answers with the
      shift bell he never reached. When the paper reaches the speaker grille,
      Mara laughs once, startled by proof light enough to pass hand to hand.
      "That is enough," she says. "Pull it now."
    choices:
      - id: press_transfer_to_speaker_grille
        label: Press the punched transfer flat against Mara's speaker grille
        to: passenger_conductor_transfer_proof
        requires:
          notFlag: pressed_transfer_to_speaker
        effects:
          set:
            pressed_transfer_to_speaker: true
      - id: pull_release_after_transfer_handoff
        label: Pull the release after the punched transfer reaches Mara
        to: passenger_conductor_transfer_true_ending

  passenger_conductor_transfer_proof:
    routeImportance: optional
    text: >
      You press the punched transfer against the speaker grille. The star hole
      lines up with Mara's voice and the carriage lights shine through it,
      throwing one small morning-shaped mark across the ceiling. The child sees
      it first. Then the newspaper woman, the lunch-tin worker, and the old
      conductor look up together, all of them watching proof pass through paper
      instead of being trapped inside it. Mara whispers, "Now it belongs to
      them too."
    choices:
      - id: pull_release_after_transfer_proof
        label: Pull the release while the punched transfer shines through
        to: passenger_conductor_transfer_true_ending

  passenger_conductor_roll_call:
    routeImportance: supporting
    text: >
      The conductor walks the aisle one last time, not punching tickets, only
      touching each open pole and calling the doors clear. The answered
      passengers repeat him in their own voices: clear for the child with both
      hands on the frame, clear for the newspaper woman with her transfer
      folded safe, clear for Mara listening from the speaker without having to
      carry the count alone. By the time he reaches the first seat, his signal
      sounds less like permission than release.
    choices:
      - id: pull_release_after_conductor_roll_call
        label: Pull the release after the conductor's final clear call
        to: passenger_conductor_true_ending
        requires:
          notFlag: punched_conductor_transfer
      - id: pull_release_after_conductor_transfer
        label: Pull the release after the conductor's punched transfer
        to: passenger_conductor_transfer_true_ending
        requires:
          flag: punched_conductor_transfer
      - id: pass_punched_transfer_from_roll_call
        label: Let the child carry the punched transfer from the clear call to Mara
        to: passenger_conductor_transfer_handoff
        requires:
          all:
            - flag: punched_conductor_transfer
            - notFlag: punched_transfer_carried_forward
        effects:
          set:
            punched_transfer_carried_forward: true

  passenger_conductor_count_roll_call:
    routeImportance: optional
    text: >
      The conductor walks the aisle with Mara's opened count folded against his
      punch. He does not ask for tickets. He reads what each passenger carried
      back into the morning: newspaper, lunch tin, child's mitten, conductor's
      punch, then a clear call after every answer. Mara stays on the speaker,
      but she is not carrying the manifest alone anymore. By the time the
      conductor reaches the first seat, the count has become a crowd instead of
      a claim.
    choices:
      - id: pull_release_after_conductor_count
        label: Pull the release after the counted clear call
        to: passenger_conductor_count_true_ending
        requires:
          notFlag: punched_conductor_transfer
      - id: pull_release_after_conductor_count_transfer
        label: Pull the release after the conductor's counted transfer
        to: passenger_conductor_count_true_ending
        requires:
          flag: punched_conductor_transfer
      - id: pass_counted_punched_transfer_to_mara
        label: Let the child carry the counted punched transfer to Mara
        to: passenger_conductor_transfer_handoff
        requires:
          all:
            - flag: punched_conductor_transfer
            - notFlag: punched_transfer_carried_forward
        effects:
          set:
            punched_transfer_carried_forward: true

  passenger_gathered_intercom:
    routeImportance: optional
    text: >
      The passengers gather themselves before Mara can call again. The child
      with the mitten counts the open doors, the old conductor answers each
      number with "clear," and the platform finds a rhythm that does not belong
      to the line anymore. Mara lets their voices carry through the speaker.
      "Now," she says. "While they remember they can move together."
    choices:
      - id: hear_final_passenger_roll_call
        label: Hear the gathered passengers answer one last roll call
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_gathered_intercom
        label: Pull the release while the passengers hold the doors
        to: passenger_helped_true_ending
        requires:
          notFlag: returned_lost_mitten
      - id: pull_release_after_mitten_intercom
        label: Pull the release while the mitten child holds the line
        to: passenger_mitten_true_ending
        requires:
          flag: returned_lost_mitten

  passenger_lunch_tin_intercom:
    routeImportance: optional
    text: >
      The lunch-tin worker reaches the third car last, because he keeps stopping
      to count the people who fall into step behind him. His tin latch clicks
      once for each open door, plain and steady enough that Mara stops reading
      names and lets the sound mark time. "He carried lunch for a shift that
      never ended," she says through the speaker. "Let that be the last thing
      the line counts. Pull the release while they are moving together."
    choices:
      - id: read_lunch_tin_roster
        label: Read the shift roster tucked inside the lunch tin
        to: passenger_lunch_tin_roster
        requires:
          notFlag: read_lunch_tin_roster
        effects:
          set:
            read_lunch_tin_roster: true
      - id: hear_final_lunch_tin_roll_call
        label: Hear the lunch-tin worker set the final roll call
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_lunch_tin_intercom
        label: Pull the release while the lunch tin keeps time
        to: passenger_lunch_tin_true_ending

  passenger_lunch_tin_roster:
    routeImportance: optional
    text: >
      Folded under the tin's lid is a shift roster softened by steam. The
      worker has written the passenger names in the margin whenever the line
      tried to make him count tickets instead of people. Child with red
      mitten. Newspaper woman. Old conductor. Dispatcher Vale. At the bottom,
      his own name waits beside the words CLOCK OUT AFTER EVERYONE ELSE.
    choices:
      - id: pull_release_after_lunch_tin_roster
        label: Pull the release after the worker clocks everyone out
        to: passenger_lunch_tin_true_ending

  passenger_mitten_intercom:
    routeImportance: optional
    text: >
      The child stands in the third-car doorway with both mittens pressed
      against the frame, one found and one returned. When Mara reaches his name
      in the roll call, he answers before anyone can prompt him, then turns and
      calls for the newspaper woman to step in out of the rain. The small
      mittened knock that follows is not a signal the line taught him. It is
      his own way of saying the door is still open, while the emergency release
      waits under the first seat.
    choices:
      - id: tap_paired_mittens_for_missing_name
        label: Let the child tap both mittens for the name still missing
        to: passenger_mitten_pair_memory
        requires:
          notFlag: heard_mitten_pair_memory
        effects:
          set:
            heard_mitten_pair_memory: true
      - id: hear_final_mitten_roll_call
        label: Hear the child finish the final roll call
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_mitten_child_intercom
        label: Pull the release while the child's door stays open
        to: passenger_mitten_true_ending

  passenger_mitten_pair_memory:
    routeImportance: optional
    text: >
      The child taps one mitten against the frame, then the other. The knocks
      sound different: one wool-soft and one stiff with station dust. "This one
      was mine," he says, lifting the returned mitten, "but somebody kept it
      warm." Mara checks the manifest without asking him to wait. The next
      name answers from the crowd before she can finish reading it, and the
      child grins like the door has learned a second language.
    choices:
      - id: hear_roll_call_after_paired_mittens
        label: Hear the roll call answer the child's paired knocks
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_paired_mittens
        label: Pull the release after both mittens answer
        to: passenger_mitten_true_ending

  passenger_newspaper_intercom:
    routeImportance: optional
    text: >
      The newspaper woman's transfer column becomes the crowd's timetable.
      She reads Warden Street, then morning transfer, and the old conductor
      answers each stop with a clear signal while the lunch-tin latch keeps
      time beside her. Mara lets the schedule carry through the speaker.
      "Good," she says. "Let the line hear them naming where they are going."
    choices:
      - id: hear_final_newspaper_roll_call
        label: Hear the transfer column become the final roll call
        to: passenger_newspaper_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_gathered_intercom
        label: Pull the release while the transfer column holds
        to: passenger_newspaper_true_ending

  passenger_newspaper_roll_call:
    routeImportance: optional
    text: >
      Mara begins the final roll call, but the newspaper woman has already
      turned the blank transfer column into a route everyone can answer. The
      old conductor calls clear after each stop, passengers repeat the names
      of streets they thought the line had erased, and the paper no longer
      sounds like yesterday's news. It sounds like directions.
    choices:
      - id: pull_release_after_newspaper_roll_call
        label: Pull the release after every transfer is named
        to: passenger_newspaper_true_ending

  passenger_keepsake_intercom:
    routeImportance: optional
    text: >
      At the third-car speaker, the returned keepsakes make the platform
      answer before Mara has to ask.
      The lunch tin knocks twice against its owner's knee, the newspaper snaps
      open to the correct transfer column, and the umbrellas rise one by one
      like a row of small signal flags. Mara reads the names anyway, but now
      each object gives the person holding it a place to stand. "Good," she
      says through the speaker. "Hold on to what remembered you. Pull the
      release while the line is listening."
    choices:
      - id: hear_final_keepsake_roll_call
        label: Hear the matched passengers finish the roll call
        to: passenger_keepsake_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_keepsake_intercom
        label: Pull the release while the keepsakes hold the names steady
        to: passenger_keepsake_true_ending

  passenger_keepsake_roll_call:
    routeImportance: optional
    text: >
      Mara begins the final roll call, but the matched keepsakes answer with
      the passengers. The lunch tin clicks shut after its owner's name, the
      newspaper woman reads the old conductor's stop back to him, and the
      umbrellas lift in order until every initial has a hand beneath it. By the
      last answer, the manifest has become a platform inventory of ordinary
      proof: each person holding the small thing the line could not keep.
    choices:
      - id: pull_release_after_keepsake_roll_call
        label: Pull the release after every keepsake answers
        to: passenger_keepsake_true_ending

  passenger_roll_call_epilogue:
    routeImportance: optional
    text: >
      Mara starts with the names whose doors opened first, but the passengers
      finish the roll call for her. The newspaper woman says the conductor's
      name before he can forget it. The child with the mitten answers for
      himself, then for the person who found his other glove under the bench.
      By the final name, the manifest is no longer a list of claims. It is a
      crowd telling the line who belongs to the morning.
    choices:
      - id: pull_release_after_final_roll_call
        label: Pull the release after every answer
        to: passenger_roll_call_true_ending
        requires:
          notFlag: returned_lost_mitten
      - id: pull_release_after_mitten_roll_call
        label: Pull the release after the child's answer
        to: passenger_mitten_true_ending
        requires:
          flag: returned_lost_mitten

  gate_warning:
    routeImportance: optional
    text: >
      The gate bends, but the platform answers with a deep knock from beneath
      the track. The train doors begin to close without you. Whatever is below
      heard the metal scream. The empty fuse socket spits a blue spark, and a
      soot-scratched note beside the token slot flashes in your lantern light:
      CLOCK = TOKEN. The control panel clicks once, offering one last chance to
      stop making noise and gather the proper supplies.
    choices:
      - id: back_away_from_gate
        label: Back away for the fuse, badge, map, and clock token
        to: service_room
        effects:
          set:
            backed_away_from_gate: true
      - id: listen_below_gate
        label: Listen to what answered below the platform
        to: gate_echo
        requires:
          notFlag: heard_gate_echo
        effects:
          set:
            heard_gate_echo: true
      - id: force_gate_anyway
        label: Ignore the final warning and force the gate anyway
        to: gate_collapse

  gate_echo:
    routeImportance: optional
    text: >
      Under the bent gate, the dark repeats the sound you made: metal shriek,
      wheel scrape, breath held too long. Then it answers in Mara's borrowed
      voice, reading the first digits of her badge number like a lure. The fuse
      socket sits silent beside your hand, a simpler answer than the thing
      below is offering: fuse for light, badge for proof, map for the route,
      token for the booth.
    choices:
      - id: back_away_after_gate_echo
        label: Back away and gather the four answers
        to: service_room
        effects:
          set:
            backed_away_from_gate: true
      - id: force_gate_after_echo
        label: Ignore what answered and force the gate anyway
        to: gate_collapse

  gate_collapse:
    routeImportance: optional
    text: >
      The gate lifts only far enough to show the gap beneath it. The track
      exhales cold air through your sleeves, and the driverless train answers
      by closing one door at a time. The empty fuse socket spits brighter now,
      not as a clue but as a countdown. Behind you, the service-room door is
      still open. Ahead, the thing below the platform is already practicing
      Mara's badge number in your voice.
    choices:
      - id: brace_gate_and_retreat
        label: Drop the gate and retreat for the four supplies
        to: gate_retreat_recovery
        effects:
          set:
            backed_away_from_gate: true
      - id: crawl_under_collapsing_gate
        label: Crawl under the gate before the doors finish closing
        to: bad_ending

  gate_retreat_recovery:
    routeImportance: optional
    text: >
      The gate slams down hard enough to shake rust from the ceiling. Back in
      the service room, the four missing answers are suddenly less like clues
      and more like tools you can name under pressure: Mara's map on the desk,
      the platform fuse and badge in the locker, and the signal token behind
      the stopped clock.
    choices:
      - id: take_map_after_gate_retreat
        label: Grab Mara's marked map from the desk
        to: service_room
        requires:
          notItem: map
        effects:
          addItem: map
          set:
            knows_platform: true
      - id: open_locker_after_gate_retreat
        label: Open the locker for the fuse and Mara's badge
        to: locker
        requires:
          any:
            - notItem: fuse
            - notItem: badge
      - id: go_to_clock_after_gate_retreat
        label: Go to the stopped clock for the signal token
        to: clock
        requires:
          notItem: token
        effects:
          set:
            knows_token_location: true
      - id: steady_hands_after_gate_retreat
        label: Steady your hands and check the service room
        to: service_room

  sign_warning:
    routeImportance: optional
    text: >
      The destination sign almost has you. HOME burns across the glass, bright
      enough to show a street you know and a porch light that should not still
      be on. Mara's warning crackles from the speaker: "Look away."
    choices:
      - id: look_away_from_sign
        label: Look away and trust the map
        to: morning_transfer
        requires:
          item: map
      - id: follow_mara_note_from_sign
        label: Follow Mara's note back to the service room
        to: service_room
        requires:
          all:
            - item: map
            - flag: read_mara_file
        effects:
          set:
            resisted_home_sign_with_mara_note: true
            met_mara: true
            knows_platform: true
            knows_token_location: true
            knows_badge_proof: true
      - id: listen_for_mara_under_home_warning
        label: Listen for Mara beneath the HOME sign
        to: home_sign_dispatch
        requires:
          notFlag: heard_home_sign_dispatch
        effects:
          set:
            heard_home_sign_dispatch: true
            met_mara: true
            knows_token_location: true
            knows_badge_proof: true
      - id: stare_at_home
        label: Keep staring at HOME
        to: home_sign_echo
        effects:
          set:
            heard_home_sign_echo: true
      - id: step_toward_porch_light
        label: Step closer to the impossible porch light
        to: home_sign_grip
        effects:
          set:
            felt_home_sign_grip: true

  home_sign_echo:
    routeImportance: optional
    text: >
      HOME keeps adding details it should not know: the chipped step outside
      your door, the warm square of kitchen light, a voice from another room
      saying you are late. The marked map trembles in your hand, its morning
      route suddenly plain and practical. Mara's warning thins to one last
      word: "Away."
    choices:
      - id: cover_home_sign_with_map
        label: Cover the sign with the marked map and step into morning
        to: good_ending
        requires:
          item: map
      - id: listen_under_home_sign
        label: Listen for Mara beneath the HOME sign
        to: home_sign_dispatch
        requires:
          notFlag: heard_home_sign_dispatch
        effects:
          set:
            heard_home_sign_dispatch: true
            met_mara: true
            knows_token_location: true
            knows_badge_proof: true
      - id: step_into_home_reflection
        label: Step into the HOME reflection and let the map fall
        to: lost_ending
        effects:
          set:
            surrendered_home_to_reflection: true
      - id: let_home_sign_finish
        label: Let HOME finish spelling itself
        to: home_sign_grip
        effects:
          set:
            felt_home_sign_grip: true

  home_sign_dispatch:
    routeImportance: optional
    text: >
      You listen past the porch light and hear the station speaker stuttering
      under it. "That is not home," Mara says, each word dragging through static
      and brake dust. "Map for morning if you leave. Clock token, fuse, badge,
      ledger if you come back for us." The HOME sign brightens, but now it has
      to compete with a real voice.
    choices:
      - id: cover_home_sign_after_dispatch
        label: Cover the sign with the map and take the morning transfer
        to: good_ending
        requires:
          item: map
      - id: turn_back_after_home_sign_dispatch
        label: Turn back for the clock token, fuse, badge, and ledger
        to: service_room
        effects:
          set:
            escaped_home_sign_dispatch: true
      - id: step_into_false_home_after_dispatch
        label: Step toward the porch light instead of Mara's voice
        to: lost_after_dispatch_ending
        effects:
          set:
            surrendered_home_after_dispatch: true
      - id: let_home_sign_drown_mara
        label: Let HOME drown Mara out
        to: lost_after_dispatch_ending
        effects:
          set:
            surrendered_home_after_dispatch: true
            let_home_drown_mara: true

  home_sign_grip:
    routeImportance: optional
    text: >
      The sign finishes the word, but the map will not fall. Its pencil line to
      MORNING PLATFORM cuts across the false porch light like a transfer stamp,
      and for one breath you can feel both places pulling at your name. The
      train doors begin to close around the choice. The service-room route is
      still printed on the map's damp reverse, smeared but readable: badge,
      fuse, clock token, ledger.
    choices:
      - id: jam_map_in_home_sign_doors
        label: Jam the map in the doors and tumble back to the service room
        to: service_room
        requires:
          item: map
        effects:
          set:
            escaped_home_sign_grip: true
            knows_token_location: true
            knows_badge_proof: true
      - id: wrench_map_free_from_home_sign
        label: Follow the map's morning line before the doors close
        to: good_ending
        requires:
          item: map
      - id: surrender_to_home_sign
        label: Let HOME take your name
        to: lost_ending

  true_ending:
    ending: true
    routeImportance: main
    endingType: ideal
    endingGroup: Mara
    endingFamily: Core
    text: >
      The release opens every door at once. Names vanish from the signal ledger
      as passengers step into rain-bright morning. Mara's voice thanks you from
      the speaker, finally close enough to sound alive.
    choices: []

  mara_handoff_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Mara
    endingFamily: Core
    text: >
      The release opens every door at once. Names vanish from the signal ledger
      as passengers step into rain-bright morning, and Mara is not only a voice
      thanking them from the speaker. She stands at the far doors with one hand
      on the rail, holding them open until the last name leaves the line behind.
    choices: []

  passenger_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Core
    text: >
      The release opens every door at once. The manifest becomes a platform
      full of ordinary miracles: a lunch tin snapping shut, a lost mitten
      pressed into a child's hand, umbrellas lifting into rain-bright morning.
      Mara's voice thanks each passenger by name, then lets the speaker go
      quiet.
    choices: []

  passenger_answered_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Roll call
    text: >
      The release opens every door at once, and the answered passengers do not
      wait for Mara to read them into morning. The child says present while he
      crosses the threshold, the newspaper woman names Warden Street as a place
      already behind her, and the old conductor calls each open door clear
      without touching his punch. Mara listens until their own voices carry the
      last name out of the line.
    choices: []

  passenger_answered_boarding_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Roll call
    text: >
      The release opens every door at once before the answered names can fade
      into another roll call. The child keeps saying present until rain answers
      back from the platform, the newspaper woman carries Warden Street like a
      folded ticket instead of a summons, and the old conductor clears the aisle
      by listening for each voice to step through. Mara does not need to repeat
      the list. The passengers carry it into morning themselves.
    choices: []

  passenger_counted_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Manifest
    text: >
      The release opens every door at once, and the reviewed count falls apart
      into people keeping track of one another: the newspaper woman checking
      the child beside her, the lunch-tin worker waiting until the old
      conductor steps clear, Mara letting the last number go unfinished because
      no one is missing anymore. Morning rain reaches the third car as a crowd,
      not a total.
    choices: []

  passenger_reviewed_count_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Manifest
    text: >
      The release opens every door at once while Mara's reviewed count is still
      warm from the ledger. Newspaper, lunch tin, mitten, conductor's punch:
      each item becomes a person stepping through instead of a mark beside a
      name. Mara starts to add them again, then stops when the passengers look
      back for one another and prove the count can end.
    choices: []

  passenger_manifest_handoff_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Manifest
    text: >
      The release opens every door at once while Mara is still mid-handoff.
      She reads the first names, then stops because the passengers are already
      carrying them through the rain-bright doors: newspaper woman to child,
      conductor to lunch-tin worker, stranger to stranger until the manifest is
      no longer a duty in one voice. Mara lets the final page close only after
      every answer has become movement.
    choices: []

  passenger_manifest_thumbprint_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Manifest
    text: >
      The release opens every door at once, and Mara's torn thumbprint lifts
      from the ledger with the last passenger name. She does not stand behind
      the manifest or ahead of it. She walks through with the crowd she kept
      in ink for forty-three years, one hand on the page until rain makes the
      old oath unreadable and unnecessary.
    choices: []

  passenger_manifest_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Manifest
    text: >
      The release opens every door at once while Mara's opened manifest is
      still answering in ordinary sounds. A lunch tin clasp becomes a footstep,
      the child's mitten shakes rain from the threshold, and umbrellas knock
      together as people check who is beside them. Mara reads until the page
      has no one left to hold, then lets the passengers finish the count in
      morning air.
    choices: []

  passenger_answered_handoff_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Roll call
    text: >
      The release opens every door at once before Mara can finish the last
      name. The passengers finish it for her: child to newspaper woman,
      conductor to lunch-tin worker, every answer passing hand to hand until
      the roll call becomes a crowd in motion. Mara steps through after them,
      no longer carrying the manifest alone.
    choices: []

  passenger_echoed_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Manifest
    text: >
      The release opens every door at once, and the small sounds you heard
      behind the stamped manifest doors cross into morning before any name can
      be counted twice: thermos cap, newspaper fold, mitten against the rail,
      rain shaking loose from umbrellas. Mara does not read over them. She lets
      the ordinary noise prove the passengers were never only entries.
    choices: []

  passenger_helped_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Core
    text: >
      The release opens every door at once, and the lunch-tin worker's latch
      becomes the first ordinary sound of morning. The child with the mitten
      walks between two adults who know his name now; the old conductor holds
      the doors until the last umbrella clears the rain. Mara thanks each
      passenger by name, then saves one quiet thank-you for you.
    choices: []

  passenger_roll_call_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Core
    text: >
      The release opens every door at once on the passengers' own roll call.
      Mara begins the first name, then falls silent as the crowd carries the
      rest: child answering for himself, newspaper woman naming the morning
      transfer, conductor calling clear, lunch-tin worker counting no one twice.
      By the time the last door opens, the manifest has become a chorus the
      line can hear but cannot hold.
    choices: []

  passenger_lunch_tin_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Core
    text: >
      The release opens every door at once on the lunch-tin worker's count. His
      latch clicks each passenger into the rain-bright morning: child, newspaper
      woman, conductor, Mara, then himself last because someone still has to
      make sure the shift is over. When the tin finally opens, it holds only
      steam and daylight, and the line has nothing left to count.
    choices: []

  passenger_conductor_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Roll call
    text: >
      The release opens every door at once on the conductor's clear signal. He
      stands in the rain-bright threshold with his punch raised, not counting
      tickets anymore, only people safely through. The answered passengers
      repeat his call down the platform until every open door sounds like work
      finished well, and Mara lets another worker's voice be the last one the
      line obeys.
    choices: []

  passenger_conductor_transfer_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Roll call
    text: >
      The release opens every door at once through the conductor's punched
      transfer. Its star-shaped hole catches the first rain-bright light as it
      passes from hand to hand: child, newspaper woman, lunch-tin worker, Mara,
      then the old conductor last. No one asks where the ticket is valid
      anymore. Morning has already accepted the change.
    choices: []

  passenger_conductor_count_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Roll call
    text: >
      The release opens every door at once on the conductor's counted clear
      call. He carries Mara's opened manifest like a timetable that has finally
      reached its stop: newspaper, lunch tin, mitten, punched transfer, each
      answer becoming a person in rain-bright morning. Mara does not finish the
      last total. The conductor lowers his punch because the count has already
      become a crowd.
    choices: []

  passenger_keepsake_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Keepsakes
    text: >
      The release opens every door at once, and the matched keepsakes cross the
      threshold with the people they remembered. The lunch tin rides against
      its owner's coat, the newspaper woman carries two transfer columns into
      daylight, and the rain-dark umbrellas open only after every initial has
      cleared the doors. Mara reads the final name, then lets the ordinary
      things answer back.
    choices: []

  passenger_newspaper_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Keepsakes
    text: >
      The release opens every door at once, and the newspaper woman's blank
      transfer column fills with destinations as the passengers cross into
      rain-bright morning. Warden Street becomes a place behind them, not a
      trap beneath their feet. The old conductor reads the final stop aloud,
      Mara lets the speaker go quiet, and the woman folds tomorrow's route into
      her coat before stepping through.
    choices: []

  passenger_mitten_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Passengers
    endingFamily: Keepsakes
    text: >
      The release opens every door at once, and the first person through is
      the child clutching both mittens in one hand. He waits at the morning
      doors until the woman with the newspaper catches up, then points out the
      far bench where the other glove should have been all along. The
      passengers laugh because the line has lost its claim on small things, and
      Mara lets that be the final sound before the speaker goes quiet.
    choices: []

  good_ending:
    routeImportance: optional
    ending: true
    endingType: good
    endingGroup: Morning escape
    text: >
      The marked map carries you through one impossible transfer and out to a
      morning platform where the rain smells real. Behind the closing doors,
      the underpass speaker keeps reading from the ledger. Mara's badge number
      is still the clearest name, and the safe route feels less like an ending
      than a promise you survived long enough to break.
    choices: []

  escape_ending:
    routeImportance: optional
    ending: true
    endingType: escape
    endingGroup: Early escape
    text: >
      You run before the train can choose you. Dawn finds you on Warden Street
      with rain in your shoes and the certainty that someone else will hear
      Mara calling tomorrow night.
    choices: []

  warned_escape_ending:
    routeImportance: optional
    ending: true
    endingType: escape
    endingGroup: Early escape
    text: >
      You leave after hearing Mara name the signal key, so dawn has sharper
      edges when it finds you on Warden Street. The stopped clock behind you is
      still holding the token, the platform lights still wait for a booth to
      open, and her voice follows the rain down the stairs until traffic covers
      it. Someone else may answer tomorrow, but they will inherit the same
      unfinished route you understood well enough to abandon.
    choices: []

  lost_ending:
    routeImportance: optional
    ending: true
    endingType: bad
    endingGroup: Failure
    text: >
      The sign finishes spelling HOME. For one impossible second it shows your
      childhood street, your kitchen window, your own silhouette waving you in.
      The marked map falls unread in every version of this choice: beside your
      shoe if you carried it, on Mara's desk if you left it behind. The doors
      close before you remember your real name.
    choices: []

  lost_after_dispatch_ending:
    routeImportance: optional
    ending: true
    endingType: bad
    endingGroup: Failure
    text: >
      The porch light wins because you step toward it while Mara is still
      speaking. Her last useful words, clock token, fuse, badge, ledger, flatten
      into station noise behind you. The marked map falls unread beside your
      shoe, and the HOME sign closes around the name you meant to bring back.
    choices: []

  bad_ending:
    routeImportance: optional
    ending: true
    endingType: bad
    endingGroup: Failure
    text: >
      The gate gives way with a scream of metal. The sound wakes something
      below the platform before the train doors can close. It uses Mara's
      borrowed voice to read a badge number you never proved, and every light
      on Platform 13 goes out except the empty fuse socket. By the time the
      train moves, the ledger has found another unfinished name.
    choices: []
