  mara_last_dispatch:
    routeImportance: main
    text: >
      Mara is quiet long enough that the booth relays the rain outside. Then
      she keys the speaker with the care of someone signing off after a double
      shift, making a record no ledger can stamp shut. "Warden Street
      dispatcher to last train," she says. "Route held. Doors ready. Passenger
      release authorized by proof, not by permission." The line hisses, trying
      to turn the words into another order, but Mara reads over it with your
      badge number, the marked platform, and the open third car all named
      aloud. "Third car. First seat. Pull once. Dispatch complete when the last
      door opens."
    choices:
      - id: carry_last_dispatch_into_car
        label: Carry Mara's last dispatch into the third car
        to: mara_last_dispatch_intercom
        effects:
          set:
            heard_mara_goodbye: true
      - id: let_last_dispatch_become_handoff
        label: Let Mara carry the last dispatch out of the booth
        to: mara_handoff_boarding
        requires:
          notFlag: saw_mara_handoff
        effects:
          set:
            saw_mara_handoff: true
      - id: board_with_last_dispatch_in_speaker
        label: Board with Mara's last dispatch in the speaker
        to: mara_last_dispatch_intercom
        requires:
          notFlag: knows_badge_proof
        effects:
          set:
            heard_mara_goodbye: true
      - id: board_after_last_dispatch
        label: Board after Mara gives the last dispatch
        to: mara_last_dispatch_intercom
        requires:
          flag: knows_badge_proof

  mara_handoff:
    routeImportance: optional
    text: >
      The signal booth windows clear one by one. For the first time, Mara is
      not a voice in the walls but a woman stepping away from a desk she kept
      warm for everyone else. "I am done being the last line," she says, and
      the platform lights steady as if they believe her.
    choices:
      - id: return_from_mara_handoff
        label: Cross the platform with Mara beside the line
        to: mara_handoff_boarding

  mara_handoff_boarding:
    routeImportance: optional
    text: >
      Mara does not vanish back into the speaker. She walks the platform edge
      with one hand brushing each open door, counting by touch instead of by
      ledger. At the third car, she stops beside the first seat and nods toward
      the release. "I can hold it from here," she says, and this time here
      means beside you.
    choices:
      - id: check_mara_far_door_before_release
        label: Check that Mara reaches the far door before the release
        to: mara_handoff_check
        requires:
          notFlag: checked_mara_handoff
        effects:
          set:
            checked_mara_handoff: true
      - id: listen_to_handoff_before_boarding
        label: Listen as Mara reaches the far door before you board
        to: mara_handoff_intercom
        requires:
          all:
            - notFlag: heard_mara_goodbye
            - notFlag: read_passenger_manifest
            - notFlag: read_mara_thumbprint
        effects:
          set:
            heard_mara_goodbye: true
      - id: ask_mara_about_handoff_thumbprint_before_boarding
        label: Ask Mara what the torn thumbprint means beside the doors
        to: mara_thumbprint_handoff_intercom
        requires:
          all:
            - flag: read_mara_thumbprint
            - notFlag: heard_mara_goodbye
            - notFlag: read_passenger_manifest
        effects:
          set:
            heard_mara_goodbye: true
      - id: board_after_mara_handoff
        label: Reach the emergency release while Mara holds the doors
        to: train_car

  mara_handoff_check:
    routeImportance: optional
    text: >
      You follow Mara to the far end of the third car before touching the
      release. She stops at the last door with both feet on the platform side,
      one hand braced on the rail and the other held out to the passengers
      still learning that the line has let go. The old speaker hisses behind
      you, but Mara is close enough now that you hear her without it: "All
      right. I am here."
    choices:
      - id: carry_checked_thumbprint_handoff_to_speaker
        label: Carry Mara's checked thumbprint back through the speaker
        to: mara_thumbprint_handoff_intercom
        requires:
          all:
            - flag: read_mara_thumbprint
            - notFlag: heard_mara_goodbye
        effects:
          set:
            heard_mara_goodbye: true
      - id: carry_checked_handoff_to_speaker
        label: Carry Mara's far-door check back through the speaker
        to: mara_handoff_intercom
        requires:
          all:
            - notFlag: read_mara_thumbprint
