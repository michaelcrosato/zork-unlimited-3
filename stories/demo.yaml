        to: passenger_answered_intercom
        effects:
          set:
            heard_mara_goodbye: true
            heard_answered_passengers: true
      - id: pull_release_after_checked_answers
        label: Pull the release after checking every answer
        to: passenger_answered_boarding_true_ending

  passenger_platform:
    routeImportance: supporting
    text: >
      The platform is no longer empty. People step out of the manifest doors
      carrying ordinary burdens: a folded newspaper, a paper sack darkened by
      rain, the mitten you saw pinned beside a name. None of them look at the
      destination sign. They look to Mara's speaker, then to the third-car
      threshold where the emergency release waits under the first seat.
      Questions, keepsakes, and careful counts can steady them, but every
      answer is leaning toward the same next act. The direct path is already
      plain: get them aboard, reach under the first seat, and pull before the
      tunnel teaches the sign to say HOME again.
