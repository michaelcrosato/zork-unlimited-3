      - id: follow_newspaper_transfer_after_manifest_count
        label: Follow the newspaper stop from Mara's opened count
        to: passenger_newspaper_transfer
        requires:
          notFlag: studied_newspaper_transfer
        effects:
          set:
            heard_newspaper_memory: true
            studied_newspaper_transfer: true
            restored_newspaper_transfer: true
      - id: ask_conductor_after_manifest_count
