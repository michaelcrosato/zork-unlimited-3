id: demo
title: Lantern in the Underpass
start: entrance
objectives:
  - text: Find a reliable way to see in the underpass.
    requires:
      all:
        - notItem: lantern
        - notFlag: lights_on
  - text: Recover the marked Platform 13 map before boarding.
    requires:
      all:
        - flag: promised_mara
        - notItem: map
  - text: Find out where the chalk arrows and old line are leading.
    requires:
      notFlag: knows_platform
  - text: Learn how to survive the driverless train before boarding it.
    requires:
      all:
        - flag: knows_platform
        - notFlag: knows_release
        - notFlag: freed_mara
        - notFlag: inspected_signal_ledger
        - notFlag: read_passenger_manifest
        - notFlag: heard_passenger_echoes
        - notFlag: knows_badge_proof
        - any:
            - notItem: map
            - notItem: token
            - notItem: fuse
            - notItem: badge
  - text: Recover the marked Platform 13 map before boarding.
    requires:
      all:
        - flag: knows_platform
        - notFlag: promised_mara
        - notItem: map
  - text: Search the stopped tunnel clock for the signal booth token.
    requires:
      all:
        - any:
            - flag: knows_shutdown
            - flag: met_mara
            - flag: knows_release
            - flag: read_mara_file
            - flag: knows_token_location
        - notItem: token
  - text: Find a way to power the platform gate control.
    requires:
      all:
        - flag: knows_platform
        - notItem: fuse
  - text: Find proof of Mara Vale's identity before clearing her name.
    requires:
      all:
        - any:
            - item: fuse
            - flag: met_mara
            - flag: read_mara_file
            - flag: knows_badge_proof
        - notItem: badge
  - text: Restore power at Platform 13 and try the token slot.
    requires:
      all:
        - item: token
        - item: fuse
        - notFlag: platform_lit
  - text: Choose whether to clear Mara now or open the kept-passenger manifest first.
    requires:
      all:
        - flag: platform_lit
        - item: token
        - notFlag: freed_mara
        - flag: inspected_signal_ledger
        - item: map
        - item: badge
        - notFlag: read_passenger_manifest
  - text: Open the kept-passenger manifest doors with Mara's badge proof.
    requires:
      all:
        - flag: platform_lit
        - item: token
        - notFlag: freed_mara
        - flag: inspected_signal_ledger
        - item: map
        - item: badge
        - flag: read_passenger_manifest
  - text: Use the signal booth to resolve Mara's ledger entry.
    requires:
      all:
        - flag: platform_lit
        - item: token
        - notFlag: freed_mara
        - any:
            - notFlag: inspected_signal_ledger
            - notItem: map
            - notItem: badge
  - text: Pull after Mara's handoff reaches the opened manifest doors.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: manifest_handoff_reached_doors
  - text: "Finish Mara's opened-door handoff: listen, confirm the doors, carry the darkened thumbprint oath to the speaker, pull with the oath, or pull the release while the handoff is moving."
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: saw_mara_manifest_handoff
        - notFlag: manifest_handoff_reached_doors
        - notFlag: held_passenger_threshold
        - notFlag: confirmed_threshold_clearance
        - notFlag: heard_passenger_morning_boarding
        - notFlag: confirmed_morning_stops
        - notFlag: heard_passenger_answers
        - notFlag: helped_passengers_gather
        - notFlag: made_room_for_passengers
        - notFlag: read_mara_thumbprint
        - notFlag: read_manifest_thumbprint
  - text: Let Mara talk you through the held threshold, or confirm it is clear.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: held_passenger_threshold
        - notFlag: heard_mara_goodbye
        - notFlag: confirmed_threshold_clearance
  - text: Confirm the held threshold is clear, or pull while it stays open.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: held_passenger_threshold
        - flag: heard_mara_goodbye
        - notFlag: confirmed_threshold_clearance
  - text: Pull after the third-car threshold is clear.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: held_passenger_threshold
        - flag: confirmed_threshold_clearance
  - text: Carry Mara's thumbprint oath to the third-car speaker.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: read_manifest_thumbprint
        - notFlag: heard_mara_goodbye
        - notFlag: confirmed_manifest_thumbprint_receipt
        - notFlag: held_passenger_threshold
        - notFlag: confirmed_threshold_clearance
        - notFlag: heard_passenger_morning_boarding
        - notFlag: confirmed_morning_stops
        - notFlag: heard_passenger_answers
        - notFlag: helped_passengers_gather
        - notFlag: made_room_for_passengers
        - notFlag: checked_answered_passengers
        - notFlag: checked_echoed_passengers
        - notFlag: confirmed_echoed_manifest_seats
        - notFlag: set_lunch_tin_pace
  - text: Confirm the opened passengers received Mara's thumbprint oath, or pull with it now.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: read_manifest_thumbprint
        - flag: heard_mara_goodbye
        - notFlag: confirmed_manifest_thumbprint_receipt
        - notFlag: held_passenger_threshold
        - notFlag: confirmed_threshold_clearance
        - notFlag: heard_passenger_morning_boarding
        - notFlag: confirmed_morning_stops
        - notFlag: heard_passenger_answers
        - notFlag: helped_passengers_gather
        - notFlag: made_room_for_passengers
        - notFlag: checked_answered_passengers
        - notFlag: checked_echoed_passengers
        - notFlag: confirmed_echoed_manifest_seats
        - notFlag: set_lunch_tin_pace
  - text: Pull the release after the opened passengers receive Mara's thumbprint oath.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: confirmed_manifest_thumbprint_receipt
  - text: Pull the release after every answered passenger has a face behind the name.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: checked_answered_passengers
  - text: Pull the release after every familiar passenger echo has a seat aboard.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: confirmed_echoed_manifest_seats
  - text: Confirm the morning chorus's remembered stops before pulling the release.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: heard_passenger_morning_boarding
        - notFlag: confirmed_morning_stops
  - text: Pull after the remembered morning stops answer in full.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: heard_passenger_morning_boarding
        - flag: confirmed_morning_stops
  - text: Seat the checked passenger echoes before pulling the release.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: checked_echoed_passengers
        - notFlag: confirmed_echoed_manifest_seats
  - text: Let the lunch-tin count reach the worker himself before pulling the release.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: helped_passengers_gather
        - flag: set_lunch_tin_pace
        - notFlag: counted_lunch_tin_worker_self
        - notFlag: checked_lunch_tin_passengers
        - notFlag: read_lunch_tin_roster
  - text: Pull after the lunch-tin worker counts himself, or check the aisle once more.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: helped_passengers_gather
        - flag: set_lunch_tin_pace
        - flag: counted_lunch_tin_worker_self
        - notFlag: checked_lunch_tin_passengers
        - notFlag: read_lunch_tin_roster
  - text: Pull after the lunch-tin count includes every passenger.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: helped_passengers_gather
        - flag: set_lunch_tin_pace
        - flag: checked_lunch_tin_passengers
        - notFlag: read_lunch_tin_roster
  - text: Use the lunch-tin roster to clock everyone out before pulling the release.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: helped_passengers_gather
        - flag: set_lunch_tin_pace
        - flag: read_lunch_tin_roster
        - notFlag: heard_final_roll_call
        - notFlag: confirmed_lunch_tin_roster_proof
  - text: Pull on the completed lunch-tin roster count, or confirm each proof first.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: helped_passengers_gather
        - flag: set_lunch_tin_pace
        - flag: read_lunch_tin_roster
        - flag: heard_final_roll_call
        - notFlag: confirmed_lunch_tin_roster_proof
  - text: Pull after every lunch-tin roster proof is closed.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: helped_passengers_gather
        - flag: set_lunch_tin_pace
        - flag: confirmed_lunch_tin_roster_proof
  - text: Pull after the opened passengers finish counting one another.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: passengers_finished_reviewed_count
        - flag: shared_count_release_ready
  - text: Pull while Mara's reviewed count still holds.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: passengers_finished_reviewed_count
        - flag: reviewed_count_release_ready
  - text: Pull after the passengers' final roll call, or hold the release until every answer has a witness.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: helped_passengers_gather
        - flag: heard_final_roll_call
        - notFlag: confirmed_roll_call_answers
        - notFlag: returned_lost_mitten
        - notFlag: set_lunch_tin_pace
  - text: Pull the release after every final roll-call answer has a witness.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: helped_passengers_gather
        - flag: confirmed_roll_call_answers
        - notFlag: returned_lost_mitten
  - text: Pull the release after the gathered passengers pass the handle hand to hand.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: helped_passengers_gather
        - notFlag: heard_final_roll_call
        - notFlag: made_room_for_passengers
        - notFlag: matched_manifest_keepsakes
        - notFlag: returned_lost_mitten
        - notFlag: confirmed_manifest_thumbprint_receipt
        - notFlag: checked_answered_passengers
        - notFlag: confirmed_echoed_manifest_seats
        - notFlag: set_lunch_tin_pace
  - text: Get the opened passengers moving together, then pull the third-car release.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - notFlag: helped_passengers_gather
        - notFlag: passengers_finished_reviewed_count
        - notFlag: made_room_for_passengers
        - notFlag: held_passenger_threshold
        - notFlag: confirmed_threshold_clearance
        - notFlag: manifest_handoff_reached_doors
        - notFlag: confirmed_manifest_thumbprint_receipt
        - notFlag: read_manifest_thumbprint
        - notFlag: heard_passenger_morning_boarding
        - notFlag: confirmed_morning_stops
        - notFlag: checked_answered_passengers
        - notFlag: checked_echoed_passengers
        - notFlag: confirmed_echoed_manifest_seats
        - any:
            - notFlag: saw_mara_manifest_handoff
            - flag: heard_passenger_answers
            - flag: read_mara_thumbprint
            - flag: read_manifest_thumbprint
  - text: Pass the release hand to hand through the room you made.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: made_room_for_passengers
        - notFlag: shared_release_reached
        - notFlag: confirmed_shared_room_release
        - notFlag: helped_passengers_gather
        - notFlag: heard_newspaper_memory
  - text: Let the shared release reach the back row before pulling.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: made_room_for_passengers
        - flag: shared_release_reached
        - notFlag: confirmed_shared_room_release
        - notFlag: helped_passengers_gather
        - notFlag: heard_newspaper_memory
  - text: Pull together after every hand receives the release.
    requires:
      all:
        - flag: freed_mara
        - flag: read_passenger_manifest
        - flag: made_room_for_passengers
        - flag: shared_release_reached
        - flag: confirmed_shared_room_release
        - notFlag: helped_passengers_gather
        - notFlag: heard_newspaper_memory
  - text: Pull the emergency release in the third car.
    requires:
      all:
        - flag: freed_mara
        - notFlag: read_passenger_manifest
  - text: Use the marked map if you need a safe way out.
    requires:
      all:
        - notFlag: freed_mara
        - item: map
        - any:
            - notItem: token
            - notItem: fuse
            - notItem: badge
scenes:
  entrance:
    routeImportance: main
    text: >
      Rain ticks against Warden Street. At the mouth of the underpass, a brass
      lantern hangs from a bent nail beside a transit notice stamped SERVICE
      SUSPENDED SINCE 1983.
    choices:
      - id: read_notice
        label: Read the old transit notice
        to: notice
        effects:
          set:
            knows_shutdown: true
      - id: take_lantern
        label: Take the brass lantern
        to: tunnel
        effects:
          addItem: lantern
          set:
            has_light: true
      - id: enter_dark
        label: Enter the underpass without touching it
        to: dark_tunnel

  notice:
    routeImportance: main
    text: >
      The notice warns that Platform 13 was sealed after a signal fire. Someone
      has scratched a newer message into the glass: IF THE TRAIN ARRIVES EMPTY,
      DO NOT BOARD WITHOUT THE MAP. A second, smaller line reads: CLEAR THE
      DISPATCHER'S NAME BEFORE YOU PULL THE RELEASE.
    choices:
      - id: inspect_notice_back
        label: Check the back of the notice
        to: notice_back
        effects:
          set:
            knows_badge_proof: true
      - id: take_lantern_after_notice
        label: Take the brass lantern
        to: tunnel
        effects:
          addItem: lantern
          set:
            has_light: true
      - id: ignore_warning
        label: Ignore the warning and step into the dark
        to: dark_tunnel

  notice_back:
    routeImportance: optional
    text: >
      The notice backing is covered in transfer stamps that never reached the
      city archive. One blank line is labeled DISPATCHER CLEARANCE: BADGE
      PROOF REQUIRED. Beside it, someone wrote M. VALE and pressed so hard the
      paper nearly split.
    choices:
      - id: take_lantern_after_notice_back
        label: Take the brass lantern
        to: tunnel
        effects:
          addItem: lantern
          set:
            has_light: true
      - id: ignore_back_warning
        label: Ignore the warning and step into the dark
        to: dark_tunnel

  tunnel:
    routeImportance: main
    text: >
      Lantern light reveals chalk arrows on the concrete wall. One points
      toward a service door. Another points deeper into the tunnel, where a
      station clock hangs, frozen at 1:13.
    choices:
      - id: open_service_door
        label: Open the service door
        to: service_room
      - id: follow_arrows
        label: Follow the arrows deeper
        to: platform
        requires:
          all:
            - notFlag: platform_lit
            - any:
                - notFlag: promised_mara
                - item: map
            - any:
                - notFlag: returned_from_safe_escape
                - item: fuse
            - any:
                - notFlag: returned_from_unlit_escape_warning
                - item: fuse
        effects:
          set:
            knows_platform: true
      - id: follow_arrows_to_lit_platform
        label: Follow the arrows back to the lit platform
        to: lit_platform
        requires:
          all:
            - flag: platform_lit
            - any:
                - item: token
                - notFlag: knows_token_location
        effects:
          set:
            knows_platform: true
      - id: inspect_clock
        label: Inspect the stopped station clock
        to: clock
        requires:
          notItem: token

  clock:
    routeImportance: main
    text: >
      The clock hands are wired in place at 1:13. A maintenance token has been
      wedged behind the minute hand, warm as a coin left in sunlight. Its edge
      is stamped SIGNAL BOOTH ACCESS.
    choices:
      - id: take_token_return_to_lit_platform
        label: Take the signal token and return to the lit platform
        to: lit_platform
        requires:
          all:
            - notItem: token
            - flag: heard_escape_call
            - flag: platform_lit
        effects:
          addItem: token
          set:
            found_token: true
      - id: take_token_return_to_dark_platform
        label: Take the signal token and return to Platform 13
        to: platform
        requires:
          all:
            - notItem: token
            - flag: heard_escape_call
            - notFlag: platform_lit
            - flag: knows_platform
        effects:
          addItem: token
          set:
            found_token: true
            knows_platform: true
      - id: take_token
        label: Take the maintenance token
        to: tunnel
        requires:
          all:
            - notItem: token
            - notFlag: heard_escape_call
        effects:
          addItem: token
          set:
            found_token: true
      - id: leave_clock
        label: Leave the clock alone
        to: clock_token_warning
        requires:
          notFlag: knows_token_location
        effects:
          set:
            knows_token_location: true

  clock_token_warning:
    routeImportance: supporting
    text: >
      As you turn away, the token taps once against the wired minute hand. The
      sound carries down the tunnel and answers from a sealed booth on Platform
      13. SIGNAL BOOTH ACCESS is not a souvenir stamp; it is the only thing in
      reach that sounds like a key.
    choices:
      - id: take_token_after_clock_warning
        label: Take the maintenance token after all
        to: tunnel
        effects:
          addItem: token
          set:
            found_token: true
      - id: leave_warned_clock
        label: Leave the token in the clock for now
        to: tunnel

  dark_tunnel:
    routeImportance: optional
    text: >
      The tunnel swallows the last streetlight. Your hand finds cold concrete,
      then a chain hanging from the ceiling. Far ahead, a woman speaks through
      a dead public-address speaker, and deeper still a blank train sign
      flickers once with the first letter of HOME.
    choices:
      - id: follow_false_home_light
        label: Follow the HOME flicker deeper into the dark
        to: dark_home_warning
        effects:
          set:
            saw_dark_home_flicker: true
      - id: pull_chain
        label: Pull the chain
        to: service_room
        effects:
          set:
            lights_on: true
      - id: answer_voice
        label: Answer the voice in the speaker
        to: dispatcher
      - id: retreat
        label: Retreat to the entrance
        to: entrance

  dark_home_warning:
    routeImportance: optional
    text: >
      Without the lantern, HOME looks less like a word than a porch light
      remembering you. The woman in the speaker is still trying to speak over
      it, but the chain brushes your shoulder, close enough to pull the service
      lights on before the train learns the shape of your name.
    choices:
      - id: pull_chain_before_home_takes_you
        label: Pull the chain before HOME finishes spelling itself
        to: service_room
        effects:
          set:
            lights_on: true
            escaped_dark_home_flicker: true
      - id: answer_mara_under_home_flicker
        label: Answer the woman beneath the HOME flicker
        to: dispatcher
        effects:
          set:
            escaped_dark_home_flicker: true
      - id: keep_following_false_home
        label: Keep following the HOME light
        to: dark_home_grip
        effects:
          set:
            felt_dark_home_grip: true

  dark_home_grip:
    routeImportance: optional
    text: >
      The HOME sign gets close enough to show rain on a familiar porch, but the
      tunnel has not let go of you yet. The chain knocks against your wrist.
      Mara's voice is only static now, still shaped like a warning if you answer
      before the sign learns the rest of your name.
    choices:
      - id: yank_chain_from_false_home_grip
        label: Yank the chain before HOME learns your name
        to: service_room
        effects:
          set:
            lights_on: true
            escaped_dark_home_flicker: true
      - id: call_back_to_mara_from_false_home_grip
        label: Call back to Mara through the false HOME static
        to: dispatcher
        effects:
          set:
            escaped_dark_home_flicker: true
      - id: let_dark_home_finish_your_name
        label: Let HOME finish your name
        to: lost_ending
        effects:
          set:
            surrendered_dark_home_flicker: true

  dispatcher:
    routeImportance: supporting
    text: >
      "This is Mara Vale, night dispatcher," the speaker says. "If you can hear
      me, the line has chosen you. Find the map. Do not trust the blank sign."
    choices:
      - id: ask_mara_about_false_home
        label: Tell Mara the HOME sign tried to answer first
        to: mara_false_home_warning
        requires:
          all:
            - flag: escaped_dark_home_flicker
            - notFlag: heard_false_home_warning
        effects:
          set:
            met_mara: true
            heard_false_home_warning: true
      - id: ask_mara_about_train
        label: Ask Mara what happened to the train
        to: mara_warning
        effects:
          set:
            met_mara: true
      - id: promise_to_help
        label: Promise Mara you will find the map
        to: service_room
        effects:
          set:
            met_mara: true
            promised_mara: true
            lights_on: true

  mara_false_home_warning:
    routeImportance: optional
    text: >
      Mara's voice sharpens when you describe the HOME flicker. "That is the
      line using a word it never earned," she says. "Real morning is on the
      marked map, not on the train sign. Pull the service lights on, take the
      map, and do not let that word choose your name before you reach the
      ledger."
    choices:
      - id: follow_mara_from_false_home_warning
        label: Pull the service lights on and find the marked map
        to: service_room
        effects:
          set:
            lights_on: true
            promised_mara: true
            knows_token_location: true

  mara_warning:
    routeImportance: optional
    text: >
      Mara says the last train kept returning without its driver. The city
      sealed the platform, then forgot the people still listed as "in transit."
      Static chews through her final word: "Remember... the token in the tunnel clock..."
    choices:
      - id: continue_to_service_room
        label: Follow Mara's directions to the service room
        to: service_room
        effects:
          set:
            lights_on: true
            knows_token_location: true

  service_room:
    routeImportance: main
    text: >
      A breaker panel hums beside a desk covered with old transit maps. A
      cracked radio repeats a number station. Someone circled Platform 13 in
      red pencil.
    choices:
      - id: take_map
        label: Take the marked Platform 13 map from the desk
        to: service_room
        requires:
          notItem: map
        effects:
          addItem: map
          set:
            knows_platform: true
      - id: tune_radio
        label: Tune the cracked radio
        to: radio
        requires:
          all:
            - notFlag: knows_release
            - notFlag: radio_shut_off
            - any:
                - notItem: map
                - notItem: token
                - notItem: fuse
                - notItem: badge
      - id: search_locker
        label: Search the maintenance locker
        to: locker
        requires:
          any:
            - notItem: fuse
            - notItem: badge
      - id: read_personnel_file
        label: Read the personnel file on the desk
        to: personnel_file
        requires:
          all:
            - notFlag: read_mara_file
            - any:
                - notItem: map
                - notItem: token
                - notItem: fuse
                - notItem: badge
        effects:
          set:
            read_mara_file: true
            met_mara: true
            knows_token_location: true
      - id: try_gate_ritual_without_map
        label: Try the gate ritual with the fuse and token before taking the map
        to: signal_map_warning
        requires:
          all:
            - item: fuse
            - item: token
            - notItem: map
            - notFlag: platform_lit
            - notFlag: read_mara_file
        effects:
          set:
            knows_platform: true
            platform_lit: true
      - id: go_to_stopped_clock
        label: Go straight to the stopped clock for the signal token
        to: clock
        requires:
          all:
            - flag: knows_token_location
            - notItem: token
      - id: return_to_tunnel
        label: Return to the tunnel
        to: tunnel
        requires:
          all:
            - notItem: token
            - notFlag: knows_token_location
      - id: go_to_platform
        label: Go to Platform 13
        to: platform
        requires:
          all:
            - any:
                - flag: has_light
                - flag: lights_on
            - any:
                - all:
                    - notFlag: left_unprepared_platform
                    - notFlag: promised_mara
                    - notFlag: read_mara_file
                    - notFlag: knows_release
                - item: map
            - any:
                - notFlag: returned_from_safe_escape
                - item: fuse
            - any:
                - notFlag: returned_from_unlit_escape_warning
                - item: fuse
            - notFlag: platform_lit
        effects:
          set:
            knows_platform: true
      - id: return_to_lit_platform
        label: Return to the lit Platform 13
        to: lit_platform
        requires:
          all:
            - flag: platform_lit
            - any:
                - item: token
                - notFlag: knows_token_location
        effects:
          set:
            knows_platform: true

  radio:
    routeImportance: main
    text: >
      Beneath the numbers, Mara whispers a route: "Third car. Emergency release
      under the first seat. If the sign says HOME, look away."
    choices:
      - id: note_radio_route
        label: Write down Mara's route
        to: service_room
        effects:
          set:
            knows_release: true
      - id: shut_radio_off
        label: Shut the radio off
        to: service_room
        effects:
          set:
            radio_shut_off: true

  personnel_file:
    routeImportance: main
    text: >
      The file belongs to Mara Vale, night dispatcher, missing since the signal
      fire. Her last note says: "Badge clears the ledger. Token opens the booth.
      Check the stopped clock in the tunnel—the signal access key is hidden behind
      the hands. Do not let them call my route complete while my name is still in
      transit."
    choices:
      - id: keep_mara_file
        label: Keep Mara's note with the map
        to: service_room

  locker:
    routeImportance: main
    text: >
      The locker contains a wet uniform coat, a fuse stamped PLATFORM LIGHTS,
      and an employee badge for Mara Vale. The badge number matches a blank
      line printed on the back of the old transit notice.
    choices:
      - id: take_fuse
        label: Take the platform fuse
        to: locker
        requires:
          notItem: fuse
        effects:
          addItem: fuse
      - id: take_badge
        label: Take Mara's badge
        to: locker
        requires:
          notItem: badge
        effects:
          addItem: badge
          set:
            has_mara_badge: true
      - id: inspect_badge_back
        label: Read the back of Mara's badge
        to: badge_memory
        requires:
          all:
            - item: badge
            - notFlag: inspected_badge_back
        effects:
          set:
            inspected_badge_back: true
            knows_badge_proof: true
            knows_release: true
      - id: close_locker
        label: Close the locker
        to: service_room
        requires:
          all:
            - item: fuse
            - item: badge

  badge_memory:
    routeImportance: optional
    text: >
      The badge is heavier than it should be. On the back, under Mara Vale's
      number, someone scratched a route in tiny block letters: LAST TRAIN,
      THIRD CAR, FIRST SEAT RELEASE. A second hand added one more line later:
      BADGE PROOF OPENS THE LEDGER. DO NOT CLEAR ME BEFORE THE OTHERS. The
      metal is worn smooth where a thumb worried the edge for years.
    choices:
      - id: return_from_badge_memory
        label: Put the badge with the other supplies
        to: locker

  platform:
    routeImportance: main
    text: >
      Platform 13 waits behind a rusted gate. A driverless train rests on the
      track, doors open, destination sign blank. The gate control's burned
      access plate hangs loose, showing an empty fuse socket, a token slot
      stamped SIGNAL ACCESS, and enough soot-scratched instructions to read
      before you make noise.
    choices:
      - id: inspect_gate_control
        label: Read the gate control before forcing anything
        to: gate_control
        requires:
          notFlag: inspected_gate_control
        effects:
          set:
            inspected_gate_control: true
            gate_control_inspected: true
            knows_token_location: true
      - id: install_fuse
        label: Install the platform fuse
        to: lit_platform
        requires:
          item: fuse
        effects:
          set:
            platform_lit: true
      - id: board_train
        label: Board the train with the map
        to: train_car
        requires:
          all:
            - item: map
            - notItem: fuse
      - id: retreat_to_stairs_from_platform
        label: Retreat to the stairwell before the train chooses you
        to: platform_escape_warning
        requires:
          all:
            - notItem: fuse
            - notItem: token
      - id: return_to_service_room
        label: Return to the service room and prepare
        to: service_room
        requires:
          any:
            - notItem: map
            - notItem: token
            - notItem: fuse
            - notItem: badge
        effects:
          set:
            left_unprepared_platform: true
      - id: force_gate
        label: Force the gate despite the empty fuse socket
        to: gate_warning
        requires:
          all:
            - notItem: fuse
            - notFlag: backed_away_from_gate
        effects:
          set:
            knows_token_location: true

  platform_escape_warning:
    routeImportance: optional
    text: >
      The stairwell back to Warden Street is still open, but the dark platform
      does not let the train feel harmless. Its blank sign waits without a
      destination, the gate control keeps tapping its empty token slot, and the
      service-room door is close enough to still matter. Leaving now would mean
      choosing the street before checking the desk map, the locker parts, and
      the stopped clock that can answer the slot.
    choices:
      - id: return_to_platform_from_escape_warning
        label: Return through the service-room door for the map, fuse, badge, and clock token
        to: service_room
        effects:
          set:
            left_unprepared_platform: true
            returned_from_unlit_escape_warning: true
            knows_token_location: true
      - id: listen_at_unlit_stairwell
        label: Listen before you leave Mara behind
        to: mara_stairwell_call
        requires:
          notFlag: heard_escape_call
        effects:
          set:
            heard_escape_call: true
            met_mara: true
            knows_token_location: true
      - id: look_back_from_unlit_escape_warning
        label: Look back at the dark platform before you run
        to: unlit_escape_platform_glance
        requires:
          notFlag: looked_back_from_unlit_escape_warning
        effects:
          set:
            looked_back_from_unlit_escape_warning: true
            knows_token_location: true
      - id: confirm_unlit_flee_platform
        label: Leave the unfinished platform and run back to the street
        to: escape_ending

  unlit_escape_platform_glance:
    routeImportance: optional
    text: >
      From the stairwell, Platform 13 is only a lantern-shaped island in the
      dark. The blank train sign blinks once, then the stopped clock down the
      tunnel answers with a tiny brass flash behind its hands. The gate control
      keeps tapping its empty token slot, patient as a metronome. Leaving is
      still possible, but now the next piece has a place.
    choices:
      - id: listen_after_unlit_escape_glance
        label: Listen for Mara before deciding
        to: mara_stairwell_call
        requires:
          notFlag: heard_escape_call
        effects:
          set:
            heard_escape_call: true
            met_mara: true
            knows_token_location: true
      - id: return_after_unlit_escape_glance
        label: Return through the service room with the clock token in mind
        to: service_room
        effects:
          set:
            left_unprepared_platform: true
            returned_from_unlit_escape_warning: true
      - id: leave_after_unlit_escape_glance
        label: Leave after one last look at the dark platform
        to: escape_ending

  gate_control:
    routeImportance: supporting
    text: >
      The gate control is less a lock than a ritual. A burned diagram inside
      the access plate shows three steps: restore PLATFORM LIGHTS, insert the
      SIGNAL BOOTH token, then clear the ledger before boarding. Someone has
      scratched CLOCK = TOKEN into the soot.
    choices:
      - id: read_gate_control_plaque
        label: Read the burned service plaque inside the access plate
        to: gate_control_plaque
        requires:
          notFlag: read_gate_control_plaque
        effects:
          set:
            read_gate_control_plaque: true
            knows_badge_proof: true
      - id: install_fuse_and_insert_token
        label: Install the fuse, then insert the signal token
        to: signal_booth
        requires:
          all:
            - item: fuse
            - item: token
            - item: map
        effects:
          set:
            platform_lit: true
      - id: install_fuse_and_try_token_without_map
        label: Install the fuse, then try the signal token before recovering the map
        to: signal_map_warning
        requires:
          all:
            - item: fuse
            - item: token
            - notItem: map
        effects:
          set:
            platform_lit: true
            knows_platform: true
      - id: install_fuse_from_gate_control
        label: Install the platform fuse while the access plate is open
        to: lit_platform
        requires:
          all:
            - item: fuse
            - notItem: token
        effects:
          set:
            platform_lit: true
      - id: return_to_service_room_for_parts
        label: Return to the service room for parts
        to: service_room

  gate_control_plaque:
    routeImportance: optional
    text: >
      The plaque is almost burned blank, but the remaining service rule is
      stubborn: SIGNAL ACCESS ACCEPTS TOKEN ONLY AFTER PLATFORM LIGHTS. LEDGER
      CLEARANCE REQUIRES BADGE PROOF AND ROUTE MAP ON THE DESK. Below it, a
      dispatcher has penciled one private correction: if the train says HOME,
      do not answer with your name.
    choices:
      - id: return_from_gate_control_plaque
        label: Return to the open gate control
        to: gate_control

  lit_platform:
    routeImportance: supporting
    text: >
      The platform lights buzz awake. Every advertisement shows the same face:
      Mara Vale, smiling from a missing-person poster dated forty-three years
      ago. The train sign flickers between HOME and WARDEN STREET, but the
      gate control keeps tapping its token slot like a telegraph key. If the
      stopped clock really holds the signal token, the booth is the next honest
      step; the stairs are only a way to leave the question unanswered.
    choices:
      - id: use_token_slot
        label: Open the signal booth with the map ready
        to: signal_booth
        requires:
          all:
            - item: token
            - item: map
      - id: try_token_without_map
        label: Try the signal token before recovering the map
        to: signal_map_warning
        requires:
          all:
            - item: token
            - notItem: map
        effects:
          set:
            knows_platform: true
      - id: inspect_mara_posters
        label: Inspect Mara's missing-person posters
        to: mara_posters
        requires:
          all:
            - notFlag: inspected_mara_posters
            - notFlag: inspected_badge_back
            - any:
                - notItem: map
                - notItem: token
                - notItem: badge
        effects:
          set:
            inspected_mara_posters: true
            met_mara: true
      - id: board_before_clearing_ledger
        label: Board before checking the signal booth
        to: ledger_warning
        requires:
          all:
            - item: map
            - notFlag: freed_mara
            - notItem: token
      - id: return_from_lit_platform
        label: Return to the service room before boarding
        to: service_room
        requires:
          any:
            - notItem: map
            - notItem: token
            - notItem: badge
      - id: flee_platform
        label: Leave before finding the stopped-clock token
        to: escape_warning
        requires:
          notItem: token
        effects:
          set:
            knows_token_location: true

  mara_posters:
    routeImportance: optional
    text: >
      Up close, every poster has been altered by the same careful hand. The
      printed word MISSING is crossed out and replaced with IN TRANSIT. Mara's
      badge number is penciled under each photograph, followed by a note:
      "The ledger will not release a dispatcher without her proof of service."
    choices:
      - id: return_to_lit_platform_after_posters
        label: Return to the gate control
        to: lit_platform

  signal_map_warning:
    routeImportance: optional
    text: >
      The token turns, but the signal booth unlocks only halfway. Behind the
      glass, the ledger bell rings in time with the blank destination sign.
      The old notice comes back to you: no one boards the empty train safely
      without the marked map.
    choices:
      - id: return_for_map_from_signal_warning
        label: Recover the marked map and return to the half-open booth
        to: signal_map_recovered
        effects:
          addItem: map
          set:
            knows_platform: true
      - id: continue_to_signal_booth_unprepared
        label: Continue into the booth without the map
        to: signal_booth

  signal_map_recovered:
    routeImportance: optional
    text: >
      The marked map feels heavier when you bring it back to the half-open
      booth. Its pencil route ends at Platform 13, then hooks upward to the
      signal window as if the mapmaker knew the ledger would ask for proof
      before the train could ask for passengers.
    choices:
      - id: enter_signal_booth_after_map
        label: Open the booth fully and read the ledger
        to: signal_booth

  escape_warning:
    routeImportance: optional
    text: >
      The stairwell back to Warden Street is still open, but the lit platform
      makes the empty train look less like a ghost story and more like unfinished
      work. Mara's posters flutter in the tunnel wind, and the token slot keeps
      tapping for the signal key still waiting behind the stopped clock. You
      can still leave, but now leaving means refusing a named next step.
    choices:
      - id: listen_at_stairwell
        label: Listen before you leave Mara behind
        to: mara_stairwell_call
        requires:
          notFlag: heard_escape_call
        effects:
          set:
            heard_escape_call: true
            met_mara: true
            knows_token_location: true
      - id: return_to_lit_platform_from_escape_warning
        label: Return through the service room toward the stopped clock
        to: service_room
      - id: look_back_from_escape_warning
        label: Look back at Platform 13 before you run
        to: escape_platform_glance
        requires:
          notFlag: looked_back_from_escape_warning
        effects:
          set:
            looked_back_from_escape_warning: true
            knows_badge_proof: true
      - id: confirm_flee_platform
        label: Leave Mara calling and run back to the street
        to: escape_ending

  escape_platform_glance:
    routeImportance: optional
    text: >
      From the stairwell, Platform 13 looks almost ordinary: bright tiles,
      open train doors, posters shivering in the tunnel wind. Then every poster
      turns enough to show Mara Vale's penciled badge number, and the token slot
      taps once against the silence. Leaving is still possible. So is turning
      back with a clearer idea of what the line is asking you to prove.
    choices:
      - id: listen_after_escape_glance
        label: Listen for Mara before deciding
        to: mara_stairwell_call
        requires:
          notFlag: heard_escape_call
        effects:
          set:
            heard_escape_call: true
            met_mara: true
            knows_token_location: true
      - id: return_after_escape_glance
        label: Return to the lit platform with the badge proof in mind
        to: lit_platform
      - id: leave_warned_after_escape_glance
        label: Leave after hearing Mara and seeing the route you almost finished
        to: warned_lit_escape_ending
        requires:
          flag: heard_escape_call
      - id: leave_after_escape_glance
        label: Leave after one last look at Platform 13
        to: escape_ending
        requires:
          notFlag: heard_escape_call

  mara_stairwell_call:
    routeImportance: optional
    text: >
      Halfway up the stairs, the public-address speaker finds one clear breath.
      "If you walk out now, I will understand," Mara says. "But the signal key
      is still behind the stopped clock, and the line will keep asking someone
      else to finish what I could not."
    choices:
      - id: look_back_after_stairwell_call
        label: Look back at Platform 13 before choosing the clock or the street
        to: escape_platform_glance
        requires:
          all:
            - flag: platform_lit
            - notFlag: looked_back_from_escape_warning
        effects:
          set:
            looked_back_from_escape_warning: true
            knows_badge_proof: true
      - id: return_from_stairwell_call
        label: Return to the stopped clock for the signal key
        to: clock
      - id: leave_lit_platform_after_stairwell_call
        label: Start up the stairs after lighting the platform and hearing Mara
        to: escape_platform_glance
        requires:
          flag: platform_lit
        effects:
          set:
            looked_back_from_escape_warning: true
            knows_badge_proof: true
      - id: leave_after_stairwell_call
        label: Leave Mara calling and run back to the street
        to: warned_escape_ending
        requires:
          notFlag: platform_lit

  ledger_warning:
    routeImportance: optional
    text: >
      One foot crosses the train threshold, and the public-address speaker
      coughs up Mara's badge number. The blank destination sign waits, but the
      signal booth above the track is still lit, its ledger bell ringing for an
      uncleared name.
    choices:
      - id: check_signal_booth
        label: Check the signal booth before boarding
        to: signal_booth
        requires:
          item: token
      - id: return_for_signal_token
        label: Return to the stopped clock for the signal token
        to: clock
        requires:
          notItem: token
        effects:
          set:
            knows_token_location: true
      - id: board_without_clearing_mara
        label: Board with only the map to guide you
        to: train_car
        requires:
          item: map

  signal_booth:
    routeImportance: main
    text: >
      The token unlocks a signal booth above the track. Inside, a ledger lists
      every passenger the line has kept. Mara's name is the last one not crossed
      out, and her badge number is printed in the margin beside it.
    choices:
      - id: inspect_signal_ledger
        label: Read Mara's uncrossed ledger entry
        to: signal_ledger
        requires:
          notFlag: inspected_signal_ledger
        effects:
          set:
            inspected_signal_ledger: true
      - id: read_passenger_manifest
        label: Read the kept-passenger manifest
        to: passenger_manifest
        requires:
          notFlag: read_passenger_manifest
        effects:
          set:
            read_passenger_manifest: true
      - id: listen_to_manifest_doors
        label: Listen to the marked passenger doors
        to: passenger_echoes
        requires:
          all:
            - flag: read_passenger_manifest
            - notFlag: heard_passenger_echoes
        effects:
          set:
            heard_passenger_echoes: true
      - id: reopen_signal_ledger
        label: Reopen Mara's ledger row
        to: signal_ledger
        requires:
          flag: inspected_signal_ledger

  passenger_manifest:
    routeImportance: supporting
    text: >
      The earlier pages are not a passenger list so much as a weather report:
      umbrellas left dripping by the stairs, lunch tins still warm, a child's
      mitten pinned beside a transfer. Each name has a tiny door stamped beside
      it, every one still shut. Mara's dispatcher row is set apart at the end,
      its door barred by the same badge proof that can open the rest.
    choices:
      - id: read_manifest_marginal_notes
        label: Read the notes written in the manifest margins
        to: passenger_manifest_notes
        requires:
          notFlag: read_manifest_marginal_notes
        effects:
          set:
            read_manifest_marginal_notes: true
      - id: listen_to_manifest_doors_from_manifest
        label: Listen to the marked passenger doors
        to: passenger_echoes
        requires:
          notFlag: heard_passenger_echoes
        effects:
          set:
            heard_passenger_echoes: true
      - id: return_to_signal_ledger_from_manifest
        label: Turn from the manifest to Mara's ledger row
        to: signal_ledger
        effects:
          set:
            inspected_signal_ledger: true

  passenger_manifest_notes:
    routeImportance: optional
    text: >
      The margin notes are not official entries. Someone wrote them in pencil
      whenever the ledger tried to make people into counts: Lenora Pike,
      newspaper folded to the transfer column; Eli Rose, lunch tin packed for
      a double shift; Tomas Vale, no relation to Mara, conductor's punch still
      warm from the last checked ticket; a child's mitten tagged only RED LEFT.
      Beside each note, Mara added the same short instruction: answer before
      opening.
    choices:
      - id: follow_lenora_newspaper_note
        label: Follow Lenora Pike's folded newspaper note
        to: passenger_newspaper_memory
        requires:
          notFlag: heard_newspaper_memory
        effects:
          set:
            heard_newspaper_memory: true
      - id: listen_after_manifest_notes
        label: Listen for the names the margin notes remember
        to: passenger_echoes
        requires:
          notFlag: heard_passenger_echoes
        effects:
          set:
            heard_passenger_echoes: true
      - id: return_from_manifest_notes
        label: Return to Mara's ledger row with the margin notes in mind
        to: signal_ledger
        effects:
          set:
            inspected_signal_ledger: true

  passenger_echoes:
    routeImportance: optional
    text: >
      Behind the stamped doors, the kept passengers are not wailing. They are
      waiting in the small noises people make when they expect a train to be
      late: a thermos cup unscrewed, newspaper pages folded twice, a child
      asking whether the next stop has rain. When Mara's page rustles, every
      door falls silent for her answer.
    choices:
      - id: return_from_passenger_echoes
        label: Return to Mara's ledger row
        to: signal_ledger
        effects:
          set:
            inspected_signal_ledger: true

  signal_ledger:
    routeImportance: main
    text: >
      Mara's row is written in a steadier hand than the others: DISPATCHER
      REMAINING ON DUTY UNTIL ALL PASSENGERS CLEAR. Beside the badge number,
      someone has pressed a thumbprint into the ink so hard it tore the page.
      The earlier manifest pages rustle under your hand, still full of doors
      with passenger names stamped shut. The booth speaker clicks once, waiting
      for proof that she is more than another name the line can keep. Clearing
      only Mara will send you straight to the third-car release; opening the
      manifest first may free more doors, but it will make this rescue larger.
    choices:
      - id: inspect_mara_thumbprint
        label: Touch the torn thumbprint beside Mara's name
        to: mara_thumbprint
        requires:
          all:
            - item: badge
            - notFlag: read_mara_thumbprint
            - notFlag: read_passenger_manifest
        effects:
          set:
            read_mara_thumbprint: true
      - id: read_manifest_from_ledger
        label: Open the kept-passenger manifest before choosing a larger rescue
        to: passenger_manifest
        requires:
          all:
            - item: badge
            - notFlag: read_mara_thumbprint
            - notFlag: read_passenger_manifest
        effects:
          set:
            read_passenger_manifest: true
      - id: read_manifest_after_thumbprint
        label: Follow Mara's thumbprint into the larger passenger rescue
        to: passenger_manifest
        requires:
          all:
            - item: badge
            - flag: read_mara_thumbprint
            - notFlag: read_passenger_manifest
        effects:
          set:
            read_passenger_manifest: true
      - id: mark_mara_clear_from_ledger
        label: Clear only Mara now and board for the emergency release
        to: mara_released
        requires:
          all:
            - item: badge
            - item: map
            - notFlag: read_passenger_manifest
        effects:
          set:
            freed_mara: true
      - id: clear_manifest_and_mara_from_ledger
        label: Clear Mara and open every kept-passenger door
        to: passengers_released
        requires:
          all:
            - item: badge
            - item: map
            - flag: read_passenger_manifest
        effects:
          set:
            freed_mara: true
      - id: return_for_marked_map
        label: Recover the marked map and return to Mara's ledger row
        to: signal_ledger
        requires:
          notItem: map
        effects:
          addItem: map
          set:
            knows_platform: true
      - id: return_for_mara_badge
        label: Return to the service room for Mara's badge
        to: service_room
        requires:
          notItem: badge

  mara_thumbprint:
    routeImportance: optional
    text: >
      The torn paper warms under your thumb. For a moment, the booth is full of
      raincoats and tired voices. Mara stands at the dispatch panel, pressing
      her print beside the final open line while the last train waits below.
      "No one clears until everyone clears," she says, not to the line, but to
      herself.
    choices:
      - id: return_from_mara_thumbprint
        label: Return to Mara's ledger row
        to: signal_ledger

  mara_released:
    routeImportance: optional
    text: >
      The ledger ink lifts from Mara's name like smoke. Far below, the train
      doors open with a softer sound, and the booth speaker carries her first
      full breath in forty-three years. "Third car," Mara says. "I can hold
      the line steady long enough for you to pull the release." The booth door
      unlocks behind her, waiting to see whether she signs off with one final
      dispatch, leaves as another voice in the speaker, or walks the platform
      beside you.
    choices:
      - id: watch_mara_leave_booth
        label: Walk with Mara to the third car before the release
        to: mara_handoff
        requires:
          notFlag: saw_mara_handoff
        effects:
