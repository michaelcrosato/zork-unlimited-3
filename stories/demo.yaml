            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
            - notFlag: reviewed_open_manifest_count
            - notFlag: made_room_for_passengers
            - notFlag: heard_mara_goodbye
        effects:
          set:
            made_room_for_passengers: true
            heard_mara_goodbye: true
      - id: confirm_shared_release_from_platform
        label: Confirm the shared release reaches the back row before pulling
        choiceGroup: Shared room / release
        to: passenger_room_release_receipt
        requires:
          all:
            - notFlag: heard_passenger_echoes
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
            - notFlag: reviewed_open_manifest_count
            - notFlag: made_room_for_passengers
            - notFlag: shared_release_reached
            - notFlag: confirmed_shared_room_release
            - notFlag: heard_mara_goodbye
        effects:
          set:
            made_room_for_passengers: true
            shared_release_reached: true
            confirmed_shared_room_release: true
      - id: board_with_mara_manifest_handoff_from_platform
        label: Board while Mara's opened-door handoff holds
        choiceGroup: Finish Mara's handoff
        to: mara_manifest_handoff_intercom
        requires:
          all:
            - flag: saw_mara_manifest_handoff
            - notFlag: heard_mara_goodbye
            - notFlag: read_manifest_thumbprint
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_mara_goodbye: true
      - id: ask_mara_to_sign_off_from_platform
        label: Ask Mara to sign off to the gathered passengers
        to: passenger_mara_signoff
        requires:
          all:
            - notFlag: heard_passenger_mara_signoff
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_mara_signoff: true
      - id: listen_for_platform_morning_chorus
        label: Listen for the passengers' remembered mornings
        to: passenger_morning_chorus
        requires:
          all:
            - notFlag: heard_passenger_morning_chorus
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_morning_chorus: true
      - id: confirm_platform_morning_stops
        label: Carry the passengers' remembered stops to the speaker
        to: passenger_morning_intercom
        requires:
          all:
            - notFlag: heard_passenger_morning_chorus
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
            - notFlag: confirmed_morning_stops
        effects:
          set:
            heard_passenger_morning_chorus: true
            heard_passenger_morning_boarding: true
      - id: ask_mara_finish_manifest_from_platform
        label: Ask Mara to finish the opened manifest count before you board
        to: mara_manifest_intercom
        requires:
          all:
            - notFlag: heard_mara_goodbye
            - notFlag: saw_mara_manifest_handoff
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
            - notFlag: reviewed_open_manifest_count
            - notFlag: heard_passenger_echoes
            - notFlag: held_passenger_threshold
            - notFlag: made_room_for_passengers
        effects:
          set:
            heard_mara_goodbye: true

  passenger_echoed_boarding:
    routeImportance: optional
    text: >
      The passengers board quietly, but the sounds you heard behind the stamped
      doors come with them: thermos cap, folded paper, the soft knock of a
      mitten against the third-car frame. None of them look surprised that you
      recognize the rhythm. Mara leaves the speaker open, as if the train needs
      to hear that waiting has turned into boarding.
    choices:
      - id: check_echoed_passengers_before_release
        label: Check each familiar echo against the boarded passengers
        to: passenger_echoed_check
        requires:
          notFlag: checked_echoed_passengers
        effects:
          set:
            checked_echoed_passengers: true
      - id: seat_echoed_passengers_before_release
        label: Seat every familiar echo before touching the release
        to: passenger_echoed_seat_receipt
        requires:
          all:
            - notFlag: heard_mara_goodbye
            - notFlag: confirmed_echoed_manifest_seats
        effects:
          set:
            checked_echoed_passengers: true
            confirmed_echoed_manifest_seats: true
            echoed_manifest_boarded: true
            heard_mara_goodbye: true
      - id: listen_to_echoed_manifest_from_boarding
        label: Listen as the boarded echoes answer Mara
        to: passenger_echoed_manifest_intercom
        requires:
          notFlag: heard_mara_goodbye
        effects:
          set:
            heard_mara_goodbye: true
      - id: reach_release_with_echoed_manifest
        label: Follow the familiar echoes to the emergency release
        to: train_car
        requires:
          notFlag: heard_mara_goodbye
      - id: pull_release_after_echoed_boarding
        label: Pull the release once the familiar echoes are aboard
        to: passenger_echoed_check
        requires:
          all:
            - flag: heard_mara_goodbye
            - notFlag: checked_echoed_passengers
        effects:
          set:
            checked_echoed_passengers: true
      - id: pull_release_after_checked_echoed_boarding
        label: Confirm every checked echo has a seat before the release
        to: passenger_echoed_seat_receipt
        requires:
          all:
            - flag: heard_mara_goodbye
            - flag: checked_echoed_passengers
            - notFlag: confirmed_echoed_manifest_seats
        effects:
          set:
            confirmed_echoed_manifest_seats: true
            echoed_manifest_boarded: true

  passenger_echoed_check:
    routeImportance: optional
    text: >
      You match each sound to a person before touching the release. The thermos
      cap belongs to a worker holding it with both hands so it will not spill
      again. The folded paper is tucked under the arm of the woman watching the
      destination sign refuse to say HOME. The mitten knock comes from the
      child tapping the frame once for every passenger who made it inside. The
      echoes are no longer clues. They are a count you can trust.
    choices:
      - id: carry_checked_echoes_to_speaker
        label: Let Mara hear the checked echoes answer
        to: passenger_echoed_manifest_intercom
        requires:
          notFlag: heard_mara_goodbye
        effects:
          set:
            heard_mara_goodbye: true
      - id: confirm_checked_echoed_manifest_seats
        label: Confirm the checked echoes have seats aboard
        to: passenger_echoed_seat_receipt
        requires:
          notFlag: confirmed_echoed_manifest_seats
        effects:
          set:
            confirmed_echoed_manifest_seats: true
            echoed_manifest_boarded: true
            heard_mara_goodbye: true
      - id: reach_release_after_checked_echoes
        label: Reach the release once every familiar echo is aboard
        to: train_car
        requires:
          notFlag: heard_mara_goodbye
      - id: pull_release_after_checked_echoes
        label: Seat the checked echoes before pulling the release
        to: passenger_echoed_seat_receipt
        requires:
          all:
            - flag: heard_mara_goodbye
            - notFlag: confirmed_echoed_manifest_seats
        effects:
          set:
            confirmed_echoed_manifest_seats: true
            echoed_manifest_boarded: true

  passenger_threshold_boarding:
    routeImportance: optional
    text: >
      You stand at the third-car threshold instead of rushing for the release.
      The opened passengers cross one by one with the practical care of people
      remembering how to board: newspaper folded flat, lunch tin held clear of
      the door, child's mitten tapping the rail before the next person moves.
      Each person leaves room for the next shoulder, the next bag, the next
      breath that the tunnel tried to file away. Mara does not count over them.
      She leaves the speaker open so the threshold can prove they are becoming
      a crowd.
    choices:
      - id: listen_to_threshold_from_boarding
        label: Listen as Mara holds the threshold open
        to: passenger_threshold_intercom
        effects:
          set:
            heard_mara_goodbye: true
      - id: confirm_threshold_clearance_from_boarding
        label: Confirm the threshold is clear before reaching the release
        to: passenger_threshold_clearance_check
        requires:
          notFlag: confirmed_threshold_clearance
        effects:
          set:
            confirmed_threshold_clearance: true
            heard_mara_goodbye: true
      - id: reach_release_after_threshold_boarding
        label: Reach the release after the last passenger clears the threshold
        to: passenger_threshold_clearance_check
        effects:
          set:
            confirmed_threshold_clearance: true
            heard_mara_goodbye: true

  passenger_room_boarding:
    routeImportance: optional
    text: >
      Inside the third car, the first seat has become more than a place to hide
      the release. You lift the newspaper bundle from the aisle, tuck the lunch
      tin where it will not trip anyone, and guide the child with the mitten
      toward the rail. Each small motion gives the passengers another inch of
      ordinary space. Mara leaves the speaker open long enough for the car to
      sound crowded instead of haunted.
    choices:
      - id: pass_room_release_after_making_room
        label: Pass the release handle hand to hand through the room you made
        to: passenger_room_release
        requires:
          notFlag: shared_release_reached
        effects:
          set:
            shared_release_reached: true
      - id: listen_to_room_made_for_passengers
        label: Listen as the crowded car steadies around the release
        to: passenger_room_intercom
        effects:
          set:
            heard_mara_goodbye: true
      - id: ask_conductor_to_clear_room_made
        label: Ask the old conductor to clear the room you made
        to: passenger_conductor_signal
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_answers: true
            helped_passengers_gather: true
            conductor_cleared_platform: true
      - id: unfold_newspaper_bundle_after_making_room
        label: Unfold the newspaper bundle once the aisle is clear
        to: passenger_newspaper_memory
        requires:
          notFlag: heard_newspaper_memory
        effects:
          set:
            heard_newspaper_memory: true
      - id: reach_release_after_making_room
        label: Reach the release once every passenger has room
        to: passenger_room_release
        effects:
          set:
            shared_release_reached: true

  passenger_newspaper_memory:
    routeImportance: optional
    text: >
      The woman smooths the wet newspaper against her sleeve until the ink
      remembers a date, then a route. "Warden Street, then morning transfer,"
      she says, pointing to a column where every arrival after 1:13 has been
      left blank. "I kept reading it because the paper was the only thing that
      still believed trains went anywhere." A child traces one empty row with a
      mittened finger, then another passenger speaks the street he meant to
      reach after Warden. Behind her, the old conductor leans close enough to
      see the schedule and nods once, as if the route has started existing
      again in more than one voice. The paper stops being yesterday's proof of
      delay and becomes a timetable the passengers can read to one another.
    choices:
      - id: study_newspaper_transfer_column
        label: Study the blank transfer column before boarding
        to: passenger_newspaper_transfer
        requires:
          notFlag: studied_newspaper_transfer
        effects:
          set:
            studied_newspaper_transfer: true
            restored_newspaper_transfer: true
      - id: ask_conductor_after_newspaper_memory
        label: Let the old conductor call the final platform clear
        to: passenger_conductor_roll_call
        requires:
          all:
            - flag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            conductor_cleared_platform: true
            heard_conductor_clearance: true
            heard_final_roll_call: true
      - id: return_lost_mitten_after_newspaper_memory
        label: Return the lost mitten and lead the child to the third car
        to: passenger_mitten_intercom
        requires:
          notFlag: returned_lost_mitten
        effects:
          set:
            returned_lost_mitten: true
            helped_passengers_gather: true
            heard_gathered_passengers: true
      - id: match_keepsakes_after_newspaper_memory
        label: Match the manifest keepsakes on the way to the third car
        to: passenger_keepsake_intercom
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            matched_manifest_keepsakes: true
            helped_passengers_gather: true
            heard_gathered_passengers: true
      - id: help_passengers_after_newspaper_memory
        label: Use the transfer column to gather passengers into the third car
        to: passenger_newspaper_intercom
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            heard_gathered_passengers: true
      - id: board_after_newspaper_memory
        label: Board the third car by the transfer column
        to: passenger_newspaper_intercom
        effects:
          set:
            helped_passengers_gather: true
            heard_gathered_passengers: true

  passenger_newspaper_transfer:
    routeImportance: optional
    text: >
      The blank transfer column is not blank anymore. As the newspaper woman
      reads each passenger's intended stop, rain-dark ink rises where the
      timetable gave up: Warden Street, then morning transfer, then a row of
      smaller streets no one has spoken aloud since the signal fire. The old
      conductor rests two fingers beside the column and says, "That is enough
      route for a clear signal." The passengers pass the paper hand to hand,
      checking the next stop instead of the last mistake. Each spoken street
      gives the person beside them a place to aim for, so boarding the third
      car starts to feel less like surrender and more like making a connection.
      For the first time, the paper is not proof they were delayed. It is proof
      they still get to arrive.
    choices:
      - id: ask_conductor_to_punch_restored_transfer
        label: Ask the conductor to punch the restored transfer for morning
        to: passenger_conductor_transfer
        effects:
          set:
            helped_passengers_gather: true
            conductor_cleared_platform: true
            punched_conductor_transfer: true
      - id: read_restored_transfer_into_roll_call
        label: Read the restored transfer into the final roll call
        to: passenger_newspaper_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            helped_passengers_gather: true
            heard_gathered_passengers: true
            heard_final_roll_call: true
      - id: carry_newspaper_transfer_to_third_car
        label: Carry the restored transfer column into the third car
        to: passenger_newspaper_intercom
        effects:
          set:
            helped_passengers_gather: true
            heard_gathered_passengers: true

  passenger_conductor_signal:
    routeImportance: optional
    text: >
      The old conductor straightens when you ask for his signal. He does not
      have a lantern, only a punch clipped to a chain, but he raises it like
      one. "Platform clear," he calls, and the answered passengers move as if
      the words have given them rails again: child beside newspaper woman,
      umbrellas lifted away from the wheels, Mara's speaker quiet enough to
      let another worker hold the line.
    choices:
      - id: pull_release_on_conductor_signal
        label: Follow the conductor's clear signal and pull the release
        to: passenger_conductor_true_ending
        requires:
          notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_conductor_clearance: true
            heard_final_roll_call: true
      - id: confirm_conductor_clearance_from_signal
        label: Confirm the conductor's clear signal reaches every door
        to: passenger_conductor_clearance_check
        requires:
          all:
            - notFlag: reviewed_open_manifest_count
            - notFlag: confirmed_conductor_clearance
        effects:
          set:
            heard_conductor_clearance: true
            heard_final_roll_call: true
            confirmed_conductor_clearance: true
      - id: inspect_conductor_punch_memory
        label: Ask what the conductor's punch remembers
        to: passenger_conductor_punch_memory
        requires:
          notFlag: heard_conductor_punch_memory
        effects:
          set:
            heard_conductor_punch_memory: true
      - id: follow_conductor_signal_to_third_car
        label: Follow the conductor's clear signal to the release
        to: passenger_conductor_roll_call
        requires:
          notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_conductor_clearance: true
            heard_final_roll_call: true
      - id: follow_counted_conductor_signal_to_third_car
        label: Follow the conductor's counted clear signal to the release
        to: passenger_conductor_count_roll_call
        requires:
          flag: reviewed_open_manifest_count
        effects:
          set:
            heard_conductor_clearance: true
            heard_final_roll_call: true

  passenger_conductor_punch_memory:
    routeImportance: optional
    text: >
      The conductor turns the punch over in both hands. Its brass mouth is
      nicked with old transfers, each star-shaped bite a passenger who was
      supposed to change trains before the line learned to keep them. "I kept
      punching tickets after the doors stopped opening," he says. "Tonight I
      can punch clear instead." When he raises the tool again, the passengers
      answer the sound like a bell that finally rings outward.
    choices:
      - id: follow_punch_memory_to_third_car
        label: Follow the conductor's remembered clear signal into the third car
        to: passenger_conductor_intercom
        effects:
          set:
            heard_conductor_clearance: true

  passenger_mitten_memory:
    routeImportance: optional
    text: >
      The child accepts the mitten with both hands, then turns it inside out to
      show a transit stamp older than anyone on the platform should remember.
      "My mother told me not to lose the other one," he says, and the woman
      with the newspaper kneels before Mara can answer. "Then we will find it
      in the morning," she tells him. The child wipes rain from the bench with
      the returned cuff so the next passenger can sit long enough to remember
      her stop. The crowd shifts closer, not as passengers waiting to be
      counted, but as people beginning to look after one another.
    choices:
      - id: lead_mitten_child_to_third_car
        label: Lead the child and gathered passengers to the third car
        to: passenger_mitten_intercom
        effects:
          set:
            heard_gathered_passengers: true

  passenger_keepsake_handoff:
    routeImportance: optional
    text: >
      The manifest's details become a way to make the crowd real again. You
      give the warm lunch tin to the man whose hands still expect its handle,
      point the newspaper woman toward the conductor who remembers her stop,
      and sort the rain-dark umbrellas by the initials etched into their
      hooks. Each small return gives Mara another answered name, until the
      platform sounds less like a ledger and more like people finding their
      places beside one another.
    choices:
      - id: return_childs_mitten_from_keepsakes
        label: Return the child's stamped mitten before the keepsakes board
        to: passenger_mitten_memory
        requires:
          notFlag: returned_lost_mitten
        effects:
          set:
            returned_lost_mitten: true
      - id: check_matched_keepsakes_before_boarding
        label: Check that every matched keepsake has the right hands
        to: passenger_keepsake_check
        requires:
          notFlag: checked_matched_keepsakes
        effects:
          set:
            checked_matched_keepsakes: true
      - id: carry_matched_keepsakes_to_speaker
        label: Carry the matched keepsakes to the third-car speaker
        to: passenger_keepsake_intercom
        requires:
          notFlag: heard_gathered_passengers
        effects:
          set:
            heard_gathered_passengers: true
      - id: lead_keepsake_passengers_to_third_car
        label: Lead the matched passengers to the third car
        to: passenger_keepsake_boarding

  passenger_keepsake_check:
    routeImportance: optional
    text: >
      You pause at the threshold and let the manifest's ordinary proofs answer
      one more time. The lunch tin settles into the worker's grip only after he
      reads the initials scratched near the latch. The newspaper woman folds
      her transfer column around the conductor's punched stop. The umbrella
      hooks line up with hands that remember the weight of rain. Mara waits
      through the speaker until the check is finished, then says, "Now they
      are not just open. They are accounted for."
    choices:
      - id: confirm_checked_keepsake_owners_before_boarding
        label: Hold the release and confirm every keepsake owner
        to: passenger_keepsake_owner_check
        requires:
          notFlag: confirmed_keepsake_owners
        effects:
          set:
            confirmed_keepsake_owners: true
            heard_gathered_passengers: true
      - id: carry_checked_keepsakes_to_speaker
        label: Carry the checked keepsakes to the third-car speaker
        to: passenger_keepsake_intercom
        requires:
          notFlag: heard_gathered_passengers
        effects:
          set:
            heard_gathered_passengers: true
      - id: lead_checked_keepsakes_to_third_car
        label: Lead the checked keepsake passengers to the third car
        to: passenger_keepsake_boarding

  passenger_keepsake_boarding:
    routeImportance: optional
    text: >
      The third car fills by object before it fills by name. The lunch tin
      worker sets his tin under the first seat where the release waits, the
      newspaper woman tucks her transfer column against the window, and each
      umbrella hooks over a rail with its initials facing out. Mara starts to
      read the manifest again, then stops when the ordinary things answer for
      the people holding them.
    choices:
      - id: listen_to_keepsakes_answer_from_boarding
        label: Listen as the keepsakes answer from the third car
        to: passenger_keepsake_intercom
        effects:
          set:
            heard_gathered_passengers: true
      - id: hear_keepsake_roll_call_from_boarding
        label: Let the matched keepsakes finish Mara's roll call
        to: passenger_keepsake_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_gathered_passengers: true
            heard_final_roll_call: true
      - id: pull_release_after_keepsake_boarding
        label: Pull the release while every keepsake has its owner
        to: passenger_keepsake_true_ending

  passenger_farewell:
    routeImportance: optional
    text: >
      You start with the man holding the paper sack. Inside, his lunch tin is
      still warm, packed for a double shift he never reached. When he snaps the
      latch shut, the sound gives the platform a practical rhythm: the child
      with the mitten takes an old conductor's hand, the newspaper woman tucks
      her transfer under the tin's handle, and the crowd moves as if boarding
      has become ordinary work again. No one thanks you yet. They are saving
      their voices for the morning.
    choices:
      - id: return_from_passenger_farewell
        label: Let the lunch-tin worker set the pace to the third car
        to: passenger_lunch_tin_boarding
        effects:
          set:
            steadied_lunch_tin_worker: true
            set_lunch_tin_pace: true
      - id: lead_gathered_passengers_without_lunch_tin_pace
        label: Board the gathered passengers without waiting for his count
        to: train_car
        requires:
          notFlag: set_lunch_tin_pace

  passenger_gathered_boarding:
    routeImportance: optional
    text: >
      The gathered passengers board by passing steadiness from hand to hand.
      The newspaper woman folds her transfer column into the child's mittened
      palm, the old conductor braces the doorway for the lunch-tin worker, and
      the lunch-tin worker keeps his latch quiet so no one has to be counted by
      the line again. At the first seat, the emergency release waits under a
      crowd that is ready because every passenger helped the next one move.
    choices:
      - id: check_shared_release_from_gathered_boarding
        label: Check how the gathered passengers share the release
        to: passenger_gathered_release
        effects:
          set:
            heard_gathered_passengers: true
      - id: answer_final_roll_call_from_gathered_boarding
        label: Let the gathered passengers answer the final roll call
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: listen_to_gathered_passengers_from_boarding
        label: Listen to the gathered passengers before the release
        to: passenger_gathered_intercom
        effects:
          set:
            heard_gathered_passengers: true
      - id: pull_release_after_gathered_boarding
        label: Pass the release hand to hand with the gathered passengers
        to: passenger_gathered_release
        effects:
          set:
            heard_gathered_passengers: true

  passenger_lunch_tin_boarding:
    routeImportance: optional
    text: >
      The lunch-tin worker boards first and does not sit. He plants one hand on
      the rail, keeps the warm tin tucked against his hip, and clicks the latch
      each time another passenger finds the third car without looking at the
      HOME sign. The child, the newspaper woman, and the old conductor fall
      into that practical rhythm until the aisle feels less like a ledger and
      more like a break room after the whistle, everyone checking that the next
      person has coat, paper, badge, and breath before the door can close. Each
      click leaves a place open behind it, as if the tin is teaching the line
      how to count people without keeping them. Under the first seat, the
      emergency release waits for the count to become movement.
    choices:
      - id: pull_release_after_lunch_tin_boarding
        label: Pull the release while the lunch-tin count holds
        to: passenger_lunch_tin_self_count
        effects:
          set:
            heard_gathered_passengers: true
            counted_lunch_tin_worker_self: true
      - id: let_lunch_tin_worker_count_himself_from_boarding
        label: Let the lunch-tin worker count himself before the release
        to: passenger_lunch_tin_self_count
        requires:
          notFlag: counted_lunch_tin_worker_self
        effects:
          set:
            heard_gathered_passengers: true
            counted_lunch_tin_worker_self: true
      - id: check_lunch_tin_passengers_before_release
        label: Check the lunch-tin count against the passengers in the aisle
        to: passenger_lunch_tin_check
        requires:
          notFlag: checked_lunch_tin_passengers
        effects:
          set:
            checked_lunch_tin_passengers: true
            heard_gathered_passengers: true
      - id: read_lunch_tin_roster_from_boarding
        label: Read the shift roster tucked inside the lunch tin before the release
        to: passenger_lunch_tin_roster
        requires:
          notFlag: read_lunch_tin_roster
        effects:
          set:
            heard_gathered_passengers: true
            read_lunch_tin_roster: true
      - id: listen_to_lunch_tin_worker_from_boarding
        label: Listen as the lunch-tin worker keeps time
