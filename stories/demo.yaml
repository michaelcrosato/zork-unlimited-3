  release_handle_check:
    routeImportance: optional
    text: >
      The emergency release is not hidden magic. It is a red handle under the
      first seat, paint worn down where other hands tried to make it count for
      them. A stamped plate reads ALL DOORS, but the train has scratched HOME
      over the word all until Mara's cleared badge warms against the metal.
      From the speaker, her breath steadies once. The handle will not choose a
      destination. It will only open what the ledger tried to keep closed.
    choices:
      - id: pull_release_after_handle_check
        label: Pull the release after checking the handle
        to: true_ending

  train_map:
    routeImportance: main
    text: >
      Under the train's flickering light, the marked map looks less like a
      route and more like a promise someone kept badly: one transfer marked
      MORNING PLATFORM, one warning circled three times, and a hand-drawn arrow
      away from the HOME sign. The emergency release waits under the seat, but
      without Mara clear in the ledger, the map is the only instruction that
      does not ask you to trust the train.
    choices:
      - id: ride_with_map_after_study
        label: Follow the map to the morning platform
        to: morning_transfer
      - id: lower_map_to_sign
        label: Lower the map and look at the destination sign
        to: sign_warning

  morning_transfer:
    routeImportance: optional
    text: >
      The marked map does exactly what it promised. The train skips every
      impossible station and opens on a tiled transfer platform bright with
      morning. Behind you, through the closing doors, the underpass speaker
      keeps whispering names. Mara's is still the clearest.
    choices:
      - id: study_morning_map_note
        label: Read the final note written on the morning map
        to: morning_map_note
        requires:
          notFlag: read_morning_map_note
        effects:
          set:
            read_morning_map_note: true
      - id: listen_at_morning_doors
        label: Listen at the closing doors before you decide
        to: morning_doors
        requires:
          notFlag: heard_morning_doors
        effects:
          set:
            heard_morning_doors: true
      - id: look_back_at_home_reflection
        label: Look back at the HOME reflection in the train glass
        to: home_sign_echo
        requires:
          all:
            - item: map
            - notFlag: heard_home_sign_echo
        effects:
          set:
            heard_home_sign_echo: true
      - id: mark_morning_transfer_warning
        label: Mark the map with what the next rescuer must bring
        to: morning_warning_mark
        requires:
          notFlag: left_morning_warning
        effects:
          set:
            left_morning_warning: true
      - id: listen_to_clock_from_morning_transfer
        label: Listen as the stopped clock answers the morning platform
        to: morning_clock_catch_up
        requires:
          all:
            - notFlag: heard_morning_clock_catch_up
            - any:
                - flag: found_token
                - flag: knows_token_location
        effects:
          set:
            heard_morning_clock_catch_up: true
      - id: step_into_morning
        label: Step onto the morning platform and leave the line behind
        to: good_ending
      - id: turn_back_for_signal_token
        label: Hold the doors and return to the stopped clock
        to: clock
        requires:
          notItem: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_for_mara
        label: Hold the doors and return for Mara's ledger
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  morning_map_note:
    routeImportance: optional
    text: >
      On the back of the marked map, a conductor's pencil has left one last
      instruction: SAFE TRANSFER IS NOT CLEARANCE. Survive first, then send
      someone back with the badge, the fuse, and the signal token. The morning
      light makes the note look practical instead of cruel, but Mara's voice
      keeps reading names behind the closing doors.
    choices:
      - id: leave_after_morning_map_note
        label: Step into morning with the map's warning in mind
        to: good_ending
      - id: mark_warning_for_next_rescuer
        label: Add your own warning for whoever finds the map next
        to: morning_warning_mark
        requires:
          notFlag: left_morning_warning
        effects:
          set:
            left_morning_warning: true
      - id: turn_back_from_map_note_for_token
        label: Take the map's note seriously and recover the signal token
        to: tunnel
        requires:
          notItem: token
        effects:
          addItem: token
          set:
            found_token: true
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_from_map_note_for_mara
        label: Take the map's note seriously and return for Mara's ledger
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  morning_doors:
    routeImportance: optional
    text: >
      At the closing doors, the underpass is only a dark reflection in the
      glass. Mara is not begging. She is reading the ledger in a steady night
      voice, leaving enough silence after each name for someone to answer.
      The morning platform is real under your shoes, but the train has not
      stopped counting.
    choices:
      - id: leave_after_morning_doors
        label: Step into morning with Mara's voice behind you
        to: good_ending
      - id: mark_door_warning_for_next_rescuer
        label: Mark the map before the doors close
        to: morning_warning_mark
        requires:
          notFlag: left_morning_warning
        effects:
          set:
            left_morning_warning: true
      - id: turn_back_from_morning_doors_for_token
        label: Recover the signal token and return to the tunnel
        to: tunnel
        requires:
          notItem: token
        effects:
          addItem: token
          set:
            found_token: true
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_from_morning_doors_for_mara
        label: Hold the doors and return for Mara's ledger
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  morning_warning_mark:
    routeImportance: optional
    text: >
      You press the conductor's pencil into the soft back of the map until the
      warning darkens under your hand: CLOCK TOKEN. BADGE PROOF. FUSE BEFORE
      GATE. CLEAR MARA VALE BEFORE THE RELEASE. The morning platform does not
      argue with you. It only gives the words enough light to be found by
      someone who may be braver, or only later.
    choices:
      - id: leave_after_marking_morning_warning
        label: Leave the marked warning where the morning light can find it
        to: good_ending
      - id: listen_to_morning_clock_catch_up
        label: Listen as the morning clocks catch up
        to: morning_clock_catch_up
        requires:
          notFlag: heard_morning_clock_catch_up
        effects:
          set:
            heard_morning_clock_catch_up: true
      - id: turn_back_from_warning_mark_for_token
        label: Pocket the map and go back for the signal token
        to: tunnel
        requires:
          notItem: token
        effects:
          addItem: token
          set:
            found_token: true
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_from_warning_mark_for_mara
        label: Pocket the map and return for Mara's ledger
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  morning_clock_catch_up:
    routeImportance: optional
    text: >
      The morning station clocks begin to move in order, each one ticking past
      1:13 as if the hour had only been waiting for permission. Through the
      closing train doors, the underpass clock answers with one dry click.
      Mara stops reading for exactly that long, then starts again from the
      first name on the page. The warning on the map is still wet under your
      thumb.
    choices:
      - id: leave_after_morning_clock_catch_up
        label: Let the clocks move on and step into morning
        to: good_ending
      - id: turn_back_from_morning_clock_for_token
        label: Follow the answering clock back to the signal token
        to: tunnel
        requires:
          notItem: token
        effects:
          addItem: token
          set:
            found_token: true
            returned_from_safe_escape: true
            knows_platform: true
            knows_token_location: true
            met_mara: true
      - id: turn_back_from_morning_clock_for_mara
        label: Return before Mara has to start the ledger again
        to: service_room
        requires:
          item: token
        effects:
          set:
            returned_from_safe_escape: true
            knows_platform: true
            met_mara: true

  mara_intercom:
    routeImportance: supporting
    text: >
      Mara's voice returns through the ceiling speaker, no longer buried in
      static. "When the doors open, do not count the passengers," she says.
      "Some of us have been counted for too long. Just pull the release and let
      the morning do the rest."
    choices:
      - id: pull_release_after_manifest_goodbye
        label: Pull the release for Mara and the manifest
        to: passenger_true_ending
        requires:
          flag: read_passenger_manifest
      - id: pull_release_after_mara_goodbye
        label: Pull the release and let the morning in
        to: true_ending
        requires:
          notFlag: read_passenger_manifest

  mara_badge_proof_intercom:
    routeImportance: optional
    text: >
      The ceiling speaker warms before Mara speaks. "You found the proof line,"
      she says. "Badge proof required. For forty-three years that sounded like
      a lock. Tonight you made it an answer." The badge in your pocket ticks
      once against the release handle, and her voice steadies around the old
      number. "Pull now. Let the proof open something instead of holding me in
      place."
    choices:
      - id: ask_about_thumbprint_after_badge_proof
        label: Ask Mara why the thumbprint tore the ledger
        to: mara_thumbprint_intercom
        requires:
          flag: read_mara_thumbprint
      - id: pull_release_after_badge_proof_goodbye
        label: Pull the release while the badge proof answers
        to: true_ending
      - id: confirm_badge_proof_receipt
        label: Confirm the badge proof reaches every door
        to: mara_badge_proof_receipt
        requires:
          notFlag: confirmed_badge_proof_receipt
        effects:
          set:
            confirmed_badge_proof_receipt: true

  mara_badge_proof_receipt:
    routeImportance: optional
    text: >
      You keep one hand on the release while Mara's badge number travels down
      the train. The first door answers with the old proof line, but the second
      repeats it as clearance, and the third says it like a name someone can
      leave with. The badge warms against the handle each time the answer comes
      back changed. Mara does not have to state the number again. "Received by
      every door," the speaker says, and for once the proof sounds finished
      instead of demanded.
    choices:
      - id: pull_release_after_badge_proof_receipt
        label: Pull the release after every door receives the proof
        to: mara_badge_proof_receipt_true_ending

  mara_last_dispatch_intercom:
    routeImportance: main
    text: >
      The speaker carries Mara's last dispatch, and the train cannot flatten it
      into another order. Route held. Doors ready. Release authorized. Between
      each phrase you hear Mara breathing beside the signal, no longer asking
      permission from the ledger she kept alive. She leaves the channel open so
      every car hears the public record: one pull will answer every door she
      held. "That is the whole message," she says. "Pull once, and let it
      finally arrive."
    choices:
      - id: listen_to_badge_proof_after_last_dispatch
        label: Listen as Mara ties the last dispatch to her badge proof
        to: mara_badge_proof_intercom
        requires:
          flag: knows_badge_proof
        effects:
          set:
            heard_mara_goodbye: true
      - id: wait_for_handoff_after_last_dispatch
        label: Wait while Mara carries the last dispatch to the far door
        to: mara_handoff_intercom
        effects:
          set:
            saw_mara_handoff: true
      - id: pull_release_after_last_dispatch_goodbye
        label: Pull the release after Mara's last dispatch
        to: mara_last_dispatch_true_ending
      - id: confirm_last_dispatch_receipt
        label: Confirm every car repeats Mara's dispatch
        to: mara_last_dispatch_receipt
        requires:
          notFlag: confirmed_last_dispatch_receipt
        effects:
          set:
            confirmed_last_dispatch_receipt: true

  mara_last_dispatch_receipt:
    routeImportance: optional
    text: >
      You hold the release and let Mara's dispatch travel car by car before
      you pull. The first speaker answers with Route held. The second answers
      Doors ready. The third, closest to your hand, repeats Passenger release
      authorized by proof, not by permission. The words come back changed by
      every open doorway they pass: not an order, not a delay, but a receipt
      that the line heard her correctly at last. Mara exhales once over the
      channel. "Received," she says. "Now make it true."
    choices:
      - id: pull_release_after_dispatch_receipt
        label: Pull the release after the dispatch is received
        to: mara_last_dispatch_receipt_true_ending

  mara_thumbprint_intercom:
    routeImportance: optional
    text: >
      Mara's voice steadies when the train shudders around the torn thumbprint
      memory. "I left that mark because the line wanted a last dispatcher more
      than it wanted passengers home," she says. "You cleared the name it could
      hold, and the release will do what I could not finish from the booth: all
      doors, all at once."
    choices:
      - id: ask_mara_to_carry_thumbprint_to_far_door
        label: Ask Mara to carry the thumbprint to the far door
        to: mara_thumbprint_handoff_intercom
        requires:
          notFlag: saw_mara_handoff
        effects:
          set:
            saw_mara_handoff: true
      - id: pull_release_after_thumbprint_goodbye
        label: Pull the release for every door Mara held open
        to: true_ending
      - id: confirm_thumbprint_oath_receipt
        label: Confirm Mara's thumbprint oath reaches every door
        to: mara_thumbprint_receipt
        requires:
          notFlag: confirmed_mara_thumbprint_receipt
        effects:
          set:
            confirmed_mara_thumbprint_receipt: true

  mara_thumbprint_receipt:
    routeImportance: optional
    text: >
      You keep the release under your palm while Mara's torn-thumbprint oath
      travels down the train. The first door answers with a dispatcher's
      promise, the second with rain on the threshold, and the third with the
      small click of a latch refusing to close. The mark that once pinned Mara
      to the final line comes back as a receipt from every door she kept open:
      witnessed, received, ready. "Now," Mara says, and the word does not sound
      like duty anymore.
    choices:
      - id: pull_release_after_thumbprint_receipt
        label: Pull the release after every door receives the oath
        to: mara_thumbprint_receipt_true_ending

  mara_handoff_intercom:
    routeImportance: optional
    text: >
      The speaker clicks after Mara has already left the booth, and for a
      moment you hear her crossing the platform instead of haunting it. "I
      thought stepping away would feel like abandoning my post," she says. "It
      feels more like opening the last door from the other side. Pull the
      release when you are ready."
    choices:
      - id: pull_release_after_handoff_goodbye
        label: Pull the release while Mara opens the far door
        to: mara_handoff_true_ending
      - id: confirm_mara_handoff_last_door
        label: Confirm Mara has the last door clear
        to: mara_handoff_door_check
        requires:
          all:
            - notFlag: checked_mara_handoff
            - notFlag: confirmed_mara_handoff_doors
        effects:
          set:
            checked_mara_handoff: true
            confirmed_mara_handoff_doors: true

  mara_handoff_door_check:
    routeImportance: optional
    text: >
      You hold the release instead of pulling on the first breath. Through the
      open car doors, Mara steps backward to the far threshold and plants one
      hand against the rail, leaving her other hand free for the passengers
      crossing past her. She looks down the length of the train until every
      door answers with morning rain. "Clear," she says, not into the speaker
      this time. "Now."
    choices:
      - id: pull_release_after_handoff_door_check
        label: Pull the release after Mara clears the last door
        to: mara_handoff_door_checked_true_ending

  mara_thumbprint_handoff_intercom:
    routeImportance: optional
    text: >
      The speaker opens on the sound of Mara touching the far doors with the
      same hand that tore the ledger. "The line wanted my print to mean I
      stayed," she says, no longer behind glass. "Let it mean I witnessed the
      last door open instead. Pull the release while I am still on this side
      of the threshold."
    choices:
      - id: pull_release_after_thumbprint_handoff
        label: Pull the release while Mara's thumbprint holds the far door
        to: mara_handoff_true_ending
      - id: carry_thumbprint_handoff_to_far_door
        label: Let Mara carry the thumbprint to the far door
        to: mara_handoff_intercom

  mara_manifest_handoff_intercom:
    routeImportance: optional
    text: >
      The speaker stays open after Mara has called every stamped door. You can
      hear the care in the pauses she leaves between names: long enough for
      breath, short enough that the line cannot teach anyone to wait again.
      "They are not entries anymore," she says. "They are almost through. If
      you need proof, count doors now; then pull while they still sound like
      people."
    choices:
      - id: confirm_manifest_handoff_doors
        label: Confirm every manifest door has someone moving through it
        to: passenger_manifest_handoff_door_check
        requires:
          notFlag: confirmed_manifest_handoff_doors
        effects:
          set:
            confirmed_manifest_handoff_doors: true
      - id: pull_release_after_manifest_handoff_goodbye
        label: Pull the release while Mara holds the manifest open
        to: passenger_manifest_handoff_release
        effects:
          set:
            manifest_handoff_reached_doors: true

  passenger_manifest_handoff_release:
    routeImportance: optional
    text: >
      You set your fingers under the emergency release, but you do not make the
      handle the only voice in the car. Mara's call reaches the nearest opened
      door first. The newspaper woman repeats the child's name, the conductor
      passes the lunch-tin worker's stop down the aisle, and a stranger catches
      a stranger's shoulder before the old line can turn the manifest back into
      rows. Now the handoff is moving faster than the ledger can close.
    choices:
      - id: pull_release_after_manifest_handoff_reaches_doors
        label: Pull the release after the handoff reaches the doors
        to: passenger_manifest_handoff_true_ending

  passenger_manifest_handoff_door_check:
    routeImportance: optional
    text: >
      You keep the release under your palm and count by doors instead of page
      numbers. Mara stands where the platform wind can reach her now, passing
      each name to the passenger nearest the threshold. The newspaper woman
      takes the child by the mittened hand. The conductor steadies the
      lunch-tin worker with one punched transfer tucked between two fingers.
      Every stamped door has a living hand on it before Mara looks back and
      says, "Now the list can move."
    choices:
      - id: pull_release_after_manifest_handoff_door_check
        label: Pull the release after every manifest handoff is moving
        to: passenger_manifest_handoff_door_checked_true_ending

  mara_manifest_thumbprint_intercom:
    routeImportance: optional
    text: >
      The third car carries Mara's voice and the soft scrape of her thumb over
      the torn ledger page. "I thought that mark meant I had to be last," she
      says. Around her, the opened passengers answer one by one, and each
      answer loosens the old ink. "Let it mean I stayed long enough to leave
      with them."
    choices:
      - id: confirm_manifest_thumbprint_receipt
        label: Confirm the thumbprint oath reaches the opened passengers
        to: mara_manifest_thumbprint_receipt
        requires:
          notFlag: confirmed_manifest_thumbprint_receipt
        effects:
          set:
            confirmed_manifest_thumbprint_receipt: true
      - id: pull_release_after_manifest_thumbprint_goodbye
        label: Pull the release while Mara leaves with the manifest
        to: passenger_manifest_thumbprint_true_ending

  mara_manifest_thumbprint_receipt:
    routeImportance: optional
    text: >
      You keep the release ready and let Mara's thumb cross the page one last
      time. The opened manifest answers in passenger order, not ledger order:
      newspaper fold, mitten snap, lunch tin clasp, conductor's punch. Each
      answer touches the torn print and moves on toward the threshold. By the
      time the speaker returns to Mara, the old mark has stopped meaning last
      dispatcher. It means witnessed, counted, walking. "Received by the
      passengers," she says. "Now open the doors."
    choices:
      - id: pull_release_after_manifest_thumbprint_receipt
        label: Pull the release after the passengers receive the oath
        to: mara_manifest_thumbprint_receipt_true_ending

  mara_manifest_intercom:
    routeImportance: optional
    text: >
      Mara reads from the opened manifest, and each name answers with a small
      ordinary sound: a lunch tin clasp, a mitten shaken free, umbrellas
      knocking together by the doors. "They remember the way out now," she
      says. "Pull the release before the line teaches them to wait again."
    choices:
      - id: let_manifest_names_answer_once
        label: Let the opened names answer once before the release
        to: passenger_manifest_answers
        effects:
          set:
            manifest_names_answered_once: true
      - id: pull_release_after_manifest_goodbye
        label: Pull the release while Mara keeps the doors open
        to: passenger_manifest_true_ending

  passenger_manifest_ready_intercom:
    routeImportance: optional
    text: >
      You keep one hand on the release and look back through the third car.
      The newspaper is folded clear of the aisle. The lunch tin rests under a
      seat. The child with one mitten stands where Mara can see him from the
      speaker grille. "Every kept name is aboard," Mara says. Then she draws
      breath to finish the count properly, and for once the manifest sounds
      like a passenger list instead of a sentence.
    choices:
      - id: listen_to_mara_finish_ready_manifest
        label: Let Mara finish the ready manifest count
        to: mara_manifest_intercom
        requires:
          notFlag: heard_mara_goodbye
        effects:
          set:
            heard_mara_goodbye: true
      - id: pull_release_with_ready_manifest
        label: Pull the release with every kept name aboard
        to: passenger_manifest_true_ending

  passenger_manifest_answers:
    routeImportance: optional
    text: >
      Mara starts again, slower, and this time she does not finish any name
      alone. The lunch-tin worker clicks his clasp on the second syllable, the
      child shakes rain from the mitten on the third, and the newspaper woman
      reads the stop printed under each door. By the final row, the manifest is
      no longer a list. It is a car full of people proving they can answer for
      themselves. "Now," Mara says, almost smiling. "Before the line remembers
      how to interrupt."
    choices:
      - id: carry_manifest_answers_to_platform
        label: Carry the manifest answers toward the third car
        to: passenger_answers
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
      - id: hand_manifest_answers_to_mara
        label: Let Mara hand the answered manifest to the passengers aboard
        to: passenger_answered_handoff_roll_call
        requires:
          notFlag: heard_answered_passengers
        effects:
          set:
            saw_mara_manifest_handoff: true
            heard_passenger_answers: true
            heard_answered_passengers: true
      - id: let_manifest_answers_keep_door_rhythm
        label: Let the answered names keep their old door rhythm
        to: passenger_echoed_manifest_intercom
        requires:
          notFlag: heard_passenger_echoes
        effects:
          set:
            heard_passenger_echoes: true
      - id: check_manifest_answers_against_echoes
        label: Check the answered names against the familiar door sounds
        to: passenger_echoed_check
        requires:
          notFlag: heard_passenger_echoes
        effects:
          set:
            heard_passenger_echoes: true
            echoed_manifest_boarded: true
            checked_echoed_passengers: true
      - id: pull_release_after_manifest_answers
        label: Pull the release after the manifest answers
        to: passenger_manifest_true_ending

  passenger_echoed_manifest_intercom:
    routeImportance: optional
    text: >
      The third car answers with the same small sounds you heard behind the
      stamped doors: thermos cap, newspaper fold, mittened knock against the
      frame. They are no longer trapped behind ink, but the rhythm is familiar
      enough that Mara stops before reading the first name twice. "You heard
      them waiting," she says. "Now let the line hear them leaving." The
      echoes do not repeat the tunnel anymore. They keep time for people
      crossing it.
    choices:
      - id: pause_for_echoed_boarding
        label: Pause long enough to watch the familiar echoes board
        to: passenger_echoed_boarding
        requires:
          notFlag: echoed_manifest_boarded
        effects:
          set:
            echoed_manifest_boarded: true
      - id: confirm_echoed_manifest_seats
        label: Check every familiar echo before the release
        to: passenger_echoed_check
        requires:
          notFlag: confirmed_echoed_manifest_seats
        effects:
          set:
            checked_echoed_passengers: true
            echoed_manifest_boarded: true
      - id: pull_release_after_echoed_manifest_goodbye
        label: Seat every opened-door echo before the release
        to: passenger_echoed_seat_receipt
        requires:
          notFlag: confirmed_echoed_manifest_seats
        effects:
          set:
            checked_echoed_passengers: true
            confirmed_echoed_manifest_seats: true
            echoed_manifest_boarded: true

  passenger_echoed_seat_receipt:
    routeImportance: optional
    text: >
      You hold the release and let each familiar sound find an ordinary place
      inside the third car. The thermos cap clicks under the worker's thumb
      instead of behind a stamped door. The newspaper fold rustles from a lap,
      not from the other side of glass. The mittened knock taps the rail twice,
      and this time everyone can see the child making the count. Mara lets the
      receipt move through the speaker without reading over it. "Every echo is
      aboard," she says. "Now let them leave as passengers."
    choices:
      - id: pull_release_after_echoed_seat_receipt
        label: Pull the release after every echo is aboard
        to: passenger_echoed_true_ending

  passenger_threshold_intercom:
    routeImportance: optional
    text: >
      The third-car speaker stays open on the threshold you held. Mara names
      the first passenger, then stops when the doorway answers in footsteps
      instead: newspaper, lunch tin, mitten, umbrella, breath. The line tries
      to make the pause into a count, but the passengers keep moving through
      it together, each cleared inch becoming an invitation for the person
      behind them. "That is enough proof," Mara says. "Pull the release before
      the threshold remembers how to close."
    choices:
      - id: confirm_threshold_clearance_before_release
        label: Confirm every passenger clears the threshold before release
        to: passenger_threshold_clearance_check
        requires:
          notFlag: confirmed_threshold_clearance
        effects:
          set:
            confirmed_threshold_clearance: true
      - id: pull_release_after_threshold_manifest
        label: Pull the release while the threshold stays open
        to: passenger_true_ending

  passenger_threshold_clearance_check:
    routeImportance: optional
    text: >
      You keep one hand off the release while the threshold makes one last
      count without numbers. Newspaper first, lunch tin next, the child with
      both mittened hands on the rail, then the old conductor holding the door
      until the last shoulder is clear. No one has to answer to the ledger.
      They answer by leaving enough room for the person behind them. Mara lets
      the footsteps reach the speaker, then says, "Threshold clear. Now let it
      stay open."
    choices:
      - id: pull_release_after_confirmed_threshold_clearance
        label: Pull the release after the threshold is clear
        to: passenger_threshold_checked_true_ending

  passenger_room_intercom:
    routeImportance: optional
    text: >
      The speaker carries the noise of people making room for one another:
      knees shifting, bags passed hand to hand, the lunch tin set carefully
      under the first seat beside the release. Mara does not read another name.
      "That is what the ledger never knew how to count," she says. "Not proof
      that each passenger belongs to the line. Proof that there is enough space
      for everyone to leave together."
    choices:
      - id: pass_room_release_after_intercom
        label: Pass the release handle through the steadied car
        to: passenger_room_release
        requires:
          notFlag: shared_release_reached
        effects:
          set:
            shared_release_reached: true
      - id: pull_release_after_making_room
        label: Move the release hand to hand while the car holds everyone
        to: passenger_room_release
        effects:
          set:
            shared_release_reached: true

  passenger_room_release:
    routeImportance: optional
    text: >
      You do not pull the release alone. The newspaper woman braces the seat,
      the lunch-tin worker clears the strap from the floor, and the mittened
      child puts both hands over yours before the handle gives. The motion
      travels through the crowded car like a decision everyone is allowed to
      share, then settles back into the aisle as room no one has to earn.
    choices:
      - id: pull_shared_release_after_making_room
        label: Let the shared release reach the back row before pulling
        to: passenger_room_release_receipt
        effects:
          set:
            confirmed_shared_room_release: true
      - id: confirm_shared_room_release
        label: Confirm the shared release reaches the back of the car
        to: passenger_room_release_receipt
        requires:
          notFlag: confirmed_shared_room_release
        effects:
          set:
            confirmed_shared_room_release: true

  passenger_room_release_receipt:
    routeImportance: optional
    text: >
      You keep the handle still for one breath and let the shared motion travel
      the full length of the car. The newspaper woman passes the brace to the
      lunch-tin worker, the worker clears a space for the old conductor, and the
      conductor waits until the mittened child can feel the handle answer back.
      No hand is left out, and no one has to push forward alone. Mara hears the
      room settle around the release and says, "Received by the back row. Pull
      together."
    choices:
      - id: pull_release_after_confirmed_shared_room_release
        label: Pull together after the release reaches every hand
        to: passenger_shared_release_checked_true_ending

  passenger_counted_manifest_intercom:
    routeImportance: optional
    text: >
      Mara brings the reviewed count into the third car like a folded timetable.
      She names what each opened door carried back: newspaper, lunch tin,
      mitten, conductor's punch. The passengers answer in small practical
      sounds before she reaches the end, no longer just entries cleared from a
      page but people checking that the others are still with them. If the old
      blank row has already been named, the check moves through the car like
      extra space: the newspaper woman waits for the mitten child, the worker
      waits for the conductor, and no one lets the pause close around Mara
      again. "This is the count the line cannot keep," Mara says. "Pull the
      release while they are counting one another home."
    choices:
      - id: let_passengers_finish_reviewed_count
        label: Let the passengers finish the reviewed count together
        to: passenger_counted_chorus
        requires:
          notFlag: passengers_finished_reviewed_count
        effects:
          set:
            passengers_finished_reviewed_count: true
            reviewed_count_release_ready: true
      - id: ask_who_reviewed_count_left_blank
        label: Ask Mara who the old blank space belonged to
        to: passenger_missing_count
        requires:
          notFlag: checked_missing_passenger_count
        effects:
          set:
            checked_missing_passenger_count: true
      - id: pull_release_before_reviewed_count_finishes
        label: Start the release before Mara has to finish the count
        to: passenger_counted_chorus
        effects:
          set:
            passengers_finished_reviewed_count: true
            reviewed_count_release_ready: true
      - id: pull_release_after_counted_manifest_goodbye
        label: Let the reviewed count become the passengers' chorus
        to: passenger_counted_chorus
        effects:
          set:
            passengers_finished_reviewed_count: true
            reviewed_count_release_ready: true

  passenger_counted_chorus:
    routeImportance: optional
    text: >
      Mara stops at the old blank space, but the passengers do not. The
      newspaper woman reads the transfer aloud, the lunch-tin worker answers
      with the time she should have clocked out, the mitten child says present
      twice so the old conductor can hear. Then the old conductor calls back,
      not to keep order, but to make sure the child's second answer was heard.
      By the time Mara breathes again, the count has become a chorus with no
      last name left for the line to claim.
    choices:
      - id: pull_release_after_counted_chorus
        label: Pull the release after the passengers finish the count
        to: passenger_counted_true_ending
        requires:
          notFlag: reviewed_count_release_ready
      - id: pull_release_while_reviewed_count_holds
        label: Pull the release while Mara's reviewed count still holds
        to: passenger_reviewed_count_true_ending
        requires:
          notFlag: shared_count_release_ready

  passenger_morning_intercom:
    routeImportance: optional
    text: >
      The third-car speaker catches the morning chorus as the passengers board.
      Someone names the kettle before it boils dry. Someone else remembers the
      time clock, the radiator, the raincoat still hanging by a back door. Mara
      does not turn those memories into proof; she lets them stay ordinary
      until the destination sign gives up spelling HOME and starts showing
      stops with real streets again.
    choices:
      - id: pull_release_after_morning_chorus_boarding
        label: Let the morning chorus name its stops before the release
        to: passenger_morning_stop_check
        effects:
          set:
            confirmed_morning_stops: true
      - id: confirm_morning_stops_before_release
        label: Confirm the remembered stops before pulling the release
        to: passenger_morning_stop_check
        requires:
          notFlag: confirmed_morning_stops
        effects:
          set:
            confirmed_morning_stops: true

  passenger_morning_stop_check:
    routeImportance: optional
    text: >
      You keep the release under your palm and let the destination sign finish
      changing. HOME breaks into a row of real stops: Warden Street, Bellweather
      Yard, Ash Steps, all the places the passengers named from kitchens,
      clocks, radiators, and back doors. The chorus does not fade when the sign
      answers. It grows quieter, steadier, like people reading the way home
      without needing the tunnel to say it for them.
    choices:
      - id: pull_release_after_confirmed_morning_stops
        label: Pull the release after the remembered stops answer
        to: passenger_morning_stop_checked_true_ending

  passenger_answered_handoff_roll_call:
    routeImportance: optional
    text: >
      The third car does not board in silence. Mara calls from the speaker, but
      the opened passengers answer before her pauses can become another kind of
      waiting: the newspaper woman naming Warden Street, the lunch-tin worker
      counting the door clear, the child answering present from the threshold.
      By the time you reach the first seat, Mara's roll call has become a
      handoff instead of a duty she has to carry alone.
    choices:
      - id: listen_to_answered_handoff_after_roll_call
        label: Listen as Mara lets the answered passengers carry the count
        to: passenger_answered_handoff_intercom
        effects:
          set:
            heard_mara_goodbye: true

  passenger_answered_handoff_intercom:
    routeImportance: optional
    text: >
      The third car fills with the rhythm Mara began at the opened manifest:
      her voice offering each name, each passenger answering before the line
      can turn them back into entries. The child says present with both hands
      on the returned doorway, the newspaper woman answers for the stop she
      almost forgot, and Mara lets their voices outrun hers at last. Beneath
      the first seat, the emergency release waits in reach. "They can answer
      for themselves now," she says. "Pull the release while they still believe
      it."
    choices:
      - id: pull_release_after_answered_handoff_intercom
        label: Pull the release while Mara's handoff holds
        to: passenger_answered_handoff_true_ending
      - id: confirm_answered_handoff_thresholds
        label: Confirm every answered name has crossed the threshold
        to: passenger_answered_handoff_check
        requires:
          notFlag: confirmed_answered_handoff_thresholds
        effects:
          set:
            confirmed_answered_handoff_thresholds: true

  passenger_answered_handoff_check:
    routeImportance: optional
    text: >
      You hold the release while Mara gives the roll call one last careful
      shape. She offers a name, and the passenger who answers touches the
      threshold before passing it to the person behind them. The child answers
      for himself and then waits for the newspaper woman. The conductor calls
      the lunch-tin worker clear before lowering his punch. By the final name,
      the handoff is no longer a voice moving down a list. It is a line of
      people making sure every answer has crossed into rain.
    choices:
      - id: pull_release_after_confirmed_answered_handoff
        label: Pull the release after every answered name crosses
        to: passenger_answered_handoff_true_ending

  passenger_answered_intercom:
    routeImportance: optional
    text: >
      The passengers who answered roll call board without rushing. The child
      repeats his own name under his breath, the newspaper woman folds her
      transfer into a square she can hold, and the old conductor counts the
      open doors once without asking Mara to prove them twice. "They heard
      themselves," Mara says through the speaker. "Pull the release before the
      line teaches them to wait for permission again."
    choices:
      - id: pull_release_after_answered_intercom
        label: Pull the release while the answered names hold
        to: passenger_answered_true_ending
      - id: confirm_answered_passenger_receipt
        label: Confirm each answered passenger before pulling the release
        to: passenger_answered_receipt
        requires:
          all:
            - notFlag: confirmed_answered_passenger_receipt
            - notFlag: checked_answered_passengers
        effects:
          set:
            confirmed_answered_passenger_receipt: true
            checked_answered_passengers: true

  passenger_answered_receipt:
    routeImportance: optional
    text: >
      You keep the release under your palm and look for ordinary proof instead
      of another roll call. The child raises both hands from the rail and says
      his own name once. The newspaper woman tucks Warden Street inside her
      coat, then nods to the person beside her. The old conductor calls the
      aisle clear only after every answer has somewhere human to land. Mara
      does not repeat the list. The speaker catches their voices carrying it
      for her, and the line has no blank place left to take hold.
    choices:
      - id: pull_release_after_answered_receipt
        label: Pull the release after every answered passenger is witnessed
        to: passenger_answered_true_ending

  passenger_conductor_intercom:
    routeImportance: supporting
    text: >
      The conductor's borrowed signal carries into the third car before Mara
      speaks. Under the first seat, the emergency release waits in your hand.
      "Platform clear," he calls again, softer this time, and the answered
      passengers echo it down the aisle until it stops sounding like an order
      and starts sounding like a promise. Mara lets the old worker's voice hold
      the line. "He remembers the way out," she says. "Pull the release on his
      clear."
    choices:
      - id: pull_release_on_conductor_clear
        label: Pull the release on the conductor's clear signal
        to: passenger_conductor_true_ending
        requires:
          all:
            - notFlag: punched_conductor_transfer
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: confirm_intercom_conductor_clearance
        label: Confirm every door answered the conductor's clear signal
        to: passenger_conductor_clearance_check
        requires:
          all:
            - notFlag: punched_conductor_transfer
            - notFlag: reviewed_open_manifest_count
            - notFlag: confirmed_conductor_clearance
        effects:
          set:
            heard_final_roll_call: true
            confirmed_conductor_clearance: true
      - id: hear_final_conductor_roll_call
        label: Hear the conductor call the final platform clear
        to: passenger_conductor_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: hear_counted_conductor_roll_call
        label: Hear the conductor call the counted manifest clear
        to: passenger_conductor_count_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - flag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: ask_conductor_to_punch_transfer
        label: Ask the conductor to punch one last transfer for morning
        to: passenger_conductor_transfer
        requires:
          notFlag: punched_conductor_transfer
        effects:
          set:
            punched_conductor_transfer: true
      - id: hold_for_conductor_roll_call_before_release
        label: Hold the release until the conductor clears every door
        to: passenger_conductor_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: hold_for_conductor_count_before_release
        label: Hold the release until the conductor clears the counted manifest
        to: passenger_conductor_count_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - flag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true

  passenger_conductor_transfer:
    routeImportance: optional
    text: >
      The old conductor takes the blank transfer from the newspaper woman's
      hand and slides it into his punch. The tool bites once, leaving a clean
      star-shaped hole where the destination should have been. Rain-bright
      platform light shows through the cut before the doors have opened, as if
      the ticket already knows a stop beyond Warden Street. "Valid for
      morning," he says, and passes it down the aisle until the child, the
      lunch-tin worker, and Mara all touch the same small proof that the line
      has to let them change trains instead of circling back.
    choices:
      - id: pass_punched_transfer_to_child
        label: Let the child carry the punched transfer to Mara's speaker
        to: passenger_conductor_transfer_handoff
        requires:
          all:
            - notFlag: reviewed_open_manifest_count
            - notFlag: punched_transfer_carried_forward
        effects:
          set:
            punched_transfer_carried_forward: true
      - id: press_punched_transfer_to_speaker
        label: Press the punched transfer to Mara's speaker before pulling the release
        to: passenger_conductor_transfer_proof
        requires:
          all:
            - notFlag: reviewed_open_manifest_count
            - notFlag: pressed_transfer_to_speaker
        effects:
          set:
            punched_transfer_carried_forward: true
            pressed_transfer_to_speaker: true
      - id: pull_release_with_punched_transfer
        label: Pull the release while the punched transfer is still being passed
        to: passenger_conductor_transfer_true_ending
        requires:
          notFlag: reviewed_open_manifest_count
      - id: hear_counted_transfer_conductor_roll_call
        label: Let the punched transfer carry the counted clear call
        to: passenger_conductor_count_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - flag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: hear_transfer_conductor_roll_call
        label: Let the punched transfer become the final clear call
        to: passenger_conductor_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: hold_for_transfer_conductor_roll_call
        label: Hold the release while the punched transfer becomes a clear call
        to: passenger_conductor_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true
      - id: hold_for_transfer_conductor_count
        label: Hold the release while the punched transfer carries the count
        to: passenger_conductor_count_roll_call
        requires:
          all:
            - notFlag: heard_final_roll_call
            - flag: reviewed_open_manifest_count
        effects:
          set:
            heard_final_roll_call: true

  passenger_conductor_transfer_handoff:
    routeImportance: optional
    text: >
      The child takes the punched transfer in both hands and walks it to the
      ceiling speaker as if Mara can take hold from the other side. The
      conductor steadies the aisle pole. The newspaper woman reads the blank
      destination aloud as morning, and the lunch-tin worker answers with the
      shift bell he never reached, not as another count but as a connection
      they are allowed to make. When the paper reaches the speaker grille, Mara
      laughs once, startled by proof light enough to pass hand to hand. "That
      is enough," she says. "Pull it now."
    choices:
      - id: press_transfer_to_speaker_grille
        label: Press the punched transfer flat against Mara's speaker grille
        to: passenger_conductor_transfer_proof
        requires:
          notFlag: pressed_transfer_to_speaker
        effects:
          set:
            pressed_transfer_to_speaker: true
      - id: pull_release_after_transfer_handoff
        label: Pull the release after the punched transfer reaches Mara
        to: passenger_conductor_transfer_true_ending
      - id: check_handoff_transfer_stops
        label: Check the carried transfer against every passenger's stop
        to: passenger_conductor_transfer_stop_check
        requires:
          notFlag: confirmed_transfer_stops
        effects:
          set:
            confirmed_transfer_stops: true

  passenger_conductor_transfer_proof:
    routeImportance: optional
    text: >
      You press the punched transfer against the speaker grille. The star hole
      lines up with Mara's voice and the carriage lights shine through it,
      throwing one small morning-shaped mark across the ceiling. The child sees
      it first. Then the newspaper woman, the lunch-tin worker, and the old
      conductor look up together, all of them watching proof pass through paper
      instead of being trapped inside it. For one breath the aisle becomes a
      transfer platform, not a held car. Mara whispers, "Now it belongs to them
      too."
    choices:
      - id: pull_release_after_transfer_proof
        label: Pull the release while the punched transfer shines through
        to: passenger_conductor_transfer_true_ending
      - id: check_punched_transfer_stops
        label: Check the punched transfer against every passenger's stop
        to: passenger_conductor_transfer_stop_check
        requires:
          notFlag: confirmed_transfer_stops
        effects:
          set:
            confirmed_transfer_stops: true

  passenger_conductor_transfer_stop_check:
    routeImportance: optional
    text: >
      The conductor holds the punched transfer beneath the carriage light and
      lets each passenger look through the star-shaped cut. The child sees the
      stairs past Warden Street. The newspaper woman sees the stop her column
      promised. The lunch-tin worker sees the factory bell as something he can
      leave instead of answer. Mara's voice comes through the same little hole,
      softer now: "Then every stop is witnessed." The transfer is still only
      paper, but the aisle treats it like a route no one can erase by keeping
      the doors shut.
    choices:
      - id: pull_release_after_transfer_stop_check
        label: Pull the release after every transfer stop answers
        to: passenger_conductor_transfer_stop_checked_true_ending

  passenger_conductor_roll_call:
    routeImportance: supporting
    text: >
      The conductor walks the aisle one last time, not punching tickets, only
      touching each open pole and calling the doors clear. The answered
      passengers repeat him in their own voices: clear for the child with both
      hands on the frame, clear for the newspaper woman with her transfer
      folded safe, clear for Mara listening from the speaker without having to
      carry the count alone. By the time he reaches the first seat, his signal
      sounds less like permission than release.
    choices:
      - id: pull_release_after_conductor_roll_call
        label: Pull the release after the conductor's final clear call
        to: passenger_conductor_true_ending
        requires:
          notFlag: punched_conductor_transfer
      - id: confirm_conductor_clearance_before_release
        label: Confirm the conductor's clear signal reaches every door
        to: passenger_conductor_clearance_check
        requires:
          all:
            - notFlag: punched_conductor_transfer
            - notFlag: confirmed_conductor_clearance
        effects:
          set:
            confirmed_conductor_clearance: true
      - id: pull_release_after_conductor_transfer
        label: Pull the release after the conductor's punched transfer
        to: passenger_conductor_transfer_true_ending
        requires:
          flag: punched_conductor_transfer
      - id: pass_punched_transfer_from_roll_call
        label: Let the child carry the punched transfer from the clear call to Mara
        to: passenger_conductor_transfer_handoff
        requires:
          all:
            - flag: punched_conductor_transfer
            - notFlag: punched_transfer_carried_forward
        effects:
          set:
            punched_transfer_carried_forward: true

  passenger_conductor_clearance_check:
    routeImportance: optional
    text: >
      You keep the release under your palm while the conductor's clear call
      travels the car one door at a time. The child answers from the threshold
      with both feet on the bright side of the line. The newspaper woman repeats
      the stop she means to reach, not the one that trapped her. The lunch-tin
      worker taps his latch once, then lets the sound pass on instead of
      clocking him back in. Mara listens from the speaker until every open door
      has answered clear in a human voice. "Now it is not just my signal," she
      says. "It is theirs."
    choices:
      - id: pull_release_after_confirmed_conductor_clearance
        label: Pull the release after every door answers clear
        to: passenger_conductor_clearance_checked_true_ending

  passenger_conductor_count_roll_call:
    routeImportance: optional
    text: >
      The conductor walks the aisle with Mara's opened count folded against his
      punch. He does not ask for tickets. He reads what each passenger carried
      back into the morning: newspaper, lunch tin, child's mitten, conductor's
      punch, then a clear call after every answer. Mara stays on the speaker,
      but she is not carrying the manifest alone anymore. By the time the
      conductor reaches the first seat, the count has become a crowd instead of
      a claim.
    choices:
      - id: hand_counted_clear_call_to_mara
        label: Hand the counted clear call back to Mara's reviewed speaker
        to: passenger_counted_manifest_intercom
        requires:
          all:
            - flag: reviewed_open_manifest_count
            - notFlag: heard_mara_goodbye
        effects:
          set:
            heard_mara_goodbye: true
            checked_missing_passenger_count: true
            passengers_finished_reviewed_count: true
            reviewed_count_release_ready: true
      - id: pull_release_after_conductor_count
        label: Pull the release after the counted clear call
        to: passenger_conductor_count_true_ending
        requires:
          notFlag: punched_conductor_transfer
      - id: pull_release_after_conductor_count_transfer
        label: Pull the release after the conductor's counted transfer
        to: passenger_conductor_count_true_ending
        requires:
          flag: punched_conductor_transfer
      - id: pass_counted_punched_transfer_to_mara
        label: Let the child carry the counted punched transfer to Mara
        to: passenger_conductor_transfer_handoff
        requires:
          all:
            - flag: punched_conductor_transfer
            - notFlag: punched_transfer_carried_forward
        effects:
          set:
            punched_transfer_carried_forward: true

  passenger_gathered_intercom:
    routeImportance: optional
    text: >
      The passengers gather themselves before Mara can call again. The child
      with the mitten counts the open doors, the old conductor answers each
      number with "clear," and the lunch-tin worker steadies the newspaper
      woman's elbow when the car sways. The rhythm does not belong to the line
      anymore; it belongs to people making room for one another. Mara lets their
      voices carry through the speaker. "Now," she says. "While they remember
      they can move together."
    choices:
      - id: check_shared_release_from_gathered_intercom
        label: Check how the gathered passengers share the release
        to: passenger_gathered_release
      - id: hear_final_passenger_roll_call
        label: Hear the gathered passengers answer one last roll call
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_gathered_intercom
        label: Move the release hand to hand while the passengers hold the doors
        to: passenger_gathered_release
        requires:
          notFlag: returned_lost_mitten
      - id: pull_release_after_mitten_intercom
        label: Pull the release while the mitten child holds the line
        to: passenger_mitten_true_ending
        requires:
          flag: returned_lost_mitten

  passenger_gathered_release:
    routeImportance: optional
    text: >
      The release handle is close enough for one hand, but the gathered
      passengers refuse to make it one person's burden. The conductor braces
      the seat frame, the lunch-tin worker steadies your wrist, and the
      newspaper woman folds the child's mitten over the cold metal so every
      small handhold has a place. Mara does not give an order. She only keeps
      the speaker open while the crowd learns the shape of leaving together:
      not a rescue line, not a roll call, but a chain of people making sure the
      next person is ready before the doors open.
    choices:
      - id: hear_final_roll_call_after_shared_release
        label: Let the gathered passengers answer one last roll call
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_shared_gathered_check
        label: Pull the release once every hand is ready
        to: passenger_helped_true_ending

  passenger_lunch_tin_intercom:
    routeImportance: optional
    text: >
      The lunch-tin worker reaches the third car last, because he keeps stopping
      to count the people who fall into step behind him. His tin latch clicks
      once for each open door, plain and steady enough that Mara stops reading
      names and lets the sound mark time. Each click comes with a practical
      check: the child has both mittens, the newspaper woman has the transfer,
      the conductor has room to raise his punch, and Mara's badge is visible at
      the release. "He carried lunch for a shift that never ended," she says
      through the speaker. "Let that be the last thing the line counts. Pull
      the release while they are moving together."
    choices:
      - id: check_lunch_tin_passengers_from_intercom
        label: Check the lunch-tin count against the boarded passengers
        to: passenger_lunch_tin_check
        requires:
          notFlag: checked_lunch_tin_passengers
        effects:
          set:
            checked_lunch_tin_passengers: true
      - id: read_lunch_tin_roster
        label: Read the shift roster tucked inside the lunch tin
        to: passenger_lunch_tin_roster
        requires:
          notFlag: read_lunch_tin_roster
        effects:
          set:
            read_lunch_tin_roster: true
      - id: hear_final_lunch_tin_roll_call
        label: Let the lunch-tin worker read the roster as the final roll call
        to: passenger_lunch_tin_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
            read_lunch_tin_roster: true
      - id: pull_release_after_lunch_tin_intercom
        label: Let the lunch-tin worker count himself before the release
        to: passenger_lunch_tin_self_count
        requires:
          all:
            - notFlag: checked_lunch_tin_passengers
            - notFlag: read_lunch_tin_roster
            - notFlag: counted_lunch_tin_worker_self
        effects:
          set:
            counted_lunch_tin_worker_self: true
      - id: pull_release_after_checked_lunch_tin_intercom
        label: Pull the release after the checked lunch-tin count
        to: passenger_lunch_tin_checked_true_ending
        requires:
          all:
            - flag: checked_lunch_tin_passengers
            - notFlag: read_lunch_tin_roster
      - id: pull_release_after_roster_lunch_tin_intercom
        label: Pull the release after the roster clocks everyone out
        to: passenger_lunch_tin_roster_true_ending
        requires:
          flag: read_lunch_tin_roster

  passenger_lunch_tin_check:
    routeImportance: optional
    text: >
      You move down the aisle with the worker's latch-count instead of the
      ledger's ink. The child lifts both mittens when the first click lands,
      the newspaper woman taps her transfer against the seat rail on the
      second, and the old conductor answers the third with a punch held in the
      air until Mara's name is safe inside it. The worker waits for the last
      click to be his own, then checks the aisle twice so nobody is hidden
      behind the word passenger. Nobody is only a number now, and the release
      under the first seat feels less like an escape than the end of a shift.
    choices:
      - id: pull_release_after_echo_checked_lunch_tin_count
        label: Pull the release after the echo count includes the worker
        to: passenger_lunch_tin_checked_true_ending
        requires:
          flag: checked_lunch_tin_echo_count
      - id: carry_checked_lunch_tin_count_to_speaker
        label: Carry the checked lunch-tin count to Mara's speaker
        to: passenger_lunch_tin_intercom
      - id: turn_checked_lunch_tin_count_into_roll_call
        label: Turn the checked count into the final roster call
        to: passenger_lunch_tin_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
            read_lunch_tin_roster: true
      - id: let_lunch_tin_worker_count_himself
        label: Let the lunch-tin worker count himself last
        to: passenger_lunch_tin_self_count
        requires:
          notFlag: counted_lunch_tin_worker_self
        effects:
          set:
            counted_lunch_tin_worker_self: true
      - id: pull_release_after_checked_lunch_tin_count
        label: Start the release after every passenger answers the count
        to: passenger_lunch_tin_checked_true_ending
        requires:
          notFlag: checked_lunch_tin_echo_count

  passenger_lunch_tin_self_count:
    routeImportance: optional
    text: >
      The lunch-tin worker almost reaches for the release before the old habit
      stops him. He checks the aisle once more, then taps the tin against his
      own chest instead of the door frame. "Shift complete," he says, quiet
      enough that it sounds borrowed from a break room instead of a platform.
      The child answers with both mittens, the newspaper woman folds the
      transfer around his name, and the conductor raises his punch without
      taking a ticket. Mara lets the pause stand. For once, the person doing
      the counting has not disappeared inside the count.
    choices:
      - id: pull_release_after_lunch_tin_self_count
        label: Pull the release after the worker counts himself
        to: passenger_lunch_tin_true_ending
        requires:
          notFlag: checked_lunch_tin_passengers
      - id: check_lunch_tin_passengers_after_self_count
        label: Check the aisle once more after the worker counts himself
        to: passenger_lunch_tin_check
        requires:
          notFlag: checked_lunch_tin_passengers
        effects:
          set:
            checked_lunch_tin_passengers: true
      - id: pull_release_after_checked_lunch_tin_self_count
        label: Pull the release after the checked count includes him
        to: passenger_lunch_tin_checked_true_ending
        requires:
          flag: checked_lunch_tin_passengers

  passenger_lunch_tin_roster:
    routeImportance: optional
    text: >
      Folded under the tin's lid is a shift roster softened by steam. The
      worker has written the passenger names in the margin whenever the line
      tried to make him count tickets instead of people. Child with red
      mitten. Newspaper woman. Old conductor. Dispatcher Vale. At the bottom,
      his own name waits beside the words CLOCK OUT AFTER EVERYONE ELSE. Beside
      each passenger he has added one ordinary proof of return: mittens paired,
      transfer unfolded, punch raised clear, badge carried to the handle. The
      roster is not a manifest anymore. It is a time card waiting for morning.
    choices:
      - id: listen_after_reading_lunch_tin_roster
        label: Listen as the roster count reaches the third car
        to: passenger_lunch_tin_intercom
      - id: hear_roster_clock_out_roll_call
        label: Hear the roster clock out each passenger by name
        to: passenger_lunch_tin_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: confirm_lunch_tin_roster_proof_from_roster
        label: Confirm each roster proof before pulling the release
        to: passenger_lunch_tin_roster_proof
        requires:
          notFlag: confirmed_lunch_tin_roster_proof
        effects:
          set:
            heard_final_roll_call: true
            confirmed_lunch_tin_roster_proof: true

  passenger_lunch_tin_roll_call:
    routeImportance: optional
    text: >
      The worker reads the roster like the end of a shift, not a claim. The
      child answers first, the newspaper woman calls her transfer stop, and the
      old conductor gives one clear punch in the air when Mara's name comes
      next. Only then does the worker read his own name and draw one slow line
      through the overtime that held them underground. The tin latch shuts once,
      final and ordinary, and for the first time the line has counted him
      without keeping him. Every open door waits for the release like a time
      clock nobody has to punch again.
    choices:
      - id: confirm_lunch_tin_roster_proof_before_release
        label: Confirm each roster proof before pulling the release
        to: passenger_lunch_tin_roster_proof
        requires:
          notFlag: confirmed_lunch_tin_roster_proof
        effects:
          set:
            confirmed_lunch_tin_roster_proof: true
      - id: pull_release_after_lunch_tin_roll_call
        label: Pull the release on the worker's completed count
        to: passenger_lunch_tin_true_ending

  passenger_lunch_tin_roster_proof:
    routeImportance: optional
    text: >
      You hold the release while the roster makes one last circuit through the
      third car. The child presses both mittens beside his name, the newspaper
      woman folds her transfer over the stop she will step toward, and the old
      conductor punches the margin beside Dispatcher Vale instead of punching
      another ticket. The worker waits until every ordinary proof has touched
      paper, then writes his own clock-out mark under the others. Mara lets the
      speaker carry the sound of his pencil and says, "All time cards closed."
      The tin shuts once, not to count anyone again, but to show the shift is
      finished.
    choices:
      - id: pull_release_after_confirmed_lunch_tin_roster
        label: Pull the release after every roster proof is closed
        to: passenger_lunch_tin_roster_true_ending

  passenger_mitten_intercom:
    routeImportance: optional
    text: >
      The child stands in the third-car doorway with both mittens pressed
      against the frame, one found and one returned. When Mara reaches his name
      in the roll call, he answers before anyone can prompt him, then turns and
      calls for the newspaper woman to step in out of the rain. The small
      mittened knock that follows is not a signal the line taught him. It is
      his own way of saying the door is still open. The conductor repeats it
      with one soft punch, the lunch-tin worker answers with his latch, and the
      emergency release waits under the first seat.
    choices:
      - id: tap_paired_mittens_for_missing_name
        label: Let the child tap both mittens for the name still missing
        to: passenger_mitten_pair_memory
        requires:
          notFlag: heard_mitten_pair_memory
        effects:
          set:
            heard_mitten_pair_memory: true
      - id: hear_final_mitten_roll_call
        label: Hear the child finish the final roll call
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_mitten_child_intercom
        label: Pull the release while the child's door stays open
        to: passenger_mitten_true_ending
      - id: confirm_paired_mittens_from_intercom
        label: Confirm both mittens are through the door before release
        to: passenger_mitten_pair_check
        effects:
          set:
            confirmed_mitten_pair: true

  passenger_mitten_pair_memory:
    routeImportance: optional
    text: >
      The child taps one mitten against the frame, then the other. The knocks
      sound different: one wool-soft and one stiff with station dust. "This one
      was mine," he says, lifting the returned mitten, "but somebody kept it
      warm." Mara checks the manifest without asking him to wait. The next
      name answers from the crowd before she can finish reading it, then
      another answers from the far door because the paired knocks have told
      them where to go. The child grins like the door has learned a second
      language.
    choices:
      - id: hear_roll_call_after_paired_mittens
        label: Hear the roll call answer the child's paired knocks
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_paired_mittens
        label: Pull the release after both mittens answer
        to: passenger_mitten_true_ending
      - id: confirm_paired_mittens_after_memory
        label: Confirm both mittened hands before pulling the release
        to: passenger_mitten_pair_check
        effects:
          set:
            confirmed_mitten_pair: true

  passenger_mitten_pair_check:
    routeImportance: optional
    text: >
      You hold the release while the child turns both mittened palms toward the
      open door. One cuff is damp from the station floor; the other is warm
      from the passenger who carried it back to him. The person who found it
      touches two fingers to the frame beside his small hand, and the child
      knocks once with each mitten so neither answer has to stand alone. Mara
      waits until the paired sound reaches the speaker, then says, "Both hands
      accounted for."
    choices:
      - id: pull_release_after_confirmed_mitten_pair
        label: Pull the release after both mittened hands answer
        to: passenger_mitten_pair_checked_true_ending

  passenger_newspaper_intercom:
    routeImportance: optional
    text: >
      The newspaper woman's transfer column becomes the crowd's timetable.
      She reads Warden Street, then morning transfer, and the old conductor
      answers each stop with a clear signal while the lunch-tin latch keeps
      time beside her. Mara lets the schedule carry through the speaker.
      "Good," she says. "Let the line hear them naming where they are going."
      The passengers do not answer with the station they lost. They answer
      with the streets waiting after it. The names travel down the aisle like
      platform calls, giving the child, the worker, and the conductor a reason
      to move in the same direction. Every named street pulls the third car one
      stop closer to morning.
    choices:
      - id: check_newspaper_departure_board
        label: Check the departure board against the restored transfer
        to: passenger_newspaper_departure_board
        requires:
          notFlag: checked_newspaper_departure_board
        effects:
          set:
            checked_newspaper_departure_board: true
      - id: hear_final_newspaper_roll_call
        label: Hear the transfer column become the final roll call
        to: passenger_newspaper_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_gathered_intercom
        label: Pull the release while the transfer column holds
        to: passenger_newspaper_true_ending

  passenger_newspaper_departure_board:
    routeImportance: optional
    text: >
      Above the third-car doors, the blank destination sign tries to spell HOME
      and then falters. The newspaper woman lifts her restored transfer column
      until the wet page catches the same light, and the board answers with
      smaller words: Warden Street, morning transfer, and every stop the
      passengers have named aloud. No one has to choose between home and where
      they meant to go anymore. The board is not promising one destination. It
      is promising that the line will stop taking destinations away.
    choices:
      - id: read_departure_board_into_newspaper_roll_call
        label: Read the departure board into the final roll call
        to: passenger_newspaper_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_newspaper_departure_board
        label: Pull the release once the board keeps every transfer
        to: passenger_newspaper_true_ending

  passenger_newspaper_roll_call:
    routeImportance: optional
    text: >
      Mara begins the final roll call, but the newspaper woman has already
      turned the blank transfer column into a route everyone can answer. The
      old conductor calls clear after each stop, passengers repeat the names
      of streets they thought the line had erased, and the paper no longer
      sounds like yesterday's news. It sounds like directions. By the time
      the last stop answers, the transfer column has become a shared platform
      they can leave from: Warden Street is only the first line on the route,
      not the place where the route ends.
    choices:
      - id: pull_release_after_newspaper_roll_call
        label: Pull the release after every transfer is named
        to: passenger_newspaper_true_ending
      - id: confirm_newspaper_stops_before_release
        label: Confirm each named stop before pulling the release
        to: passenger_newspaper_stop_check
        effects:
          set:
            confirmed_newspaper_stops: true

  passenger_newspaper_stop_check:
    routeImportance: optional
    text: >
      You hold the release while the newspaper woman reads the column one last
      time. This time no one lets a street answer alone. The child points to
      the stop with the school awning. The lunch-tin worker marks the factory
      siding with his thumb. The old conductor repeats each destination in his
      clear-call voice, not because the line doubts them, but because every
      passenger deserves to hear the route accept them before the doors open.
      When Mara says, "All named stops accounted for," the destination sign
      stops trying to spell HOME over them and gives the smaller streets room
      to shine beside it.
    choices:
      - id: pull_release_after_confirmed_newspaper_stops
        label: Pull the release after every named stop answers
        to: passenger_newspaper_stop_checked_true_ending

  passenger_keepsake_intercom:
    routeImportance: optional
    text: >
      At the third-car speaker, the returned keepsakes make the platform
      answer before Mara has to ask.
      The lunch tin knocks twice against its owner's knee, the newspaper snaps
      open to the correct transfer column, and the umbrellas rise one by one
      like a row of small signal flags. Mara reads the names anyway, but now
      each object gives the person holding it a place to stand. "Good," she
      says through the speaker. "Hold on to what remembered you. Pull the
      release while the line is listening."
    choices:
      - id: hear_final_keepsake_roll_call
        label: Hear the matched passengers finish the roll call
        to: passenger_keepsake_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: confirm_keepsake_owners_from_intercom
        label: Confirm each keepsake owner before pulling the release
        to: passenger_keepsake_owner_check
        requires:
          notFlag: confirmed_keepsake_owners
        effects:
          set:
            confirmed_keepsake_owners: true
      - id: pull_release_after_keepsake_intercom
        label: Pull the release while the keepsakes hold the names steady
        to: passenger_keepsake_true_ending

  passenger_keepsake_roll_call:
    routeImportance: optional
    text: >
      Mara begins the final roll call, but the matched keepsakes answer with
      the passengers. The lunch tin clicks shut after its owner's name, the
      newspaper woman reads the old conductor's stop back to him, and the
      umbrellas lift in order until every initial has a hand beneath it. By the
      last answer, the manifest has become a platform inventory of ordinary
      proof: each person holding the small thing the line could not keep.
    choices:
      - id: pull_release_after_keepsake_roll_call
        label: Pull the release after every keepsake answers
        to: passenger_keepsake_true_ending
      - id: confirm_keepsake_owners_before_release
        label: Confirm each keepsake has found its person
        to: passenger_keepsake_owner_check
        effects:
          set:
            confirmed_keepsake_owners: true

  passenger_keepsake_owner_check:
    routeImportance: optional
    text: >
      You hold the release while the matched objects make their last quiet
      circuit through the aisle. The lunch tin is not just under the right
      seat; its owner knows the dent by the latch. The newspaper is not just
      folded to the right column; the woman can name the stop without reading
      it. One umbrella changes hands after a whispered initial, and the child
      with the mitten points out the passenger who had been too cold to ask.
      Mara waits until every keepsake has been claimed by memory instead of
      ink, then says, "All ordinary proof accounted for."
    choices:
      - id: pull_release_after_confirmed_keepsake_owners
        label: Pull the release after every keepsake finds its owner
        to: passenger_keepsake_owner_checked_true_ending

  passenger_roll_call_epilogue:
    routeImportance: optional
    text: >
      Mara starts with the names whose doors opened first, but the passengers
      finish the roll call for her. The newspaper woman says the conductor's
      name before he can forget it. The child with the mitten answers for
      himself, then for the person who found his other glove under the bench.
      By the final name, the manifest is no longer a list of claims. It is a
      crowd telling the line who belongs to the morning.
    choices:
      - id: pull_release_after_final_roll_call
        label: Hold the release while every answer finds a witness
        to: passenger_roll_call_answer_check
        requires:
          notFlag: returned_lost_mitten
        effects:
          set:
            confirmed_roll_call_answers: true
      - id: pull_release_on_finished_roll_call
        label: Pull as soon as the final roll call finishes
        to: passenger_roll_call_true_ending
        requires:
          notFlag: returned_lost_mitten
      - id: confirm_roll_call_answers_before_release
        label: Confirm each answer belongs to someone present
        to: passenger_roll_call_answer_check
        requires:
          notFlag: returned_lost_mitten
        effects:
          set:
            confirmed_roll_call_answers: true
      - id: pull_release_after_mitten_roll_call
        label: Pull the release after the child's answer
        to: passenger_mitten_true_ending
        requires:
          flag: returned_lost_mitten
      - id: confirm_mitten_pair_before_release
        label: Confirm both mittens are accounted for before release
        to: passenger_mitten_pair_check
        requires:
          flag: returned_lost_mitten
        effects:
          set:
            confirmed_mitten_pair: true

  passenger_roll_call_answer_check:
    routeImportance: optional
    text: >
      You hold the release while the passengers pass the last answers back
      through the aisle. No name is allowed to hang alone in Mara's speaker.
      The newspaper woman repeats the conductor's stop with him, the conductor
      calls clear for the lunch-tin worker, and the child points to the person
      who found his other mitten under the bench. Each answer lands beside a
      living face instead of a ledger mark. Mara waits for the final echo to
      become a voice and says, "Every answer has someone standing with it."
    choices:
      - id: pull_release_after_confirmed_roll_call_answers
        label: Pull the release after every answer is witnessed
        to: passenger_roll_call_checked_true_ending

  gate_warning:
    routeImportance: optional
    text: >
      The gate bends, but the platform answers with a deep knock from beneath
      the track. The train doors begin to close without you. Whatever is below
      heard the metal scream. The empty fuse socket spits a blue spark, and a
      soot-scratched note beside the token slot flashes in your lantern light:
      CLOCK = TOKEN. The control panel clicks once, offering one last chance to
      stop making noise and gather the proper supplies.
    choices:
      - id: back_away_from_gate
        label: Back away for the fuse, badge, map, and clock token
        to: service_room
        effects:
          set:
            backed_away_from_gate: true
      - id: listen_below_gate
        label: Listen to what answered below the platform
        to: gate_echo
        requires:
          notFlag: heard_gate_echo
        effects:
          set:
            heard_gate_echo: true
      - id: force_gate_anyway
        label: Ignore the final warning and force the gate anyway
        to: gate_collapse

  gate_echo:
    routeImportance: optional
    text: >
      Under the bent gate, the dark repeats the sound you made: metal shriek,
      wheel scrape, breath held too long. Then it answers in Mara's borrowed
      voice, reading the first digits of her badge number like a lure. The fuse
      socket sits silent beside your hand, a simpler answer than the thing
      below is offering: fuse for light, badge for proof, map for the route,
      token for the booth.
    choices:
      - id: back_away_after_gate_echo
        label: Back away and gather the four answers
        to: service_room
        effects:
          set:
            backed_away_from_gate: true
      - id: force_gate_after_echo
        label: Ignore what answered and force the gate anyway
        to: gate_collapse

  gate_collapse:
    routeImportance: optional
    text: >
      The gate lifts only far enough to show the gap beneath it. The track
      exhales cold air through your sleeves, and the driverless train answers
      by closing one door at a time. The empty fuse socket spits brighter now,
      not as a clue but as a countdown. Behind you, the service-room door is
      still open. Ahead, the thing below the platform is already practicing
      Mara's badge number in your voice.
    choices:
      - id: brace_gate_and_retreat
        label: Drop the gate and retreat for the four supplies
        to: gate_retreat_recovery
        effects:
          set:
            backed_away_from_gate: true
      - id: crawl_under_collapsing_gate
        label: Crawl under the gate before the doors finish closing
        to: bad_ending

  gate_retreat_recovery:
    routeImportance: optional
    text: >
      The gate slams down hard enough to shake rust from the ceiling. Back in
      the service room, the four missing answers are suddenly less like clues
      and more like tools you can name under pressure: Mara's map on the desk,
      the platform fuse and badge in the locker, and the signal token behind
      the stopped clock.
    choices:
      - id: take_map_after_gate_retreat
        label: Grab Mara's marked map from the desk
        to: service_room
        requires:
          notItem: map
        effects:
          addItem: map
          set:
            knows_platform: true
      - id: open_locker_after_gate_retreat
        label: Open the locker for the fuse and Mara's badge
        to: locker
        requires:
          any:
            - notItem: fuse
            - notItem: badge
      - id: go_to_clock_after_gate_retreat
        label: Go to the stopped clock for the signal token
        to: clock
        requires:
          notItem: token
        effects:
          set:
            knows_token_location: true
      - id: steady_hands_after_gate_retreat
        label: Steady your hands and check the service room
        to: service_room

  sign_warning:
    routeImportance: optional
    text: >
      The destination sign almost has you. HOME burns across the glass, bright
      enough to show a street you know and a porch light that should not still
      be on. Mara's warning crackles from the speaker: "Look away."
    choices:
      - id: listen_for_mara_under_home_warning
        label: Listen for Mara beneath the HOME sign
        to: home_sign_dispatch
        requires:
          notFlag: heard_home_sign_dispatch
        effects:
          set:
            heard_home_sign_dispatch: true
            met_mara: true
            knows_token_location: true
            knows_badge_proof: true
      - id: let_home_overrun_first_dispatch
        label: Keep listening until HOME talks over Mara's warning
        to: lost_after_dispatch_ending
        effects:
          set:
            heard_home_sign_dispatch: true
            met_mara: true
            surrendered_home_after_dispatch: true
            let_home_drown_mara: true
      - id: look_away_from_sign
        label: Look away and trust the map
        to: morning_transfer
        requires:
          item: map
      - id: follow_mara_note_from_sign
        label: Follow Mara's note back to the service room
        to: service_room
        requires:
          all:
            - item: map
            - flag: read_mara_file
        effects:
          set:
            resisted_home_sign_with_mara_note: true
            met_mara: true
            knows_platform: true
            knows_token_location: true
            knows_badge_proof: true
      - id: stare_at_home
        label: Keep staring at HOME
        to: home_sign_echo
        effects:
          set:
            heard_home_sign_echo: true
      - id: step_toward_porch_light
        label: Step closer to the impossible porch light
        to: home_sign_grip
        effects:
          set:
            felt_home_sign_grip: true

  home_sign_echo:
    routeImportance: optional
    text: >
      HOME keeps adding details it should not know: the chipped step outside
      your door, the warm square of kitchen light, a voice from another room
      saying you are late. The marked map trembles in your hand, its morning
      route suddenly plain and practical. Mara's warning thins to one last
      word: "Away."
    choices:
      - id: cover_home_sign_with_map
        label: Cover the sign with the marked map and step into morning
        to: good_ending
        requires:
          item: map
      - id: listen_under_home_sign
        label: Listen for Mara beneath the HOME sign
        to: home_sign_dispatch
        requires:
          notFlag: heard_home_sign_dispatch
        effects:
          set:
            heard_home_sign_dispatch: true
            met_mara: true
            knows_token_location: true
            knows_badge_proof: true
      - id: step_into_home_reflection
        label: Step into the HOME reflection and let the map fall
        to: lost_ending
        effects:
          set:
            surrendered_home_to_reflection: true
      - id: let_home_sign_finish
        label: Let HOME finish spelling itself
        to: home_sign_grip
        effects:
          set:
            felt_home_sign_grip: true

  home_sign_dispatch:
    routeImportance: optional
    text: >
      You listen past the porch light and hear the station speaker stuttering
      under it. "That is not home," Mara says, each word dragging through static
      and brake dust. "Map for morning if you leave. Clock token, fuse, badge,
      ledger if you come back for us." The HOME sign brightens, but now it has
      to compete with a real voice.
    choices:
      - id: turn_back_after_home_sign_dispatch
        label: Turn back for the clock token, fuse, badge, and ledger
        to: service_room
        effects:
          set:
            escaped_home_sign_dispatch: true
      - id: cover_home_sign_after_dispatch
        label: Cover the sign with the map and take the morning transfer
        to: good_ending
        requires:
          item: map
      - id: step_into_false_home_after_dispatch
        label: Step toward the porch light instead of Mara's voice
        to: lost_after_dispatch_ending
        effects:
          set:
            surrendered_home_after_dispatch: true
      - id: let_home_sign_drown_mara
        label: Let HOME drown Mara out
        to: lost_after_dispatch_ending
        effects:
          set:
            surrendered_home_after_dispatch: true
            let_home_drown_mara: true

  home_sign_grip:
    routeImportance: optional
    text: >
      The sign finishes the word, but the map will not fall. Its pencil line to
      MORNING PLATFORM cuts across the false porch light like a transfer stamp,
      and for one breath you can feel both places pulling at your name. The
      train doors begin to close around the choice. The service-room route is
      still printed on the map's damp reverse, smeared but readable: badge,
      fuse, clock token, ledger.
    choices:
      - id: jam_map_in_home_sign_doors
        label: Jam the map in the doors and tumble back to the service room
        to: service_room
        requires:
          item: map
        effects:
          set:
            escaped_home_sign_grip: true
            knows_token_location: true
            knows_badge_proof: true
      - id: wrench_map_free_from_home_sign
        label: Follow the map's morning line before the doors close
        to: good_ending
        requires:
          item: map
      - id: surrender_to_home_sign
        label: Let HOME take your name
        to: lost_ending

  true_ending:
    ending: true
    routeImportance: main
    endingType: ideal
    endingGroup: Mara
    endingFamily: Core
    text: >
      The release opens every door at once. Names vanish from the signal ledger
      as passengers step into rain-bright morning, each one carrying a little
      of the tunnel's cold out into the rain. The token drops quiet in the
      booth because the signal has no more names to hold. The map stops
      trembling because HOME is only paint on a blank sign now, not a route.
      Mara's badge warms against the release handle like proof that can finally
      rest. Her voice thanks you from the speaker, close enough to sound alive,
      then lets the line fall silent behind everyone it used to keep.
    choices: []

  mara_badge_proof_receipt_true_ending:
    routeImportance: optional
    ending: true
    endingType: ideal
    endingGroup: Mara
    endingFamily: Core
    text: >
      The release opens every door at once after Mara's badge proof has already
      come back received. The old number does not vanish from the signal ledger
      as a denied credential; it moves door by door as clearance, then as a
      name, then as a warm mark against the handle in your hand. Passengers
      step into rain-bright morning while each car answers the same finished
      proof in its own voice. Mara thanks the line for hearing her correctly at
