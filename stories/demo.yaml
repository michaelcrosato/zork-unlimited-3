        effects:
          set:
            heard_mara_goodbye: true
      - id: return_to_release_after_handoff_check
        label: Return to the emergency release with Mara at the far door
        to: train_car

  passengers_released:
    routeImportance: optional
    text: >
      When Mara's badge number touches the ledger, every tiny stamped door in
      the manifest clicks open at once. Mara's torn thumbprint darkens on the
      opened page like a promise she is still holding. The booth fills with
      ordinary sounds: a child's laugh beside a damp mitten print, a lunch tin
      latch, umbrellas shaking rain from their ribs, a newspaper transfer
      unfolding beside the old conductor's punch, passengers answering Mara's
      count before it can make anyone last, shoulders shifting to make room, a
      crowd pausing until someone holds the third-car threshold. The same tiny
      door-echoes you could have heard before opening the manifest keep their
      rhythm now that the names are people. Mara breathes through the speaker
      and says, "Third car. I can hold the line steady while they find the
      morning." When she has already called the opened doors once, the third
      car speaker keeps a small waiting hiss for her handoff, and the release
      handle feels less like an interruption than the next beat. Once the
      opened passengers remember morning aloud, the same speaker can carry
      those ordinary streets aboard.
