id: demo
title: Lantern in the Underpass
start: entrance
objectives:
  - text: Find a reliable way to see in the underpass.
    requires:
      all:
        - notItem: lantern
        - notFlag: lights_on
  - text: Recover the marked Platform 13 map before boarding.
    requires:
      all:
        - flag: promised_mara
        - notItem: map
  - text: Find out where the chalk arrows and old line are leading.
    requires:
      notFlag: knows_platform
  - text: Learn how to survive the driverless train before boarding it.
    requires:
      all:
        - flag: knows_platform
        - notFlag: knows_release
        - notFlag: freed_mara
        - notFlag: inspected_signal_ledger
        - notFlag: read_passenger_manifest
        - notFlag: heard_passenger_echoes
        - notFlag: knows_badge_proof
        - any:
            - notItem: map
            - notItem: token
            - notItem: fuse
            - notItem: badge
  - text: Recover the marked Platform 13 map before boarding.
    requires:
      all:
        - flag: knows_platform
        - notFlag: promised_mara
        - notItem: map
  - text: Search the stopped tunnel clock for the signal booth token.
    requires:
      all:
        - any:
            - flag: knows_shutdown
            - flag: met_mara
            - flag: knows_release
            - flag: read_mara_file
            - flag: knows_token_location
        - notItem: token
  - text: Find a way to power the platform gate control.
    requires:
      all:
        - flag: knows_platform
        - notItem: fuse
  - text: Find proof of Mara Vale's identity before clearing her name.
    requires:
      all:
        - any:
            - item: fuse
            - flag: met_mara
            - flag: read_mara_file
            - flag: knows_badge_proof
        - notItem: badge
  - text: Restore power at Platform 13 and try the token slot.
    requires:
      all:
        - item: token
        - item: fuse
        - notFlag: platform_lit
  - text: Check the kept-passenger manifest before deciding whose names to clear.
    requires:
      all:
        - flag: platform_lit
        - item: token
        - notFlag: freed_mara
        - flag: inspected_signal_ledger
        - item: map
        - item: badge
        - notFlag: read_passenger_manifest
  - text: Clear Mara's ledger entry with her badge proof.
    requires:
      all:
        - flag: platform_lit
        - item: token
        - notFlag: freed_mara
        - flag: inspected_signal_ledger
        - item: map
        - item: badge
        - flag: read_passenger_manifest
  - text: Use the signal booth to resolve Mara's ledger entry.
    requires:
      all:
        - flag: platform_lit
        - item: token
        - notFlag: freed_mara
        - any:
            - notFlag: inspected_signal_ledger
            - notItem: map
            - notItem: badge
  - text: Pull the emergency release in the third car.
    requires:
      flag: freed_mara
  - text: Use the marked map if you need a safe way out.
    requires:
      all:
        - notFlag: freed_mara
        - item: map
        - any:
            - notItem: token
            - notItem: fuse
            - notItem: badge
scenes:
  entrance:
    routeImportance: main
    text: >
      Rain ticks against Warden Street. At the mouth of the underpass, a brass
      lantern hangs from a bent nail beside a transit notice stamped SERVICE
      SUSPENDED SINCE 1983.
    choices:
      - id: read_notice
        label: Read the old transit notice
        to: notice
        effects:
          set:
            knows_shutdown: true
      - id: take_lantern
        label: Take the brass lantern
        to: tunnel
        effects:
          addItem: lantern
          set:
            has_light: true
      - id: enter_dark
        label: Enter the underpass without touching it
        to: dark_tunnel

  notice:
    routeImportance: main
    text: >
      The notice warns that Platform 13 was sealed after a signal fire. Someone
      has scratched a newer message into the glass: IF THE TRAIN ARRIVES EMPTY,
      DO NOT BOARD WITHOUT THE MAP. A second, smaller line reads: CLEAR THE
      DISPATCHER'S NAME BEFORE YOU PULL THE RELEASE.
    choices:
      - id: inspect_notice_back
        label: Check the back of the notice
        to: notice_back
        effects:
          set:
            knows_badge_proof: true
      - id: take_lantern_after_notice
        label: Take the brass lantern
        to: tunnel
        effects:
          addItem: lantern
          set:
            has_light: true
      - id: ignore_warning
        label: Ignore the warning and step into the dark
        to: dark_tunnel

  notice_back:
    routeImportance: optional
    text: >
      The notice backing is covered in transfer stamps that never reached the
      city archive. One blank line is labeled DISPATCHER CLEARANCE: BADGE
      PROOF REQUIRED. Beside it, someone wrote M. VALE and pressed so hard the
      paper nearly split.
    choices:
      - id: take_lantern_after_notice_back
        label: Take the brass lantern
        to: tunnel
        effects:
          addItem: lantern
          set:
            has_light: true
      - id: ignore_back_warning
        label: Ignore the warning and step into the dark
        to: dark_tunnel

  tunnel:
    routeImportance: main
    text: >
      Lantern light reveals chalk arrows on the concrete wall. One points
      toward a service door. Another points deeper into the tunnel, where a
      station clock hangs, frozen at 1:13.
    choices:
      - id: open_service_door
        label: Open the service door
        to: service_room
      - id: follow_arrows
        label: Follow the arrows deeper
        to: platform
        requires:
          all:
            - notFlag: platform_lit
            - any:
                - notFlag: promised_mara
                - item: map
            - any:
                - notFlag: returned_from_safe_escape
                - item: fuse
        effects:
          set:
            knows_platform: true
      - id: follow_arrows_to_lit_platform
        label: Follow the arrows back to the lit platform
        to: lit_platform
        requires:
          all:
            - flag: platform_lit
            - any:
                - item: token
                - notFlag: knows_token_location
        effects:
          set:
            knows_platform: true
      - id: inspect_clock
        label: Inspect the stopped station clock
        to: clock
        requires:
          notItem: token

  clock:
    routeImportance: main
    text: >
      The clock hands are wired in place at 1:13. A maintenance token has been
      wedged behind the minute hand, warm as a coin left in sunlight. Its edge
      is stamped SIGNAL BOOTH ACCESS.
    choices:
      - id: take_token_return_to_lit_platform
        label: Take the signal token and return to the lit platform
        to: lit_platform
        requires:
          all:
            - notItem: token
            - flag: heard_escape_call
            - flag: platform_lit
        effects:
          addItem: token
          set:
            found_token: true
      - id: take_token_return_to_dark_platform
        label: Take the signal token and return to Platform 13
        to: platform
        requires:
          all:
            - notItem: token
            - flag: heard_escape_call
            - notFlag: platform_lit
            - flag: knows_platform
        effects:
          addItem: token
          set:
            found_token: true
            knows_platform: true
      - id: take_token
        label: Take the maintenance token
        to: tunnel
        requires:
          all:
            - notItem: token
            - notFlag: heard_escape_call
        effects:
          addItem: token
          set:
            found_token: true
      - id: leave_clock
        label: Leave the clock alone
        to: clock_token_warning
        requires:
          notFlag: knows_token_location
        effects:
          set:
            knows_token_location: true

  clock_token_warning:
    routeImportance: supporting
    text: >
      As you turn away, the token taps once against the wired minute hand. The
      sound carries down the tunnel and answers from a sealed booth on Platform
      13. SIGNAL BOOTH ACCESS is not a souvenir stamp; it is the only thing in
      reach that sounds like a key.
    choices:
      - id: take_token_after_clock_warning
        label: Take the maintenance token after all
        to: tunnel
        effects:
          addItem: token
          set:
            found_token: true
      - id: leave_warned_clock
        label: Leave the token in the clock for now
        to: tunnel

  dark_tunnel:
    routeImportance: optional
    text: >
      The tunnel swallows the last streetlight. Your hand finds cold concrete,
      then a chain hanging from the ceiling. Far ahead, a woman speaks through
      a dead public-address speaker, and deeper still a blank train sign
      flickers once with the first letter of HOME.
    choices:
      - id: follow_false_home_light
        label: Follow the HOME flicker deeper into the dark
        to: dark_home_warning
        effects:
          set:
            saw_dark_home_flicker: true
      - id: pull_chain
        label: Pull the chain
        to: service_room
        effects:
          set:
            lights_on: true
      - id: answer_voice
        label: Answer the voice in the speaker
        to: dispatcher
      - id: retreat
        label: Retreat to the entrance
        to: entrance

  dark_home_warning:
    routeImportance: optional
    text: >
      Without the lantern, HOME looks less like a word than a porch light
      remembering you. The woman in the speaker is still trying to speak over
      it, but the chain brushes your shoulder, close enough to pull the service
      lights on before the train learns the shape of your name.
    choices:
      - id: pull_chain_before_home_takes_you
        label: Pull the chain before HOME finishes spelling itself
        to: service_room
        effects:
          set:
            lights_on: true
            escaped_dark_home_flicker: true
      - id: answer_mara_under_home_flicker
        label: Answer the woman beneath the HOME flicker
        to: dispatcher
        effects:
          set:
            escaped_dark_home_flicker: true
      - id: keep_following_false_home
        label: Keep following the HOME light
        to: lost_ending
        effects:
          set:
            surrendered_dark_home_flicker: true

  dispatcher:
    routeImportance: supporting
    text: >
      "This is Mara Vale, night dispatcher," the speaker says. "If you can hear
      me, the line has chosen you. Find the map. Do not trust the blank sign."
    choices:
      - id: ask_mara_about_false_home
        label: Tell Mara the HOME sign tried to answer first
        to: mara_false_home_warning
        requires:
          all:
            - flag: escaped_dark_home_flicker
            - notFlag: heard_false_home_warning
        effects:
          set:
            met_mara: true
            heard_false_home_warning: true
      - id: ask_mara_about_train
        label: Ask Mara what happened to the train
        to: mara_warning
        effects:
          set:
            met_mara: true
      - id: promise_to_help
        label: Promise Mara you will find the map
        to: service_room
        effects:
          set:
            met_mara: true
            promised_mara: true
            lights_on: true

  mara_false_home_warning:
    routeImportance: optional
    text: >
      Mara's voice sharpens when you describe the HOME flicker. "That is the
      line using a word it never earned," she says. "Real morning is on the
      marked map, not on the train sign. Pull the service lights on, take the
      map, and do not let that word choose your name before you reach the
      ledger."
    choices:
      - id: follow_mara_from_false_home_warning
        label: Pull the service lights on and find the marked map
        to: service_room
        effects:
          set:
            lights_on: true
            promised_mara: true
            knows_token_location: true

  mara_warning:
    routeImportance: optional
    text: >
      Mara says the last train kept returning without its driver. The city
      sealed the platform, then forgot the people still listed as "in transit."
      Static chews through her final word: "Remember... the token in the tunnel clock..."
    choices:
      - id: continue_to_service_room
        label: Follow Mara's directions to the service room
        to: service_room
        effects:
          set:
            lights_on: true
            knows_token_location: true

  service_room:
    routeImportance: main
    text: >
      A breaker panel hums beside a desk covered with old transit maps. A
      cracked radio repeats a number station. Someone circled Platform 13 in
      red pencil.
    choices:
      - id: take_map
        label: Take the marked Platform 13 map Mara asked for
        to: service_room
        requires:
          notItem: map
        effects:
          addItem: map
          set:
            knows_platform: true
      - id: tune_radio
        label: Tune the cracked radio
        to: radio
        requires:
          all:
            - notFlag: knows_release
            - any:
                - notItem: map
                - notItem: token
                - notItem: fuse
                - notItem: badge
      - id: search_locker
        label: Search the maintenance locker
        to: locker
        requires:
          any:
            - notItem: fuse
            - notItem: badge
      - id: read_personnel_file
        label: Read the personnel file on the desk
        to: personnel_file
        requires:
          all:
            - notFlag: read_mara_file
            - any:
                - notItem: map
                - notItem: token
                - notItem: fuse
                - notItem: badge
        effects:
          set:
            read_mara_file: true
            met_mara: true
            knows_token_location: true
      - id: try_gate_ritual_without_map
        label: Try the gate ritual with the fuse and token before taking the map
        to: signal_map_warning
        requires:
          all:
            - item: fuse
            - item: token
            - notItem: map
            - notFlag: platform_lit
            - notFlag: read_mara_file
        effects:
          set:
            knows_platform: true
            platform_lit: true
      - id: go_to_stopped_clock
        label: Go straight to the stopped clock for the signal token
        to: clock
        requires:
          all:
            - flag: knows_token_location
            - notItem: token
      - id: return_to_tunnel
        label: Return to the tunnel
        to: tunnel
        requires:
          all:
            - notItem: token
            - notFlag: knows_token_location
      - id: go_to_platform
        label: Go to Platform 13
        to: platform
        requires:
          all:
            - any:
                - flag: has_light
                - flag: lights_on
            - any:
                - all:
                    - notFlag: left_unprepared_platform
                    - notFlag: promised_mara
                    - notFlag: read_mara_file
                    - notFlag: knows_release
                - item: map
            - any:
                - notFlag: returned_from_safe_escape
                - item: fuse
            - notFlag: platform_lit
        effects:
          set:
            knows_platform: true
      - id: return_to_lit_platform
        label: Return to the lit Platform 13
        to: lit_platform
        requires:
          all:
            - flag: platform_lit
            - any:
                - item: token
                - notFlag: knows_token_location
        effects:
          set:
            knows_platform: true

  radio:
    routeImportance: main
    text: >
      Beneath the numbers, Mara whispers a route: "Third car. Emergency release
      under the first seat. If the sign says HOME, look away."
    choices:
      - id: note_radio_route
        label: Write down Mara's route
        to: service_room
        effects:
          set:
            knows_release: true
      - id: shut_radio_off
        label: Shut the radio off
        to: service_room

  personnel_file:
    routeImportance: main
    text: >
      The file belongs to Mara Vale, night dispatcher, missing since the signal
      fire. Her last note says: "Badge clears the ledger. Token opens the booth.
      Check the stopped clock in the tunnel—the signal access key is hidden behind
      the hands. Do not let them call my route complete while my name is still in
      transit."
    choices:
      - id: keep_mara_file
        label: Keep Mara's note with the map
        to: service_room

  locker:
    routeImportance: main
    text: >
      The locker contains a wet uniform coat, a fuse stamped PLATFORM LIGHTS,
      and an employee badge for Mara Vale. The badge number matches a blank
      line printed on the back of the old transit notice.
    choices:
      - id: take_fuse
        label: Take the platform fuse
        to: locker
        requires:
          notItem: fuse
        effects:
          addItem: fuse
      - id: take_badge
        label: Take Mara's badge
        to: locker
        requires:
          notItem: badge
        effects:
          addItem: badge
          set:
            has_mara_badge: true
      - id: inspect_badge_back
        label: Read the back of Mara's badge
        to: badge_memory
        requires:
          all:
            - item: badge
            - notFlag: inspected_badge_back
        effects:
          set:
            inspected_badge_back: true
            knows_badge_proof: true
            knows_release: true
      - id: close_locker
        label: Close the locker
        to: service_room
        requires:
          all:
            - item: fuse
            - item: badge

  badge_memory:
    routeImportance: optional
    text: >
      The badge is heavier than it should be. On the back, under Mara Vale's
      number, someone scratched a route in tiny block letters: LAST TRAIN,
      THIRD CAR, FIRST SEAT RELEASE. A second hand added one more line later:
      BADGE PROOF OPENS THE LEDGER. DO NOT CLEAR ME BEFORE THE OTHERS. The
      metal is worn smooth where a thumb worried the edge for years.
    choices:
      - id: return_from_badge_memory
        label: Put the badge with the other supplies
        to: locker

  platform:
    routeImportance: main
    text: >
      Platform 13 waits behind a rusted gate. A driverless train rests on the
      track, doors open, destination sign blank. The gate control has an empty
      fuse socket and a token slot stamped SIGNAL ACCESS.
    choices:
      - id: inspect_gate_control
        label: Inspect the gate control
        to: gate_control
        requires:
          notFlag: inspected_gate_control
        effects:
          set:
            inspected_gate_control: true
            gate_control_inspected: true
            knows_token_location: true
      - id: install_fuse
        label: Install the platform fuse
        to: lit_platform
        requires:
          item: fuse
        effects:
          set:
            platform_lit: true
      - id: board_train
        label: Board the train with the map
        to: train_car
        requires:
          all:
            - item: map
            - notItem: fuse
      - id: retreat_to_stairs_from_platform
        label: Retreat to the stairwell before the train chooses you
        to: platform_escape_warning
        requires:
          all:
            - notItem: fuse
            - notItem: token
      - id: return_to_service_room
        label: Return to the service room and prepare
        to: service_room
        requires:
          any:
            - notItem: map
            - notItem: token
            - notItem: fuse
            - notItem: badge
        effects:
          set:
            left_unprepared_platform: true
      - id: force_gate
        label: Force the gate despite the empty fuse socket
        to: gate_warning
        requires:
          all:
            - notItem: fuse
            - notFlag: backed_away_from_gate
        effects:
          set:
            knows_token_location: true

  platform_escape_warning:
    routeImportance: optional
    text: >
      The stairwell back to Warden Street is still open, but the dark platform
      does not let the train feel harmless. Its blank sign waits without a
      destination, the gate control keeps tapping its empty token slot, and the
      service-room door is close enough that leaving now would mean choosing
      the street over unfinished work.
    choices:
      - id: listen_at_unlit_stairwell
        label: Listen before you leave Mara behind
        to: mara_stairwell_call
        requires:
          notFlag: heard_escape_call
        effects:
          set:
            heard_escape_call: true
            met_mara: true
            knows_token_location: true
      - id: return_to_platform_from_escape_warning
        label: Return to the dark platform and keep searching
        to: platform
      - id: confirm_unlit_flee_platform
        label: Leave the unfinished platform and run back to the street
        to: escape_ending

  gate_control:
    routeImportance: supporting
    text: >
      The gate control is less a lock than a ritual. A burned diagram inside
      the access plate shows three steps: restore PLATFORM LIGHTS, insert the
      SIGNAL BOOTH token, then clear the ledger before boarding. Someone has
      scratched CLOCK = TOKEN into the soot.
    choices:
      - id: read_gate_control_plaque
        label: Read the burned service plaque inside the access plate
        to: gate_control_plaque
        requires:
          notFlag: read_gate_control_plaque
        effects:
          set:
            read_gate_control_plaque: true
            knows_badge_proof: true
      - id: install_fuse_and_insert_token
        label: Install the fuse, then insert the signal token
        to: signal_booth
        requires:
          all:
            - item: fuse
            - item: token
            - item: map
        effects:
          set:
            platform_lit: true
      - id: install_fuse_and_try_token_without_map
        label: Install the fuse, then try the signal token before recovering the map
        to: signal_map_warning
        requires:
          all:
            - item: fuse
            - item: token
            - notItem: map
        effects:
          set:
            platform_lit: true
            knows_platform: true
      - id: install_fuse_from_gate_control
        label: Install the platform fuse while the access plate is open
        to: lit_platform
        requires:
          all:
            - item: fuse
            - notItem: token
        effects:
          set:
            platform_lit: true
      - id: return_to_service_room_for_parts
        label: Return to the service room for parts
        to: service_room

  gate_control_plaque:
    routeImportance: optional
    text: >
      The plaque is almost burned blank, but the remaining service rule is
      stubborn: SIGNAL ACCESS ACCEPTS TOKEN ONLY AFTER PLATFORM LIGHTS. LEDGER
      CLEARANCE REQUIRES BADGE PROOF AND ROUTE MAP ON THE DESK. Below it, a
      dispatcher has penciled one private correction: if the train says HOME,
      do not answer with your name.
    choices:
      - id: return_from_gate_control_plaque
        label: Return to the open gate control
        to: gate_control

  lit_platform:
    routeImportance: supporting
    text: >
      The platform lights buzz awake. Every advertisement shows the same face:
      Mara Vale, smiling from a missing-person poster dated forty-three years
      ago. The train sign flickers between HOME and WARDEN STREET, but the
      gate control keeps tapping its token slot like a telegraph key.
    choices:
      - id: use_token_slot
        label: Open the signal booth with the map ready
        to: signal_booth
        requires:
          all:
            - item: token
            - item: map
      - id: try_token_without_map
        label: Try the signal token before recovering the map
        to: signal_map_warning
        requires:
          all:
            - item: token
            - notItem: map
        effects:
          set:
            knows_platform: true
      - id: inspect_mara_posters
        label: Inspect Mara's missing-person posters
        to: mara_posters
        requires:
          all:
            - notFlag: inspected_mara_posters
            - notFlag: inspected_badge_back
            - any:
                - notItem: map
                - notItem: token
                - notItem: badge
        effects:
          set:
            inspected_mara_posters: true
            met_mara: true
      - id: board_before_clearing_ledger
        label: Board before checking the signal booth
        to: ledger_warning
        requires:
          all:
            - item: map
            - notFlag: freed_mara
            - notItem: token
      - id: return_from_lit_platform
        label: Return to the service room before boarding
        to: service_room
        requires:
          any:
            - notItem: map
            - notItem: token
            - notItem: badge
      - id: flee_platform
        label: Run for the stairs before the train chooses you
        to: escape_warning
        requires:
          notItem: token

  mara_posters:
    routeImportance: optional
    text: >
      Up close, every poster has been altered by the same careful hand. The
      printed word MISSING is crossed out and replaced with IN TRANSIT. Mara's
      badge number is penciled under each photograph, followed by a note:
      "The ledger will not release a dispatcher without her proof of service."
    choices:
      - id: return_to_lit_platform_after_posters
        label: Return to the gate control
        to: lit_platform

  signal_map_warning:
    routeImportance: optional
    text: >
      The token turns, but the signal booth unlocks only halfway. Behind the
      glass, the ledger bell rings in time with the blank destination sign.
      The old notice comes back to you: no one boards the empty train safely
      without the marked map.
    choices:
      - id: return_for_map_from_signal_warning
        label: Recover the marked map and return to the half-open booth
        to: signal_map_recovered
        effects:
          addItem: map
          set:
            knows_platform: true
      - id: continue_to_signal_booth_unprepared
        label: Continue into the booth without the map
        to: signal_booth

  signal_map_recovered:
    routeImportance: optional
    text: >
      The marked map feels heavier when you bring it back to the half-open
      booth. Its pencil route ends at Platform 13, then hooks upward to the
      signal window as if the mapmaker knew the ledger would ask for proof
      before the train could ask for passengers.
    choices:
      - id: enter_signal_booth_after_map
        label: Open the booth fully and read the ledger
        to: signal_booth

  escape_warning:
    routeImportance: optional
    text: >
      The stairwell back to Warden Street is still open, but the lit platform
      makes the empty train look less like a ghost story and more like unfinished
      work. Mara's posters flutter in the tunnel wind, and the token slot keeps
      tapping for a signal key you have not found.
    choices:
      - id: listen_at_stairwell
        label: Listen before you leave Mara behind
        to: mara_stairwell_call
        requires:
          notFlag: heard_escape_call
        effects:
          set:
            heard_escape_call: true
            met_mara: true
            knows_token_location: true
      - id: look_back_from_escape_warning
        label: Look back at Platform 13 before you run
        to: escape_platform_glance
        requires:
          notFlag: looked_back_from_escape_warning
        effects:
          set:
            looked_back_from_escape_warning: true
            knows_badge_proof: true
      - id: return_to_lit_platform_from_escape_warning
        label: Return to the gate control and keep searching
        to: lit_platform
      - id: confirm_flee_platform
        label: Leave Mara calling and run back to the street
        to: escape_ending

  escape_platform_glance:
    routeImportance: optional
    text: >
      From the stairwell, Platform 13 looks almost ordinary: bright tiles,
      open train doors, posters shivering in the tunnel wind. Then every poster
      turns enough to show Mara Vale's penciled badge number, and the token slot
      taps once against the silence. Leaving is still possible. So is turning
      back with a clearer idea of what the line is asking you to prove.
    choices:
      - id: listen_after_escape_glance
        label: Listen for Mara before deciding
        to: mara_stairwell_call
        requires:
          notFlag: heard_escape_call
        effects:
          set:
            heard_escape_call: true
            met_mara: true
            knows_token_location: true
      - id: return_after_escape_glance
        label: Return to the lit platform with the badge proof in mind
        to: lit_platform
      - id: leave_after_escape_glance
        label: Leave after one last look at Platform 13
        to: escape_ending

  mara_stairwell_call:
    routeImportance: optional
    text: >
      Halfway up the stairs, the public-address speaker finds one clear breath.
      "If you walk out now, I will understand," Mara says. "But the signal key
      is still behind the stopped clock, and the line will keep asking someone
      else to finish what I could not."
    choices:
      - id: return_from_stairwell_call
        label: Return to the stopped clock for the signal key
        to: clock
      - id: leave_after_stairwell_call
        label: Leave Mara calling and run back to the street
        to: warned_escape_ending

  ledger_warning:
    routeImportance: optional
    text: >
      One foot crosses the train threshold, and the public-address speaker
      coughs up Mara's badge number. The blank destination sign waits, but the
      signal booth above the track is still lit, its ledger bell ringing for an
      uncleared name.
    choices:
      - id: check_signal_booth
        label: Check the signal booth before boarding
        to: signal_booth
        requires:
          item: token
      - id: return_for_signal_token
        label: Return to the stopped clock for the signal token
        to: clock
        requires:
          notItem: token
        effects:
          set:
            knows_token_location: true
      - id: board_without_clearing_mara
        label: Board with only the map to guide you
        to: train_car
        requires:
          item: map

  signal_booth:
    routeImportance: main
    text: >
      The token unlocks a signal booth above the track. Inside, a ledger lists
      every passenger the line has kept. Mara's name is the last one not crossed
      out, and her badge number is printed in the margin beside it.
    choices:
      - id: inspect_signal_ledger
        label: Read Mara's uncrossed ledger entry
        to: signal_ledger
        requires:
          notFlag: inspected_signal_ledger
        effects:
          set:
            inspected_signal_ledger: true
      - id: read_passenger_manifest
        label: Read the kept-passenger manifest
        to: passenger_manifest
        requires:
          notFlag: read_passenger_manifest
        effects:
          set:
            read_passenger_manifest: true
      - id: listen_to_manifest_doors
        label: Listen to the marked passenger doors
        to: passenger_echoes
        requires:
          all:
            - flag: read_passenger_manifest
            - notFlag: heard_passenger_echoes
        effects:
          set:
            heard_passenger_echoes: true
      - id: reopen_signal_ledger
        label: Reopen Mara's ledger row
        to: signal_ledger
        requires:
          flag: inspected_signal_ledger

  passenger_manifest:
    routeImportance: supporting
    text: >
      The earlier pages are not a passenger list so much as a weather report:
      umbrellas left dripping by the stairs, lunch tins still warm, a child's
      mitten pinned beside a transfer. Each name has a tiny door stamped beside
      it, every one still shut. Mara's dispatcher row is set apart at the end,
      its door barred by the same badge proof that can open the rest.
    choices:
      - id: listen_to_manifest_doors_from_manifest
        label: Listen to the marked passenger doors
        to: passenger_echoes
        requires:
          notFlag: heard_passenger_echoes
        effects:
          set:
            heard_passenger_echoes: true
      - id: return_to_signal_ledger_from_manifest
        label: Turn from the manifest to Mara's ledger row
        to: signal_ledger
        effects:
          set:
            inspected_signal_ledger: true

  passenger_echoes:
    routeImportance: optional
    text: >
      Behind the stamped doors, the kept passengers are not wailing. They are
      waiting in the small noises people make when they expect a train to be
      late: a thermos cup unscrewed, newspaper pages folded twice, a child
      asking whether the next stop has rain. When Mara's page rustles, every
      door falls silent for her answer.
    choices:
      - id: return_from_passenger_echoes
        label: Return to Mara's ledger row
        to: signal_ledger
        effects:
          set:
            inspected_signal_ledger: true

  signal_ledger:
    routeImportance: main
    text: >
      Mara's row is written in a steadier hand than the others: DISPATCHER
      REMAINING ON DUTY UNTIL ALL PASSENGERS CLEAR. Beside the badge number,
      someone has pressed a thumbprint into the ink so hard it tore the page.
      The earlier manifest pages rustle under your hand, still full of doors
      with passenger names stamped shut. The booth speaker clicks once, waiting
      for proof that she is more than another name the line can keep.
    choices:
      - id: inspect_mara_thumbprint
        label: Touch the torn thumbprint beside Mara's name
        to: mara_thumbprint
        requires:
          all:
            - item: badge
            - notFlag: read_mara_thumbprint
            - notFlag: read_passenger_manifest
        effects:
          set:
            read_mara_thumbprint: true
      - id: read_manifest_from_ledger
        label: Check the kept-passenger manifest before clearing only Mara
        to: passenger_manifest
        requires:
          all:
            - item: badge
            - notFlag: read_mara_thumbprint
            - notFlag: read_passenger_manifest
        effects:
          set:
            read_passenger_manifest: true
      - id: read_manifest_after_thumbprint
        label: Follow Mara's thumbprint back through the kept-passenger manifest
        to: passenger_manifest
        requires:
          all:
            - item: badge
            - flag: read_mara_thumbprint
            - notFlag: read_passenger_manifest
        effects:
          set:
            read_passenger_manifest: true
      - id: mark_mara_clear_from_ledger
        label: Enter Mara's badge number and clear only her name
        to: mara_released
        requires:
          all:
            - item: badge
            - item: map
            - notFlag: read_passenger_manifest
        effects:
          set:
            freed_mara: true
      - id: clear_manifest_and_mara_from_ledger
        label: Enter Mara's badge number and open every manifest door
        to: passengers_released
        requires:
          all:
            - item: badge
            - item: map
            - flag: read_passenger_manifest
        effects:
          set:
            freed_mara: true
      - id: return_for_marked_map
        label: Recover the marked map and return to Mara's ledger row
        to: signal_ledger
        requires:
          notItem: map
        effects:
          addItem: map
          set:
            knows_platform: true
      - id: return_for_mara_badge
        label: Return to the service room for Mara's badge
        to: service_room
        requires:
          notItem: badge

  mara_thumbprint:
    routeImportance: optional
    text: >
      The torn paper warms under your thumb. For a moment, the booth is full of
      raincoats and tired voices. Mara stands at the dispatch panel, pressing
      her print beside the final open line while the last train waits below.
      "No one clears until everyone clears," she says, not to the line, but to
      herself.
    choices:
      - id: return_from_mara_thumbprint
        label: Return to Mara's ledger row
        to: signal_ledger

  mara_released:
    routeImportance: optional
    text: >
      The ledger ink lifts from Mara's name like smoke. Far below, the train
      doors open with a softer sound, and the booth speaker carries her first
      full breath in forty-three years. "Third car," Mara says. "I can hold
      the line steady long enough for you to pull the release."
    choices:
      - id: ask_mara_for_last_dispatch
        label: Ask Mara what her last dispatch should say
        to: mara_last_dispatch
        requires:
          notFlag: heard_mara_last_dispatch
        effects:
          set:
            heard_mara_last_dispatch: true
      - id: watch_mara_leave_booth
        label: Watch the signal booth go dark behind her
        to: mara_handoff
        requires:
          notFlag: saw_mara_handoff
        effects:
          set:
            saw_mara_handoff: true
      - id: answer_badge_proof_before_boarding
        label: Answer Mara with the badge proof before boarding
        to: mara_badge_proof_intercom
        requires:
          all:
            - flag: knows_badge_proof
            - notFlag: read_passenger_manifest
            - notFlag: heard_mara_goodbye
        effects:
          set:
            heard_mara_goodbye: true
      - id: ask_mara_about_thumbprint_before_boarding
        label: Ask Mara about the torn thumbprint before boarding
        to: mara_thumbprint_intercom
        requires:
          all:
            - flag: read_mara_thumbprint
            - notFlag: heard_mara_goodbye
        effects:
          set:
            heard_mara_goodbye: true
      - id: answer_mara_before_boarding
        label: Answer Mara through the booth speaker before boarding
        to: mara_intercom
        requires:
          all:
            - notFlag: read_mara_thumbprint
            - notFlag: read_passenger_manifest
            - notFlag: heard_mara_goodbye
            - notFlag: heard_mara_last_dispatch
            - notFlag: saw_mara_handoff
            - notFlag: knows_badge_proof
        effects:
          set:
            heard_mara_goodbye: true
      - id: board_after_clearing_mara
        label: Board the third car while Mara holds the line
        to: train_car

  mara_last_dispatch:
    routeImportance: main
    text: >
      Mara is quiet long enough that the booth relays the rain outside. Then
      she keys the speaker with the care of someone signing off after a double
      shift. "Warden Street dispatcher to last train," she says. "Route held.
      Doors ready. Passenger release authorized by proof, not by permission."
      The line hisses, trying to turn the words into another order, but Mara
      finishes first: "Third car. First seat. Pull once."
    choices:
      - id: carry_last_dispatch_into_car
        label: Carry Mara's last dispatch into the third car
        to: mara_last_dispatch_intercom
        effects:
          set:
            heard_mara_goodbye: true
      - id: board_with_last_dispatch_in_speaker
        label: Board with Mara's last dispatch in the speaker
        to: mara_last_dispatch_intercom
        requires:
          notFlag: knows_badge_proof
        effects:
          set:
            heard_mara_goodbye: true
      - id: board_after_last_dispatch
        label: Board after Mara gives the last dispatch
        to: mara_last_dispatch_intercom
        requires:
          flag: knows_badge_proof

  mara_handoff:
    routeImportance: optional
    text: >
      The signal booth windows clear one by one. For the first time, Mara is
      not a voice in the walls but a woman stepping away from a desk she kept
      warm for everyone else. "I am done being the last line," she says, and
      the platform lights steady as if they believe her.
    choices:
      - id: return_from_mara_handoff
        label: Cross the platform with Mara beside the line
        to: mara_handoff_boarding

  mara_handoff_boarding:
    routeImportance: optional
    text: >
      Mara does not vanish back into the speaker. She walks the platform edge
      with one hand brushing each open door, counting by touch instead of by
      ledger. At the third car, she stops beside the first seat and nods toward
      the release. "I can hold it from here," she says, and this time here
      means beside you.
    choices:
      - id: ask_mara_about_handoff_thumbprint_before_boarding
        label: Ask Mara what the torn thumbprint means beside the doors
        to: mara_thumbprint_handoff_intercom
        requires:
          all:
            - flag: read_mara_thumbprint
            - notFlag: heard_mara_goodbye
            - notFlag: read_passenger_manifest
        effects:
          set:
            heard_mara_goodbye: true
      - id: board_after_mara_handoff
        label: Reach the emergency release while Mara holds the doors
        to: train_car

  passengers_released:
    routeImportance: optional
    text: >
      When Mara's badge number touches the ledger, every tiny stamped door in
      the manifest clicks open at once. The booth fills with ordinary sounds:
      a lunch tin latch, a child's laugh beside a damp mitten print, umbrellas
      shaking rain from their ribs, a newspaper transfer unfolding beside the
      old conductor's punch, passengers answering Mara's count before it can
      make anyone last, shoulders shifting to make room, a crowd pausing until
      someone holds the third-car threshold. The same tiny door-echoes you
      could have heard before opening the manifest keep their rhythm now that
      the names are people. Mara breathes through the speaker and says, "Third
      car. I can hold the line steady while they find the morning." When she
      has already called the opened doors once, the third car speaker keeps a
      small waiting hiss for her handoff. Once the opened passengers remember
      morning aloud, the same speaker can carry those ordinary streets aboard.
    choices:
      - id: watch_mara_open_manifest
        label: Watch Mara call the opened doors
        to: mara_manifest_handoff
        requires:
          notFlag: saw_mara_manifest_handoff
        effects:
          set:
            saw_mara_manifest_handoff: true
      - id: review_open_manifest_count
        label: Review Mara's opened manifest count before boarding
        to: passenger_manifest_count
        requires:
          notFlag: reviewed_open_manifest_count
        effects:
          set:
            reviewed_open_manifest_count: true
      - id: carry_mara_manifest_handoff_from_opened_doors
        label: Carry Mara's opened-door handoff into the third car
        to: mara_manifest_handoff_intercom
        requires:
          all:
            - flag: saw_mara_manifest_handoff
            - notFlag: heard_mara_goodbye
            - notFlag: read_manifest_thumbprint
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_mara_goodbye: true
      - id: let_opened_passengers_finish_count
        label: Let the opened passengers finish Mara's count together
        to: passenger_counted_chorus
        requires:
          notFlag: passengers_finished_reviewed_count
        effects:
          set:
            reviewed_open_manifest_count: true
            passengers_finished_reviewed_count: true
      - id: follow_opened_manifest_echoes
        label: Carry the opened door-echoes into the third car
        to: passenger_echoed_boarding
        requires:
          all:
            - notFlag: heard_passenger_echoes
            - notFlag: heard_mara_goodbye
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_echoes: true
            echoed_manifest_boarded: true
      - id: check_opened_manifest_blank_row
        label: Check the blank row in the opened manifest
        to: passenger_missing_count
        requires:
          notFlag: checked_missing_passenger_count
        effects:
          set:
            reviewed_open_manifest_count: true
            checked_missing_passenger_count: true
      - id: return_opened_manifest_mitten
        label: Return the opened manifest's lost mitten to the child
        to: passenger_mitten_memory
        requires:
          notFlag: returned_lost_mitten
        effects:
          set:
            returned_lost_mitten: true
            helped_passengers_gather: true
      - id: match_opened_manifest_keepsakes
        label: Match the opened manifest keepsakes to their owners
        to: passenger_keepsake_handoff
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            matched_manifest_keepsakes: true
            helped_passengers_gather: true
      - id: listen_to_passenger_morning_chorus
        label: Listen for what the opened passengers remember about morning
        to: passenger_morning_chorus
        requires:
          notFlag: heard_passenger_morning_chorus
        effects:
          set:
            heard_passenger_morning_chorus: true
      - id: carry_morning_chorus_from_opened_manifest
        label: Carry the remembered mornings into the third car
        to: passenger_morning_intercom
        requires:
          all:
            - flag: heard_passenger_morning_chorus
            - notFlag: heard_passenger_morning_boarding
            - notFlag: heard_mara_goodbye
            - notFlag: saw_mara_manifest_handoff
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_passenger_morning_boarding: true
      - id: ask_conductor_to_punch_opened_transfer
        label: Ask the conductor to punch the opened manifest transfer
        to: passenger_conductor_transfer
        requires:
          all:
            - notFlag: helped_passengers_gather
            - notFlag: punched_conductor_transfer
        effects:
          set:
            helped_passengers_gather: true
            conductor_cleared_platform: true
            punched_conductor_transfer: true
      - id: ask_mara_to_sign_off_opened_manifest
        label: Ask Mara to sign off to the opened passengers
        to: passenger_mara_signoff
        requires:
          all:
            - notFlag: heard_passenger_mara_signoff
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_mara_signoff: true
      - id: follow_lunch_tin_latch
        label: Follow the lunch-tin latch toward the third car
        to: passenger_farewell
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            steadied_lunch_tin_worker: true
      - id: help_opened_passengers_gather
        label: Help the opened passengers gather before boarding
        to: passenger_gathered_boarding
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
      - id: hold_opened_manifest_threshold
        label: Hold the third-car threshold for the opened passengers
        to: passenger_threshold_boarding
        requires:
          notFlag: held_passenger_threshold
        effects:
          set:
            held_passenger_threshold: true
      - id: make_room_from_opened_manifest
        label: Make room in the third car as the opened passengers board
        to: passenger_room_intercom
        requires:
          all:
            - notFlag: helped_passengers_gather
            - notFlag: made_room_for_passengers
            - notFlag: heard_mara_goodbye
        effects:
          set:
            made_room_for_passengers: true
            heard_mara_goodbye: true
      - id: touch_manifest_thumbprint_from_opened_doors
        label: Touch Mara's torn thumbprint before boarding
        to: mara_manifest_thumbprint
        requires:
          all:
            - flag: saw_mara_manifest_handoff
            - notFlag: read_manifest_thumbprint
        effects:
          set:
            read_manifest_thumbprint: true
      - id: carry_manifest_thumbprint_from_opened_doors
        label: Carry Mara's thumbprint oath to the third car
        to: mara_manifest_thumbprint_intercom
        requires:
          all:
            - flag: saw_mara_manifest_handoff
            - flag: read_manifest_thumbprint
            - notFlag: heard_mara_goodbye
        effects:
          set:
            heard_mara_goodbye: true
      - id: listen_to_passenger_answers
        label: Listen as the passengers answer their names
        to: passenger_answers
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
      - id: ask_mara_to_handoff_opened_roll_call
        label: Ask Mara to hand the roll call to the opened passengers
        to: passenger_answered_handoff_roll_call
        requires:
          all:
            - notFlag: saw_mara_manifest_handoff
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            saw_mara_manifest_handoff: true
            heard_passenger_answers: true
            heard_answered_passengers: true
      - id: let_opened_manifest_names_answer_once
        label: Let the opened manifest names answer once
        to: passenger_manifest_answers
        requires:
          all:
            - notFlag: manifest_names_answered_once
            - notFlag: heard_mara_goodbye
            - notFlag: helped_passengers_gather
        effects:
          set:
            manifest_names_answered_once: true
            heard_mara_goodbye: true
      - id: board_with_opened_handoff_answers
        label: Board as Mara hands the roll call to the passengers
        to: passenger_answered_handoff_roll_call
        requires:
          all:
            - flag: saw_mara_manifest_handoff
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_answers: true
            heard_answered_passengers: true
      - id: board_with_answered_passengers
        label: Let the opened passengers carry their own names
        to: passenger_answers
        requires:
          all:
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_answers: true
      - id: board_after_releasing_passengers
        label: Cross the platform as the passengers gather
        to: passenger_platform

  passenger_morning_chorus:
    routeImportance: optional
    text: >
      The opened passengers do not remember morning as sunrise. They remember
      it as practical things waiting past the transfer: a kettle left on a
      stove, a time clock that should have punched them out, a child's other
      mitten warming on a radiator. Mara lets the speaker stay open until the
      memories overlap into one steady sound. "That is enough," she says. "The
      line knows they have somewhere to arrive."
    choices:
      - id: return_from_passenger_morning_chorus
        label: Return to the opened manifest doors
        to: passengers_released
      - id: cross_after_passenger_morning_chorus
        label: Cross the platform while the morning chorus holds
        to: passenger_platform
      - id: let_morning_chorus_answer_names
        label: Let the morning chorus answer Mara's roll call
        to: passenger_answers
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
      - id: board_after_passenger_morning_chorus
        label: Board the third car with the morning chorus behind you
        to: passenger_morning_intercom
        effects:
          set:
            heard_passenger_morning_boarding: true

  passenger_mara_signoff:
    routeImportance: optional
    text: >
      Mara keys the booth speaker, then stops before the line can make her
      voice official. "Warden Street," she says, softer than a dispatch and
      steadier than an apology. "You are not late. You were held. The doors are
      open now, and no one boards alone." The passengers answer not with a
      cheer but with movement: hands finding handles, shoulders turning toward
      the third car, small proofs of life making room for one another.
    choices:
      - id: notice_manifest_thumbprint_after_mara_signoff
        label: Notice Mara's thumbprint holding the opened manifest
        to: mara_manifest_thumbprint
        requires:
          all:
            - notFlag: read_manifest_thumbprint
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            read_manifest_thumbprint: true
            saw_mara_manifest_handoff: true
      - id: listen_to_answers_after_mara_signoff
        label: Listen as the passengers answer Mara back
        to: passenger_answers
        requires:
          all:
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_answers: true
      - id: return_from_passenger_mara_signoff
        label: Return to the opened manifest doors
        to: passengers_released
      - id: cross_after_passenger_mara_signoff
        label: Cross the platform after Mara's sign-off
        to: passenger_platform
      - id: board_after_passenger_mara_signoff
        label: Board the third car after Mara signs off
        to: train_car

  passenger_manifest_count:
    routeImportance: optional
    text: >
      Mara checks the opened manifest before anyone moves. The doors are no
      longer stamped shut, but the page still remembers what each person
      carried into the line: newspaper, lunch tin, child's mitten, conductor's
      punch. "They need more than clearance," Mara says. "They need one another
      to answer when the train tries to count them again."
    choices:
      - id: check_for_unanswered_manifest_row
        label: Check which opened row still has no answer
        to: passenger_missing_count
        requires:
          notFlag: checked_missing_passenger_count
        effects:
          set:
            checked_missing_passenger_count: true
      - id: finish_reviewed_count_before_boarding
        label: Let the passengers finish Mara's reviewed count before boarding
        to: passenger_counted_chorus
        requires:
          notFlag: passengers_finished_reviewed_count
        effects:
          set:
            passengers_finished_reviewed_count: true
      - id: board_with_reviewed_manifest_count
        label: Board with Mara's reviewed count already on the speaker
        to: passenger_counted_manifest_intercom
        effects:
          set:
            heard_mara_goodbye: true
      - id: listen_after_manifest_count
        label: Listen as the counted passengers answer their names
        to: passenger_answers
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
      - id: ask_conductor_after_manifest_count
        label: Ask the conductor to carry Mara's opened count clear
        to: passenger_conductor_signal
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_answers: true
            helped_passengers_gather: true
            conductor_cleared_platform: true
      - id: cross_after_manifest_count
        label: Cross through the counted crowd as they gather
        to: passenger_platform
      - id: board_after_manifest_count
        label: Board the third car while Mara holds the count
        to: train_car

  passenger_missing_count:
    routeImportance: optional
    text: >
      Mara turns the opened manifest sideways so the blank spaces line up.
      Every stamped door has unlocked, but one row still waits without a voice
      beside it: not a missing passenger, she realizes, but the pause where the
      line used to put her. The child with the mitten taps the paper, the
      newspaper woman reads the stop aloud, and the old conductor lifts his
      punch. "Then we answer that space together," Mara says, and the ledger no
      longer has room to make anyone last.
    choices:
      - id: let_unanswered_row_become_roll_call
        label: Let the unanswered row become the passengers' roll call
        to: passenger_answers
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
      - id: ask_conductor_to_clear_unanswered_row
        label: Ask the conductor to clear the unanswered row
        to: passenger_conductor_signal
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_answers: true
            helped_passengers_gather: true
            conductor_cleared_platform: true
      - id: board_with_unanswered_row_resolved
        label: Board once the unanswered row belongs to everyone
        to: passenger_counted_manifest_intercom
        effects:
          set:
            heard_mara_goodbye: true
      - id: return_from_unanswered_row
        label: Return to the reviewed manifest count
        to: passenger_manifest_count

  mara_manifest_handoff:
    routeImportance: optional
    text: >
      Mara does not leave the booth at once. She reads the first opened door,
      waits for its answer, then touches the next line as if steadiness can be
      handed from name to name. By the time she reaches her own row, the
      speaker is full of people breathing with her instead of waiting for her.
      The third car answers with crowded shuffles, asking for room as plainly
      as it asks for the release.
    choices:
      - id: board_after_mara_manifest_handoff
        label: Board the third car while Mara keeps calling names
        to: mara_manifest_handoff_intercom
        effects:
          set:
            heard_mara_goodbye: true
      - id: make_room_after_mara_manifest_handoff
        label: Make room in the third car while Mara calls the opened doors
        to: passenger_room_boarding
        requires:
          notFlag: made_room_for_passengers
        effects:
          set:
            made_room_for_passengers: true
      - id: hold_threshold_after_mara_manifest_handoff
        label: Hold the third-car threshold while Mara calls the opened doors
        to: passenger_threshold_boarding
        requires:
          notFlag: held_passenger_threshold
        effects:
          set:
            held_passenger_threshold: true
      - id: finish_count_after_mara_manifest_handoff
        label: Let the opened passengers finish Mara's count together
        to: passenger_counted_chorus
        requires:
          notFlag: passengers_finished_reviewed_count
        effects:
          set:
            reviewed_open_manifest_count: true
            passengers_finished_reviewed_count: true
      - id: recognize_mara_manifest_thumbprint_oath
        label: Recognize Mara's thumbprint oath as she calls the opened doors
        to: mara_manifest_thumbprint_intercom
        requires:
          all:
            - flag: read_mara_thumbprint
            - notFlag: read_manifest_thumbprint
            - notFlag: heard_mara_goodbye
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            read_manifest_thumbprint: true
            heard_mara_goodbye: true
      - id: touch_mara_manifest_thumbprint
        label: Touch Mara's torn thumbprint before boarding
        to: mara_manifest_thumbprint
        requires:
          all:
            - notFlag: read_mara_thumbprint
            - notFlag: read_manifest_thumbprint
        effects:
          set:
            read_manifest_thumbprint: true
      - id: continue_manifest_handoff_roll_call
        label: Keep listening as the opened passengers answer Mara
        to: passenger_answers
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
      - id: board_with_mara_answered_handoff
        label: Board as Mara hands the roll call to the answered passengers
        to: passenger_answered_handoff_roll_call
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
            heard_answered_passengers: true
      - id: return_from_mara_manifest_handoff
        label: Return to the opened manifest doors
        to: passengers_released

  mara_manifest_thumbprint:
    routeImportance: optional
    text: >
      The torn thumbprint warms under your hand while the opened manifest keeps
      answering Mara. For a moment, her old oath changes shape: not a dispatcher
      holding the last line alone, but a witness keeping the door open until
      every passenger can answer for themselves. Mara inhales when she hears
      the page tear no further. "Then I come through with them," she says.
    choices:
      - id: carry_manifest_thumbprint_to_third_car
        label: Carry Mara's thumbprint oath to the third car
        to: mara_manifest_thumbprint_intercom
        effects:
          set:
            heard_mara_goodbye: true
      - id: board_after_manifest_thumbprint
        label: Board while Mara carries the oath forward
        to: train_car
      - id: return_from_manifest_thumbprint
        label: Return to the opened manifest doors
        to: passengers_released

  passenger_answers:
    routeImportance: supporting
    text: >
      The opened manifest does not cheer. It answers roll call in small,
      stubborn proofs of life: a man clearing his throat before saying "here,"
      a child asking if the rain is still outside, someone laughing once because
      the word present finally means something again, and the woman with the
      folded newspaper answering "Warden Street" like a stop can become a door.
      Mara waits for every answer before she tells you the third car is ready.
    choices:
      - id: follow_newspaper_answer
        label: Follow the newspaper woman's Warden Street answer
        to: passenger_newspaper_memory
        requires:
          notFlag: heard_newspaper_memory
        effects:
          set:
            heard_newspaper_memory: true
      - id: gather_answered_passengers
        label: Help the answered passengers gather for the third car
        to: passenger_gathered_boarding
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
      - id: let_lunch_tin_worker_keep_count
        label: Let the lunch-tin worker count the answered passengers aboard
        to: passenger_farewell
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            steadied_lunch_tin_worker: true
      - id: ask_conductor_punch_from_answers
        label: Ask what the old conductor's punch remembers
        to: passenger_conductor_punch_memory
        requires:
          all:
            - notFlag: helped_passengers_gather
            - notFlag: heard_conductor_punch_memory
        effects:
          set:
            helped_passengers_gather: true
            conductor_cleared_platform: true
            heard_conductor_punch_memory: true
      - id: ask_conductor_from_answers
        label: Ask the old conductor to call the answered passengers clear
        to: passenger_conductor_signal
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            conductor_cleared_platform: true
      - id: return_from_passenger_answers
        label: Cross through the answered crowd as they gather
        to: passenger_platform
      - id: carry_answered_names_to_intercom
        label: Carry the answered names into the third car
        to: passenger_answered_intercom
        requires:
          all:
            - notFlag: saw_mara_manifest_handoff
            - notFlag: heard_answered_passengers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_answered_passengers: true
      - id: board_after_passenger_answers
        label: Board the third car while the roll call holds
        to: passenger_answered_handoff_roll_call
        requires:
          flag: saw_mara_manifest_handoff
        effects:
          set:
            heard_answered_passengers: true
      - id: board_after_answered_passengers
        label: Board the third car while the roll call holds
        to: passenger_answered_boarding
        requires:
          notFlag: saw_mara_manifest_handoff

  passenger_answered_boarding:
    routeImportance: optional
    text: >
      The answered passengers board by repeating themselves softly enough that
      the train cannot turn the words into a command. The child says present at
      each doorway, the newspaper woman keeps Warden Street folded under one
      thumb, and the old conductor checks the aisle without asking for tickets.
      By the first seat, Mara's speaker has gone quiet. The people she called
      are carrying their own names now, and the emergency release waits beneath
      their feet.
    choices:
      - id: listen_to_answered_passengers_from_boarding
        label: Listen once more as the answered passengers settle
        to: passenger_answered_intercom
        effects:
          set:
            heard_answered_passengers: true
      - id: pull_release_after_answered_boarding
        label: Pull the release while the answered names hold
        to: passenger_answered_boarding_true_ending

  passenger_platform:
    routeImportance: supporting
    text: >
      The platform is no longer empty. People step out of the manifest doors
      carrying ordinary burdens: a folded newspaper, a paper sack darkened by
      rain, the mitten you saw pinned beside a name. None of them look at the
      destination sign. They look to Mara's speaker, then to the third-car
      threshold, waiting for someone to hold the last door open.
    choices:
      - id: ask_newspaper_woman_about_stop
        label: Ask the newspaper woman which stop she was trying to reach
        to: passenger_newspaper_memory
        requires:
          notFlag: heard_newspaper_memory
        effects:
          set:
            heard_newspaper_memory: true
      - id: ask_newspaper_woman_to_read_transfer_column
        label: Ask the newspaper woman to read the blank transfer column aloud
        to: passenger_newspaper_transfer
        requires:
          all:
            - notFlag: heard_newspaper_memory
            - notFlag: studied_newspaper_transfer
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_newspaper_memory: true
            studied_newspaper_transfer: true
      - id: ask_lunch_tin_worker_to_set_pace
        label: Ask the lunch-tin worker to set the boarding pace
        to: passenger_farewell
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            steadied_lunch_tin_worker: true
      - id: ask_conductor_to_call_platform_clear
        label: Ask the old conductor to call the platform clear
        to: passenger_conductor_signal
        requires:
          all:
            - flag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            conductor_cleared_platform: true
      - id: return_lost_mitten
        label: Return the lost mitten to the child
        to: passenger_mitten_memory
        requires:
          notFlag: returned_lost_mitten
        effects:
          set:
            returned_lost_mitten: true
            helped_passengers_gather: true
      - id: match_manifest_keepsakes
        label: Match the manifest keepsakes to their owners
        to: passenger_keepsake_handoff
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            matched_manifest_keepsakes: true
            helped_passengers_gather: true
      - id: help_passengers_gather
        label: Help the kept passengers gather by the open doors
        to: passenger_gathered_boarding
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
      - id: board_with_echoed_manifest
        label: Board as the door echoes follow you
        to: passenger_echoed_boarding
        requires:
          all:
            - flag: heard_passenger_echoes
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            echoed_manifest_boarded: true
      - id: hold_third_car_threshold
        label: Hold the third-car threshold open for every passenger
        to: passenger_threshold_boarding
        requires:
          all:
            - notFlag: heard_passenger_echoes
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
            - notFlag: reviewed_open_manifest_count
        effects:
          set:
            held_passenger_threshold: true
      - id: make_room_for_passengers_in_third_car
        label: Make room inside the third car before reaching for the release
        to: passenger_room_boarding
        requires:
          all:
            - notFlag: heard_passenger_echoes
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
            - notFlag: reviewed_open_manifest_count
            - notFlag: made_room_for_passengers
        effects:
          set:
            made_room_for_passengers: true
      - id: listen_as_passengers_make_room
        label: Listen as the passengers make room around the release
        to: passenger_room_intercom
        requires:
          all:
            - notFlag: heard_passenger_echoes
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
            - notFlag: reviewed_open_manifest_count
            - notFlag: made_room_for_passengers
            - notFlag: heard_mara_goodbye
        effects:
          set:
            made_room_for_passengers: true
            heard_mara_goodbye: true
      - id: board_third_car_with_passengers
        label: Board the third car and reach the release
        to: train_car
        requires:
          any:
            - notFlag: heard_passenger_echoes
            - flag: heard_passenger_answers
            - flag: helped_passengers_gather

  passenger_echoed_boarding:
    routeImportance: optional
    text: >
      The passengers board quietly, but the sounds you heard behind the stamped
      doors come with them: thermos cap, folded paper, the soft knock of a
      mitten against the third-car frame. None of them look surprised that you
      recognize the rhythm. Mara leaves the speaker open, as if the train needs
      to hear that waiting has turned into boarding.
    choices:
      - id: listen_to_echoed_manifest_from_boarding
        label: Listen as the boarded echoes answer Mara
        to: passenger_echoed_manifest_intercom
        requires:
          notFlag: heard_mara_goodbye
        effects:
          set:
            heard_mara_goodbye: true
      - id: reach_release_with_echoed_manifest
        label: Follow the familiar echoes to the emergency release
        to: train_car
        requires:
          notFlag: heard_mara_goodbye
      - id: pull_release_after_echoed_boarding
        label: Pull the release once the familiar echoes are aboard
        to: passenger_echoed_true_ending
        requires:
          flag: heard_mara_goodbye

  passenger_threshold_boarding:
    routeImportance: optional
    text: >
      You stand at the third-car threshold instead of rushing for the release.
      The opened passengers cross one by one with the practical care of people
      remembering how to board: newspaper folded flat, lunch tin held clear of
      the door, child's mitten tapping the rail before the next person moves.
      Mara does not count over them. She lets the threshold prove they are
      becoming a crowd.
    choices:
      - id: listen_to_threshold_from_boarding
        label: Listen as Mara holds the threshold open
        to: passenger_threshold_intercom
        effects:
          set:
            heard_mara_goodbye: true
      - id: reach_release_after_threshold_boarding
        label: Reach the release after the last passenger clears the threshold
        to: train_car

  passenger_room_boarding:
    routeImportance: optional
    text: >
      Inside the third car, the first seat has become more than a place to hide
      the release. You lift the newspaper bundle from the aisle, tuck the lunch
      tin where it will not trip anyone, and guide the child with the mitten
      toward the rail. Each small motion gives the passengers another inch of
      ordinary space. Mara leaves the speaker open long enough for the car to
      sound crowded instead of haunted.
    choices:
      - id: listen_to_room_made_for_passengers
        label: Listen as the crowded car steadies around the release
        to: passenger_room_intercom
        effects:
          set:
            heard_mara_goodbye: true
      - id: reach_release_after_making_room
        label: Reach the release once every passenger has room
        to: train_car

  passenger_newspaper_memory:
    routeImportance: optional
    text: >
      The woman smooths the wet newspaper against her sleeve until the ink
      remembers a date. "Warden Street, then morning transfer," she says,
      pointing to a column where every arrival after 1:13 has been left blank.
      "I kept reading it because the paper was the only thing that still
      believed trains went anywhere." Behind her, the old conductor leans close
      enough to see the schedule and nods once, as if the route has started
      existing again.
    choices:
      - id: ask_conductor_after_newspaper_memory
        label: Let the old conductor call the final platform clear
        to: passenger_conductor_roll_call
        requires:
          all:
            - flag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            conductor_cleared_platform: true
            heard_conductor_clearance: true
            heard_final_roll_call: true
      - id: return_lost_mitten_after_newspaper_memory
        label: Return the lost mitten and lead the child to the third car
        to: passenger_mitten_intercom
        requires:
          notFlag: returned_lost_mitten
        effects:
          set:
            returned_lost_mitten: true
            helped_passengers_gather: true
            heard_gathered_passengers: true
      - id: match_keepsakes_after_newspaper_memory
        label: Match the manifest keepsakes on the way to the third car
        to: passenger_keepsake_intercom
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            matched_manifest_keepsakes: true
            helped_passengers_gather: true
            heard_gathered_passengers: true
      - id: study_newspaper_transfer_column
        label: Study the blank transfer column before boarding
        to: passenger_newspaper_transfer
        requires:
          notFlag: studied_newspaper_transfer
        effects:
          set:
            studied_newspaper_transfer: true
      - id: help_passengers_after_newspaper_memory
        label: Use the transfer column to gather passengers into the third car
        to: passenger_newspaper_intercom
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            heard_gathered_passengers: true
      - id: board_after_newspaper_memory
        label: Board the third car by the transfer column
        to: passenger_newspaper_intercom
        effects:
          set:
            helped_passengers_gather: true
            heard_gathered_passengers: true

  passenger_newspaper_transfer:
    routeImportance: optional
    text: >
      The blank transfer column is not blank anymore. As the newspaper woman
      reads each passenger's intended stop, rain-dark ink rises where the
      timetable gave up: Warden Street, then morning transfer, then a row of
      smaller streets no one has spoken aloud since the signal fire. The old
      conductor rests two fingers beside the column and says, "That is enough
      route for a clear signal."
    choices:
      - id: ask_conductor_to_punch_restored_transfer
        label: Ask the conductor to punch the restored transfer for morning
        to: passenger_conductor_transfer
        effects:
          set:
            helped_passengers_gather: true
            conductor_cleared_platform: true
            punched_conductor_transfer: true
      - id: carry_newspaper_transfer_to_third_car
        label: Carry the restored transfer column into the third car
        to: passenger_newspaper_intercom
        effects:
          set:
            helped_passengers_gather: true
            heard_gathered_passengers: true

  passenger_conductor_signal:
    routeImportance: optional
    text: >
      The old conductor straightens when you ask for his signal. He does not
      have a lantern, only a punch clipped to a chain, but he raises it like
      one. "Platform clear," he calls, and the answered passengers move as if
      the words have given them rails again: child beside newspaper woman,
      umbrellas lifted away from the wheels, Mara's speaker quiet enough to
      let another worker hold the line.
    choices:
      - id: inspect_conductor_punch_memory
        label: Ask what the conductor's punch remembers
        to: passenger_conductor_punch_memory
        requires:
          notFlag: heard_conductor_punch_memory
        effects:
          set:
            heard_conductor_punch_memory: true
      - id: follow_conductor_signal_to_third_car
        label: Follow the conductor's clear signal to the release
        to: passenger_conductor_roll_call
        requires:
          notFlag: reviewed_open_manifest_count
        effects:
          set:
            heard_conductor_clearance: true
            heard_final_roll_call: true
      - id: follow_counted_conductor_signal_to_third_car
        label: Follow the conductor's counted clear signal to the release
        to: passenger_conductor_count_roll_call
        requires:
          flag: reviewed_open_manifest_count
        effects:
          set:
            heard_conductor_clearance: true
            heard_final_roll_call: true

  passenger_conductor_punch_memory:
    routeImportance: optional
    text: >
      The conductor turns the punch over in both hands. Its brass mouth is
      nicked with old transfers, each star-shaped bite a passenger who was
      supposed to change trains before the line learned to keep them. "I kept
      punching tickets after the doors stopped opening," he says. "Tonight I
      can punch clear instead." When he raises the tool again, the passengers
      answer the sound like a bell that finally rings outward.
    choices:
      - id: follow_punch_memory_to_third_car
        label: Follow the conductor's remembered clear signal into the third car
        to: passenger_conductor_intercom
        effects:
          set:
            heard_conductor_clearance: true

  passenger_mitten_memory:
    routeImportance: optional
    text: >
      The child accepts the mitten with both hands, then turns it inside out to
      show a transit stamp older than anyone on the platform should remember.
      "My mother told me not to lose the other one," he says, and the woman
      with the newspaper kneels before Mara can answer. "Then we will find it
      in the morning," she tells him. The crowd shifts closer, not as passengers
      waiting to be counted, but as people beginning to look after one another.
    choices:
      - id: lead_mitten_child_to_third_car
        label: Lead the child and gathered passengers to the third car
        to: passenger_mitten_intercom
        effects:
          set:
            heard_gathered_passengers: true

  passenger_keepsake_handoff:
    routeImportance: optional
    text: >
      The manifest's details become a way to make the crowd real again. You
      give the warm lunch tin to the man whose hands still expect its handle,
      point the newspaper woman toward the conductor who remembers her stop,
      and sort the rain-dark umbrellas by the initials etched into their
      hooks. Each small return gives Mara another answered name, until the
      platform sounds less like a ledger and more like people finding their
      places beside one another.
    choices:
      - id: carry_matched_keepsakes_to_speaker
        label: Carry the matched keepsakes to the third-car speaker
        to: passenger_keepsake_intercom
        requires:
          notFlag: heard_gathered_passengers
        effects:
          set:
            heard_gathered_passengers: true
      - id: lead_keepsake_passengers_to_third_car
        label: Lead the matched passengers to the third car
        to: passenger_keepsake_boarding

  passenger_keepsake_boarding:
    routeImportance: optional
    text: >
      The third car fills by object before it fills by name. The lunch tin
      worker sets his tin under the first seat where the release waits, the
      newspaper woman tucks her transfer column against the window, and each
      umbrella hooks over a rail with its initials facing out. Mara starts to
      read the manifest again, then stops when the ordinary things answer for
      the people holding them.
    choices:
      - id: listen_to_keepsakes_answer_from_boarding
        label: Listen as the keepsakes answer from the third car
        to: passenger_keepsake_intercom
        effects:
          set:
            heard_gathered_passengers: true
      - id: hear_keepsake_roll_call_from_boarding
        label: Let the matched keepsakes finish Mara's roll call
        to: passenger_keepsake_roll_call
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_gathered_passengers: true
            heard_final_roll_call: true
      - id: pull_release_after_keepsake_boarding
        label: Pull the release while every keepsake has its owner
        to: passenger_keepsake_true_ending

  passenger_farewell:
    routeImportance: optional
    text: >
      You start with the man holding the paper sack. Inside, his lunch tin is
      still warm, packed for a double shift he never reached. When he snaps the
      latch shut, the sound gives the platform a practical rhythm: the child
      with the mitten takes an old conductor's hand, the newspaper woman tucks
      her transfer under the tin's handle, and the crowd moves as if boarding
      has become ordinary work again. No one thanks you yet. They are saving
      their voices for the morning.
    choices:
      - id: return_from_passenger_farewell
        label: Let the lunch-tin worker set the pace to the third car
        to: passenger_lunch_tin_boarding
        effects:
          set:
            steadied_lunch_tin_worker: true
      - id: lead_gathered_passengers_without_lunch_tin_pace
        label: Board the gathered passengers without waiting for his count
        to: train_car

  passenger_gathered_boarding:
    routeImportance: optional
    text: >
      The gathered passengers board by looking after the person nearest them.
      The newspaper woman folds her transfer column into the child's mittened
      hand, the old conductor checks the doorway without asking for tickets,
      and the lunch-tin worker keeps his latch quiet so no one has to be counted
      by the line again. At the first seat, the emergency release waits under a
      crowd that is ready because it became a crowd.
    choices:
      - id: listen_to_gathered_passengers_from_boarding
        label: Listen to the gathered passengers before the release
        to: passenger_gathered_intercom
        effects:
          set:
            heard_gathered_passengers: true
      - id: answer_final_roll_call_from_gathered_boarding
        label: Let the gathered passengers answer the final roll call
        to: passenger_roll_call_epilogue
        requires:
          notFlag: heard_final_roll_call
        effects:
          set:
            heard_final_roll_call: true
      - id: pull_release_after_gathered_boarding
        label: Pull the release once every passenger is ready
        to: passenger_helped_true_ending

  passenger_lunch_tin_boarding:
    routeImportance: optional
    text: >
      The lunch-tin worker boards first and does not sit. He plants one hand on
      the rail, keeps the warm tin tucked against his hip, and clicks the latch
      each time another passenger finds the third car without looking at the
      HOME sign. The child, the newspaper woman, and the old conductor fall
      into that practical rhythm until the aisle feels less like a ledger and
      more like a shift change. Under the first seat, the emergency release
      waits for the count to become movement.
    choices:
      - id: read_lunch_tin_roster_from_boarding
        label: Read the shift roster tucked inside the lunch tin before the release
        to: passenger_lunch_tin_roster
        requires:
          notFlag: read_lunch_tin_roster
        effects:
          set:
            heard_gathered_passengers: true
            read_lunch_tin_roster: true
      - id: listen_to_lunch_tin_worker_from_boarding
        label: Listen as the lunch-tin worker keeps time
        to: passenger_lunch_tin_intercom
        effects:
          set:
            heard_gathered_passengers: true
      - id: pull_release_after_lunch_tin_boarding
        label: Pull the release while the lunch-tin count holds
        to: passenger_lunch_tin_true_ending

  train_car:
    routeImportance: main
    text: >
      The third car smells of rain and hot dust. Under the first seat, your
      fingers find an emergency release. The blank destination sign begins to
      spell HOME one letter at a time.
