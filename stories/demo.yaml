  passenger_missing_count:
    routeImportance: optional
    text: >
      Mara turns the opened manifest sideways until the blank spaces line up
      with the aisle. Every stamped door has unlocked, but one row still waits
      without a voice beside it: not a missing passenger, she realizes, but the
      pause where the line used to put whoever helped last. The child with the
      mitten taps the paper first. The newspaper woman reads Warden Street
      aloud so the worker can answer from the door. The old conductor lifts his
      punch, then lowers it when the passengers look from face to face and make
      their own check. "Then we answer that space together," Mara says, and the
      blank row becomes room for everyone still crossing.
    choices:
      - id: let_unanswered_row_become_roll_call
        label: Let the unanswered row become the passengers' roll call
        to: passenger_answers
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
      - id: ask_conductor_to_clear_unanswered_row
