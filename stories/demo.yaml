        effects:
          set:
            heard_final_roll_call: true
            read_lunch_tin_roster: true

  train_car:
    routeImportance: main
    text: >
      The third car smells of rain and hot dust. Mara's voice holds in the
      speaker while the platform line trembles around her, not an order now but
      a hand braced against the closing doors. Under the first seat, your
      fingers find an emergency release. The blank destination sign begins to
      spell HOME one letter at a time. The release is the way out now. Mara can
      still make one last dispatch from the speaker, or you can pull before the
      sign finishes and make the word belong to everyone.
    choices:
      - id: pull_release
        label: Pull the emergency release now
        to: true_ending
        requires:
          all:
            - flag: freed_mara
            - notFlag: read_passenger_manifest
      - id: inspect_release_handle
        label: Check the emergency release before pulling
        to: release_handle_check
        requires:
          all:
