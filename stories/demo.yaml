            - notFlag: read_mara_thumbprint
            - notFlag: saw_mara_handoff
            - notFlag: knows_badge_proof
            - notFlag: heard_mara_last_dispatch
            - notFlag: checked_release_handle
        effects:
          set:
            checked_release_handle: true
      - id: listen_to_badge_proof_after_last_dispatch
