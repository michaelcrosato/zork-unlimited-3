  passenger_morning_chorus:
    routeImportance: optional
    text: >
      The opened passengers do not remember morning as sunrise. They remember
      it as practical things waiting past the transfer: a kettle left on a
      stove, a time clock that should have punched them out, a child's other
      mitten warming on a radiator. Mara lets the speaker stay open until the
      memories overlap into one steady sound. "That is enough," she says. "The
      line knows they have somewhere to arrive."
    choices:
      - id: board_after_passenger_morning_chorus
        label: Board the third car with the morning chorus behind you
        to: passenger_morning_intercom
        effects:
          set:
            heard_passenger_morning_boarding: true
      - id: board_and_confirm_morning_stops_after_chorus
        label: Board with the remembered stops ready for Mara's speaker
        to: passenger_morning_intercom
        requires:
          notFlag: confirmed_morning_stops
        effects:
          set:
            heard_passenger_morning_boarding: true
      - id: let_morning_chorus_answer_names
        label: Let the morning chorus answer Mara's roll call
        to: passenger_answers
        requires:
          notFlag: heard_passenger_answers
        effects:
          set:
            heard_passenger_answers: true
      - id: let_mara_handoff_morning_names
        label: Let Mara hand the remembered mornings from name to name
        to: mara_manifest_handoff
        requires:
          notFlag: saw_mara_manifest_handoff
        effects:
          set:
            saw_mara_manifest_handoff: true
      - id: listen_for_echoes_inside_morning_chorus
        label: Listen for the opened door-echoes inside the morning chorus
        to: opened_manifest_echoes
        requires:
          notFlag: heard_passenger_echoes
        effects:
          set:
            heard_passenger_echoes: true
      - id: gather_after_passenger_morning_chorus
        label: Let the morning chorus gather the passengers into the third car
        to: passenger_gathered_boarding
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
      - id: cross_after_passenger_morning_chorus
        label: Cross the platform while the morning chorus holds
        to: passenger_platform
      - id: return_from_passenger_morning_chorus
        label: Return to the opened manifest doors
        to: passengers_released

  passenger_mara_signoff:
    routeImportance: optional
    text: >
      Mara keys the booth speaker, then stops before the line can make her
      voice official. "Warden Street," she says, softer than a dispatch and
      steadier than an apology. "You are not late. You were held. The doors are
      open now, and no one boards alone." The passengers answer not with a
      cheer but with movement: hands finding handles, shoulders turning toward
      the third car, small proofs of life making room for one another.
    choices:
      - id: notice_manifest_thumbprint_after_mara_signoff
        label: Notice Mara's thumbprint holding the opened manifest
        to: mara_manifest_thumbprint
        requires:
          all:
            - notFlag: read_manifest_thumbprint
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            read_manifest_thumbprint: true
            saw_mara_manifest_handoff: true
      - id: listen_to_answers_after_mara_signoff
        label: Listen as the passengers answer Mara back
        to: passenger_answers
        requires:
          all:
            - notFlag: heard_passenger_answers
            - notFlag: helped_passengers_gather
        effects:
          set:
            heard_passenger_answers: true
      - id: listen_for_morning_after_mara_signoff
        label: Listen for the mornings Mara's sign-off sends them toward
        to: passenger_morning_chorus
        requires:
          notFlag: heard_passenger_morning_chorus
        effects:
          set:
            heard_passenger_morning_chorus: true
      - id: gather_after_mara_signoff
        label: Let Mara's sign-off gather the passengers into the third car
        to: passenger_gathered_intercom
        requires:
          notFlag: helped_passengers_gather
        effects:
          set:
            helped_passengers_gather: true
            heard_gathered_passengers: true
      - id: return_from_passenger_mara_signoff
        label: Return to the opened manifest doors
        to: passengers_released
      - id: cross_after_passenger_mara_signoff
        label: Cross the platform after Mara's sign-off
        to: passenger_platform
      - id: board_after_passenger_mara_signoff
        label: Board together after Mara signs off
        to: passenger_gathered_intercom
        requires:
          notFlag: heard_passenger_echoes
        effects:
          set:
            helped_passengers_gather: true
            heard_gathered_passengers: true
      - id: board_after_echoed_passenger_mara_signoff
        label: Board with the familiar echoes after Mara signs off
        to: passenger_echoed_boarding
        requires:
          flag: heard_passenger_echoes
        effects:
          set:
            echoed_manifest_boarded: true

  opened_manifest_echoes:
    routeImportance: optional
    text: >
      You stop long enough to hear the opened doors without the ink between
      you and the people behind them. The lunch-tin latch, newspaper fold, and
      mitten knock are still there, but now each sound has footsteps under it.
      The rhythm points toward the third car more clearly than any arrow on
      the tunnel wall. None of the echoes ask to be solved now. They ask to be
      followed. Mara leaves the speaker open, waiting to hear whether you trust
      the passengers' own signal.
    choices:
      - id: confirm_ready_manifest_after_opened_echoes
        label: Confirm every kept name after the door-echoes answer
        to: passenger_manifest_ready_intercom
        requires:
          all:
            - flag: heard_manifest_ready
            - notFlag: heard_mara_goodbye
